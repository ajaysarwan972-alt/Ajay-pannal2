<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* Top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  background: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* ID box */
.id-box {
  background: #3bb54a;
  color: white;
  padding: 8px 18px;
  border-radius: 20px;
  font-weight: bold;
}

/* Wallet box */
.wallet-box {
  background: red;
  color: white;
  padding: 8px 18px;
  border-radius: 20px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="topbar">
  <div class="id-box">ID: <span id="uid">00000</span></div>
  <div class="wallet-box">₹ <span id="wallet">0</span></div>
</div>

<script>
// Check login
let mobile = localStorage.getItem("currentUser");

if(!mobile){
  alert("Pehle login karo");
  window.location.href = "index.html";
}

// Load user
let user = JSON.parse(localStorage.getItem(mobile));

// Show data
document.getElementById("uid").innerText = user.id;
document.getElementById("wallet").innerText = user.wallet;
</script>

</body>
</html>
