<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* Top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: white;
}

/* Menu icon */
.menu {
  font-size: 22px;
}

/* ID box */
.id-box {
  background: #3bb54a;
  color: white;
  padding: 8px 20px;
  border-radius: 15px;
  font-weight: bold;
}

/* Wallet box */
.wallet-box {
  background: red;
  color: white;
  padding: 8px 20px;
  border-radius: 15px;
  font-weight: bold;
}

/* Banner */
.banner {
  background: #1f6b2e;
  color: white;
  text-align: center;
  padding: 40px 10px;
  font-size: 30px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="topbar">
  <div class="menu">☰</div>
  <div class="id-box">ID: <span id="uid">00000</span></div>
  <div class="wallet-box">₹ <span id="wallet">0</span></div>
</div>

<div class="banner">
  CLUB GOLDEN
</div>

<script>
// User load
let mobile = localStorage.getItem("currentUser");
let user = JSON.parse(localStorage.getItem(mobile));

// Show data
document.getElementById("uid").innerText = user.id;
document.getElementById("wallet").innerText = user.wallet;
</script>

</body>
</html>
