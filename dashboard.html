<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<p id="mobile"></p>
<p id="amount"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_ANON_KEY"
);

async function loadData() {
  let mobile = localStorage.getItem("mobile");

  document.getElementById("mobile").innerText = "Mobile: " + mobile;

  let { data, error } = await supabase
    .from("users")
    .select("*")
    .eq("mobile", mobile)
    .single();

  if (data) {
    document.getElementById("amount").innerText = "Amount: " + data.amount;
  } else {
    document.getElementById("amount").innerText = "Error loading data";
  }
}

loadData();
</script>

</body>
</html>
