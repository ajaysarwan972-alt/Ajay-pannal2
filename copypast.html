<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Paste</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#e5e7eb;margin:0;}

#userId{position:fixed;left:10px;top:10px;background:green;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}
#wallet{position:fixed;right:10px;top:10px;background:red;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}

.topBtns{margin-top:50px;display:flex;justify-content:space-around;padding:10px;}
.topBtn{width:22%;padding:10px;border-radius:20px;text-align:center;color:#fff;font-size:12px;cursor:pointer;}
.btn1{background:#6c5ce7;} .btn2{background:#00b894;} .btn3{background:#0984e3;} .btn4{background:#e17055;}

.container{margin:10px;background:#fff;padding:15px;border-radius:15px;padding-bottom:120px;}

.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

label{background:#f1f5f9;padding:6px;border-radius:8px;border:1px solid #ccc;color:red;font-weight:bold;font-size:12px;}
input{padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;}

.radio{display:flex;justify-content:space-around;margin:15px 0;}
.radio label{background:#0f766e;color:#fff;padding:10px;border-radius:10px;}

table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{border:1px solid #ccc;padding:10px;text-align:center;}
th{color:red;}

.del{background:red;color:#fff;border:none;padding:8px 12px;border-radius:10px;cursor:pointer;}

.bottom{position:fixed;bottom:0;width:100%;display:flex;}
.total{width:33%;background:#ef4444;color:#fff;text-align:center;padding:15px;}
.submit{width:34%;background:#22c55e;color:#fff;text-align:center;padding:15px;cursor:pointer;}
.back{width:33%;background:#ef4444;color:#fff;text-align:center;padding:15px;cursor:pointer;}

.whatsapp{position:fixed;bottom:80px;right:15px;background:#25D366;color:#fff;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;}
</style>
</head>

<body>

<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>

<div class="topBtns">
  <div class="topBtn btn1" onclick="location.href='game.html'">JODI</div>
  <div class="topBtn btn2" onclick="location.href='haruf.html'">HARUF</div>
  <div class="topBtn btn3" onclick="location.href='crossing.html'">CROSSING</div>
  <div class="topBtn btn4" onclick="location.href='copy-past.html'">COPY PASTE</div>
</div>

<div class="container">

<div class="row">
  <div>
    <label>ENTER DIGIT</label>
    <input type="number" id="digits">
  </div>
  <div>
    <label>ENTER AMOUNT</label>
    <input type="number" id="amt">
  </div>
</div>

<div class="radio">
  <label><input type="radio" name="p" value="with" checked> With Palti</label>
  <label><input type="radio" name="p" value="without"> Without Palti</label>
</div>

<button onclick="generate()">ADD</button>

<table id="table">
<tr><th>NUMBER</th><th>AMOUNT</th><th>ACTION</th></tr>
</table>

</div>

<div class="bottom">
  <div class="total" id="total">₹ 0</div>
  <div class="submit" onclick="submitData()">SUBMIT</div>
  <div class="back" onclick="location.reload()">BACK</div>
</div>

<a class="whatsapp" href="https://wa.me/919876543210">💬</a>

<script>

let list=[];
let total=0;

const user = JSON.parse(localStorage.getItem("user"));
if(!user){ location.href="index.html"; }

const client = supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

async function loadWallet(){
  const { data } = await client.from("login").select("balance").eq("id", user.id).single();
  if(data){
    wallet.innerText="₹ "+data.balance;
    userId.innerText="ID: "+user.id;
  }
}
loadWallet();

function generate(){
  let d = digits.value.toString();
  let amount = Number(amt.value);

  if(!d || !amount){ alert("Fill"); return; }

  if(d.length % 2 !== 0) d = "0"+d;

  let pairs=[];
  for(let i=0;i<d.length;i+=2){
    pairs.push(d[i]+d[i+1]);
  }

  let mode=document.querySelector('input[name="p"]:checked').value;

  pairs.forEach(p=>{
    list.push({num:p,amt:amount});
    if(mode==="with"){
      list.push({num:p[1]+p[0],amt:amount});
    }
  });

  render();
}

function render(){
  let t=document.getElementById("table");
  t.innerHTML=`<tr><th>NUMBER</th><th>AMOUNT</th><th>ACTION</th></tr>`;
  total=0;

  list.forEach((x,i)=>{
    total+=x.amt;
    t.innerHTML+=`
    <tr>
      <td>${x.num}</td>
      <td>${x.amt}</td>
      <td><button class="del" onclick="del(${i})">DELETE</button></td>
    </tr>`;
  });

  document.getElementById("total").innerText="₹ "+total;
}

function del(i){
  list.splice(i,1);
  render();
}

async function submitData(){

  if(total<=0){ alert("No Data"); return; }

  const { data } = await client.from("login").select("balance").eq("id", user.id).single();

  if(data.balance < total){
    alert("Low balance");
    return;
  }

  await client.from("login").update({ balance: data.balance - total }).eq("id", user.id);

  alert("Submitted");
  location.reload();
}

</script>

</body>
</html>
