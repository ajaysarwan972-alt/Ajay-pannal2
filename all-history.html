<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Game History</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

/* HEADER */
.header {
    background: black;
    color: white;
    padding: 12px;
    text-align: center;
    font-size: 18px;
}

/* CARD */
.card {
    background: white;
    margin: 10px;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* TOP */
.top {
    display: flex;
    justify-content: space-between;
}

.game {
    color: red;
    font-weight: bold;
}

.time {
    font-size: 12px;
    color: gray;
}

/* BET ROW */
.betRow {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    padding-top: 5px;
    border-top: 1px solid #eee;
}

.number {
    color: red;
    font-weight: bold;
}

.amount {
    background: green;
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
}

/* TOTAL */
.total {
    margin-top: 8px;
    font-weight: bold;
    color: blue;
}
</style>

</head>

<body>

<div class="header">Game History</div>

<div id="historyContainer"></div>

<script>

let history = JSON.parse(localStorage.getItem("history")) || [];
let container = document.getElementById("historyContainer");

// latest first
history.reverse();

history.forEach(item => {

    let card = document.createElement("div");
    card.className = "card";

    let betsHTML = "";

    item.bets.forEach(bet => {
        betsHTML += `
            <div class="betRow">
                <div>Bet No: <span class="number">${bet.number}</span></div>
                <div class="amount">₹ ${bet.amount}</div>
            </div>
        `;
    });

    card.innerHTML = `
        <div class="top">
            <div class="game">GHAZIABAD</div>
            <div class="time">${item.date}</div>
        </div>

        ${betsHTML}

        <div class="total">Total: ₹ ${item.total}</div>
    `;

    container.appendChild(card);

});

</script>

</body>
</html>
