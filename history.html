<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

/* CARD */
.card {
    background: white;
    margin: 10px;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* TOP ROW */
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.game {
    color: red;
    font-weight: bold;
}

.time {
    color: gray;
    font-size: 12px;
}

/* BOTTOM ROW */
.bottom {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
}

.bet {
    color: red;
    font-weight: bold;
}

.amount {
    background: red;
    color: white;
    padding: 5px 10px;
    border-radius: 6px;
}
</style>

</head>

<body>

<div id="historyList"></div>

<script>

let historyData = JSON.parse(localStorage.getItem("history")) || [];
let container = document.getElementById("historyList");

// REVERSE (latest first)
historyData.reverse();

historyData.forEach(item => {

    item.bets.forEach(bet => {

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="top">
                <div class="game">GHAZIABAD</div>
                <div class="time">${item.date}</div>
            </div>

            <div class="bottom">
                <div>
                    Jodi Digit <span class="bet">Bet No.: ${bet.number}</span>
                </div>
                <div class="amount">₹ ${bet.amount}</div>
            </div>
        `;

        container.appendChild(div);
    });

});

</script>

</body>
</html>
