<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Winning</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.header{background:green;color:#fff;text-align:center;padding:15px;}
.total{background:#fff;margin:10px;padding:15px;text-align:center;font-weight:bold;}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px;}
.win{color:green;font-weight:bold;}
</style>
</head>

<body>

<div class="header">My Winning</div>

<div class="total" id="total">Total: ₹ 0</div>

<div id="list"></div>

<script>

// ✅ FIXED SUPABASE
const client = window.supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 USER ID
var userId = localStorage.getItem("user_id");

if(!userId){
    alert("Login first!");
}

// 🔥 LOAD DATA (FIXED TABLE)
async function loadData(){

    let {data, error} = await client
        .from("admin_winning")   // 👈 IMPORTANT CHANGE
        .select("*")
        .eq("user_id", userId)
        .order("id",{ascending:false});

    if(error){
        console.log(error);
        return;
    }

    let total = 0;
    let html = "";

    if(data && data.length > 0){
        data.forEach(function(item){

            let amount = item.amount || 0;
            total += amount;

            let date = new Date(item.created_at).toLocaleString();

            html += `
            <div class="card">
                <div>Market: ${item.market}</div>
                <div>Date: ${date}</div>
                <div class="win">₹ ${amount}</div>
            </div>
            `;
        });
    }else{
        html = "No Winning Found";
    }

    document.getElementById("list").innerHTML = html;
    document.getElementById("total").innerHTML = "Total: ₹ " + total;
}

loadData();

</script>

</body>
</html>
