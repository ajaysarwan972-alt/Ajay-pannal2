<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Winning</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.header{background:green;color:#fff;text-align:center;padding:15px;}
.total{background:#fff;margin:10px;padding:15px;text-align:center;font-weight:bold;}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px;}
.win{color:green;font-weight:bold;}
</style>
</head>

<body>

<div class="header">My Winning</div>

<div class="total" id="total">Total: ₹ 0</div>

<div id="list"></div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 LOGIN USER ID AUTO
var userId = localStorage.getItem("user_id");

if(!userId){
    alert("Login first!");
}

// 🔥 LOAD DATA
async function loadData(){

    var res = await client
        .from("history")
        .select("*")
        .eq("user_id", userId)
        .eq("type","win")   // 👈 sirf winning show karega
        .order("id",{ascending:false});

    var total = 0;
    var html = "";

    if(res.data){
        res.data.forEach(function(item){

            var amount = item.amount || 0;
            total += amount;

            var date = new Date(item.created_at).toLocaleString();

            html += `
            <div class="card">
                <div>Market: ${item.market}</div>
                <div>Date: ${date}</div>
                <div class="win">₹ ${amount}</div>
            </div>
            `;
        });
    }

    document.getElementById("list").innerHTML = html || "No Winning Found";
    document.getElementById("total").innerHTML = "Total: ₹ " + total;
}

loadData();

</script>

</body>
</html>
