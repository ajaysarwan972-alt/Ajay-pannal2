<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Amount Setter</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

h2{
  color:#22c55e;
  text-align:center;
}

textarea,input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

textarea{
  height:120px;
}

input{
  background:#1e293b;
  color:#fff;
}

button{
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td,th{
  border:1px solid #334155;
  padding:10px;
  text-align:center;
}

th{
  background:#1e293b;
}

.total{
  margin-top:15px;
  font-size:18px;
  color:#facc15;
  text-align:center;
}

.copy-btn{
  background:#3b82f6;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Number Amount Auto Setter</h2>

<label>Enter Numbers:</label>
<textarea id="numbers" oninput="formatNumbers()" placeholder="12 45 78 90"></textarea>

<label>Enter Amount:</label>
<input type="number" id="amount" placeholder="100">

<button onclick="setAmount()">SET</button>
<button class="copy-btn" onclick="copyData()">COPY RESULT</button>

<table id="result">
<thead>
<tr>
<th>Number</th>
<th>Amount</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="total" id="total"></div>

<script>

// 🔥 AUTO FORMAT (2 digit ke baad space)
function formatNumbers(){
  let input = document.getElementById("numbers");
  
  let value = input.value.replace(/\D/g,''); // sirf number
  let formatted = value.match(/.{1,2}/g);
  
  if(formatted){
    input.value = formatted.join(" ");
  }
}

// SET BUTTON
function setAmount(){
  let nums=document.getElementById("numbers").value;
  let amount=parseInt(document.getElementById("amount").value);

  if(!nums || !amount){
    alert("Enter numbers and amount");
    return;
  }

  let arr=nums.split(/\s+|,/)
              .filter(n=>n!=="");

  arr=[...new Set(arr)]; // remove duplicates

  let tbody=document.querySelector("#result tbody");
  tbody.innerHTML="";

  let total=0;

  arr.forEach(n=>{
    total += amount;

    let row=`
      <tr>
        <td>${n}</td>
        <td>${amount}</td>
      </tr>
    `;

    tbody.innerHTML+=row;
  });

  document.getElementById("total").innerText="Total = ₹ " + total;
}

// COPY BUTTON
function copyData(){
  let rows=document.querySelectorAll("#result tbody tr");
  let text="";

  rows.forEach(r=>{
    let cols=r.querySelectorAll("td");
    text += cols[0].innerText + " = " + cols[1].innerText + "\n";
  });

  navigator.clipboard.writeText(text);
  alert("Copied!");
}

</script>

</body>
</html>
