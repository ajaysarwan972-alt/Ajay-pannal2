<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(45deg, purple, blue);
  color: white;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.idbox {
  background: green;
  padding: 5px 10px;
  border-radius: 5px;
}

.balancebox {
  background: red;
  padding: 5px 10px;
  border-radius: 5px;
}

.grid {
  padding: 10px;
  margin-bottom: 80px;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #eee;
  padding: 10px 0;
}

.btn {
  background: #ddd;
  padding: 10px 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="idbox" id="userId">ID: 1</div>
  <div class="balancebox" id="balance">₹100</div>
</div>

<!-- BOX AREA -->
<div class="grid" id="boxContainer">
  Loading...
</div>

<!-- BOTTOM -->
<div class="bottom">
  <div class="btn">Home</div>
  <div class="btn">Wallet</div>
  <div class="btn">Add</div>
  <div class="btn">Profile</div>
</div>

<script>
async function loadBoxes() {
  try {
    let res = await fetch("https://script.google.com/macros/s/AKfycbzVuAQurUrZRFHUF_wpk3NYQjrm0eBBP9k3rct8ZpX0MWZ6pr7bnCvz6Jq-zxyTaM0GpA/exec");
    let data = await res.json();

    let container = document.getElementById("boxContainer");
    container.innerHTML = "";

    if (!data || data.length === 0) {
      container.innerHTML = "No Data Found";
      return;
    }

    data.forEach(item => {
      let box = `
        <div class="card">
          <h3>${item.name}</h3>
          <div>${item.number}</div>
          <div>${item.open} - ${item.close}</div>
        </div>
      `;
      container.innerHTML += box;
    });

  } catch (e) {
    document.getElementById("boxContainer").innerHTML = "Error loading data";
    console.log(e);
  }
}

loadBoxes();
</script>

</body>
</html>
