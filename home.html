<!DOCTYPE html>
<html>
<head>
<title>Home</title>
</head>

<body>

<h2>Welcome</h2>

<p>Mobile: <span id="mobile"></span></p>
<p>Balance: <span id="balance"></span></p>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if(user){
  document.getElementById("mobile").innerText = user.mobile;
  document.getElementById("balance").innerText = user.balance || 0;
} else {
  alert("Login first!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
