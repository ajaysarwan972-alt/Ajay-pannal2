<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

.container{
  display:flex;
  justify-content:space-around;
  margin-top:100px;
}

.btn{
  width:40%;
  padding:30px 10px;
  font-size:18px;
  font-weight:bold;
  background:#fff;
  border:3px solid green;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="container">
  Loading...
</div>

<script>

const SUPABASE_URL = "https://katbdbzoufiblnnsoxkk.supabase.co"; // ✅ tera URL
const supabaseKey = "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a ";

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadButtons(){

  let { data, error } = await client
  .from("Game result")
  .select("name")
  .limit(2);

  let container = document.getElementById("container");

  if(error){
    container.innerText = "Error";
    console.log(error);
    return;
  }

  container.innerHTML = "";

  data.forEach(item => {
    let btn = document.createElement("div");
    btn.className = "btn";
    btn.innerText = item.name;

    btn.onclick = () => {
      window.location.href = "game.html";
    };

    container.appendChild(btn);
  });

}

loadButtons();

</script>

</body>
</html>
