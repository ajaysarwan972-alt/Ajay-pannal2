<h2 id="user"></h2>

<h3>Balance: ₹<span id="balance">0</span></h3>

<button onclick="playGame()">Play Game (₹50)</button>

<script>
const mobile = localStorage.getItem("mobile");

if (!mobile) {
  window.location.href = "index.html";
}

// show user
document.getElementById("user").innerText = "User: " + mobile;

// balance key
const balanceKey = "balance_" + mobile;

// get balance
let balance = localStorage.getItem(balanceKey);

if (!balance) {
  balance = 0;
  localStorage.setItem(balanceKey, balance);
}

balance = parseInt(balance);

// show balance
document.getElementById("balance").innerText = balance;


// 🎮 GAME FUNCTION
function playGame() {
  let gameCost = 50;

  if (balance >= gameCost) {
    balance = balance - gameCost;

    localStorage.setItem(balanceKey, balance);
    document.getElementById("balance").innerText = balance;

    alert("Game Started 🎮\n₹50 deducted");

    // 👉 yaha game page pe bhej sakta hai
    // window.location.href = "game.html";

  } else {
    alert("Insufficient Balance ❌");
  }
}
</script>
