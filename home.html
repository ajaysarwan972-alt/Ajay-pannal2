<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: linear-gradient(to right, #ddd, #eee);
    }

    .user-id {
      background: green;
      color: white;
      padding: 10px 20px;
      border-radius: 15px;
      font-weight: bold;
    }

    .wallet {
      background: red;
      color: white;
      padding: 10px 20px;
      border-radius: 15px;
      font-weight: bold;
    }

    /* Game Grid */
    .games {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 15px;
    }

    /* Big Box */
    .game-box {
      background: #fff;
      border-radius: 15px;
      padding: 30px 15px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border: 3px solid limegreen;
    }

    .game-box.red {
      border-color: red;
    }

    .game-box h3 {
      margin: 10px 0;
      font-size: 20px;
    }

    .game-box p {
      color: #555;
      font-size: 14px;
    }

  </style>
</head>

<body>

<!-- Top -->
<div class="top-bar">
  <div class="user-id">ID: 29484</div>
  <div class="wallet">₹ 102.80</div>
</div>

<!-- Games -->
<div class="games">

  <!-- 1st BOX (LINK ADDED) -->

    <h3>DISAWAR</h3>

  </div>

  <!-- बाकी normal -->
  <div class="game-box">
    <h3>DISAWAR BAZAR</h3>

  </div>

  <div class="game-box red">
    <h3>DELHI BAZAR</h3>
    <p>6:00 am - 2:45 pm</p>
  </div>

  <div class="game-box red">
    <h3>TAJ</h3>
    <p>6:00 am - 3:00 pm</p>
  </div>

  <div class="game-box red">
    <h3>SHRI GANESH</h3>
    <p>6:00 am - 4:10 pm</p>
  </div>

  <div class="game-box red">

    <p>6:00 am - 5:45 pm</p>
  </div>

  <div class="game-box">
    <h3>FARIDABAD VIP</h3>
    <p>6:00 am - 8:00 pm</p>
  </div>

  <div class="game-box">
    <h3>GHAZIABAD</h3>
    <p>6:00 am - 8:45 pm</p>
  </div>

  <div class="game-box">
    <h3>GAME 9</h3>
    <p>Time</p>
  </div>

  <div class="game-box">
    <h3>GAME 10</h3>
    <p>Time</p>
  </div>

</div>

</body>
</html>
