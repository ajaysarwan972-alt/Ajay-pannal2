<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 15px;
    }

    .box {
      background: #eee;
      border-radius: 15px;
      padding: 40px 10px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border: 3px solid green;
    }

    a {
      text-decoration: none;
      color: black;
    }
  </style>
</head>

<body>
<div style="padding:15px; background:#fff; margin:10px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); text-align:center;">
  <h3>User ID: <span id="userId">Loading...</span></h3>
  <h3>Balance: ₹<span id="balance">Loading...</span></h3>
</div>
<div class="grid">

  <a href="game.html"><div class="box">Game 1</div></a>
  <a href="game.html"><div class="box">Game 2</div></a>

  <a href="game.html"><div class="box">Game 3</div></a>
  <a href="game.html"><div class="box">Game 4</div></a>

  <a href="game.html"><div class="box">Game 5</div></a>
  <a href="game.html"><div class="box">Game 6</div></a>

  <a href="game.html"><div class="box">Game 7</div></a>
  <a href="game.html"><div class="box">Game 8</div></a>

  <a href="game.html"><div class="box">Game 9</div></a>
  <a href="game.html"><div class="box">Game 10</div></a>

</div>
<script>
async function loadWallet() {
  const mobile = localStorage.getItem("mobile");

  const res = await fetch("https://api.baserow.io/api/database/rows/table/897341/?user_field_names=true", {
    headers: {
      "Authorization": "Token 353iB1eHvIZwRS163mml32fuzhQ5heQf"
    }
  });

  const data = await res.json();

  data.results.forEach(user => {
    if(user.mobile.toString() === mobile)
      document.getElementById("userId").innerText = user.id;
      document.getElementById("balance").innerText = user.amount;
    }
  });
}

loadWallet();
    </script>
</body>
</html>
