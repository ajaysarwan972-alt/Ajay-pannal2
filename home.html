<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    .info {
      font-size: 16px;
      margin: 10px 0;
    }

    .balance {
      font-size: 22px;
      font-weight: bold;
      color: green;
    }

    .btn {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #5a67d8;
    }
  </style>

</head>

<body>

<div class="card">
  <h2>Welcome 👋</h2>

  <div class="info">📱 Mobile: <span id="mobile"></span></div>
  <div class="info balance">💰 Balance: ₹<span id="balance"></span></div>

  <button class="btn" onclick="logout()">Logout</button>
</div>

<script>
  const user = JSON.parse(localStorage.getItem("user"));

  if(user){
    document.getElementById("mobile").innerText = user.mobile;
    document.getElementById("balance").innerText = user.balance || 0;
  } else {
    alert("Login first!");
    window.location.href = "index.html";
  }

  function logout(){
    localStorage.removeItem("user");
    window.location.href = "index.html";
  }
</script>

</body>
  <div class="topbar">
  <div class="menu">☰</div>

  <div class="userid">
    ID: <span id="userid"></span>
  </div>

  <div class="balancebox">
    ₹ <span id="topbalance"></span>
  </div>
</div>
</html>
