<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: linear-gradient(to right,#dfe9f3,#ffffff);
}

.userid {
    background: green;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: bold;
}

.wallet {
    background: red;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: bold;
}

/* BOX GRID */
.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 15px;
}

.box {
    background: white;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    border: 4px solid green;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.box.closed {
    border-color: red;
}

.title {
    font-size: 22px;
    font-weight: bold;
}

.result {
    font-size: 28px;
    color: red;
    margin: 10px 0;
}

.time {
    color: blue;
    font-weight: bold;
}

.status {
    margin-top: 10px;
    font-size: 16px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <div class="userid">ID: 29484</div>
    <div class="wallet">₹ 120.30</div>
</div>

<!-- BOXES -->
<div class="container" id="gameContainer"></div>

<script>

// 🔥 GAME DATA (yaha change kar sakta hai)
let games = [
 {name:"DISAWAR", open:"06:00", close:"04:00", result:"16"},
 {name:"DISAWAR BAZAR", open:"06:00", close:"04:30", result:"62"},
 {name:"DELHI BAZAR", open:"06:00", close:"14:45", result:"**"},
 {name:"TAJ", open:"06:00", close:"15:00", result:"**"},
 {name:"SHRI GANESH", open:"06:00", close:"16:10", result:"**"},
 {name:"FARIDABAD", open:"06:00", close:"17:45", result:"**"},
 {name:"FARIDABAD VIP", open:"06:00", close:"20:00", result:"**"},
 {name:"GHAZIABAD", open:"06:00", close:"20:45", result:"**"},
 {name:"GAME 9", open:"06:00", close:"21:30", result:"**"},
 {name:"GAME 10", open:"06:00", close:"22:00", result:"**"}
];

// 🔥 TIME CHECK FUNCTION
function isOpen(open, close) {
    let now = new Date();
    let current = now.getHours()*60 + now.getMinutes();

    let o = open.split(":");
    let c = close.split(":");

    let openTime = parseInt(o[0])*60 + parseInt(o[1]);
    let closeTime = parseInt(c[0])*60 + parseInt(c[1]);

    return current >= openTime && current <= closeTime;
}

// 🔥 LOAD BOXES
let container = document.getElementById("gameContainer");

games.forEach(game => {

    let open = isOpen(game.open, game.close);

    let box = document.createElement("div");
    box.className = "box " + (open ? "" : "closed");

    box.innerHTML = `
        <div class="title">${game.name}</div>
        <div class="result">${game.result}</div>
        <div class="time">${game.open} - ${game.close}</div>
        <div class="status">${open ? "🟢 OPEN" : "🔴 CLOSED"}</div>
    `;

    // 👉 future game link
    box.onclick = function(){
        alert(game.name + " game open karega");
        // yaha link dal sakta hai
        // window.location.href = "game1.html";
    };

    container.appendChild(box);
});

</script>

</body>
</html>
