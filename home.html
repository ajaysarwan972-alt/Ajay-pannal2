<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#0ea5e9;
  color:white;
  position:fixed;
  width:100%;
  top:0;
}

.userid{
  background:green;
  padding:5px 10px;
  border-radius:10px;
}

.balancebox{
  background:red;
  padding:5px 10px;
  border-radius:10px;
}

/* CARD */
.container{
  margin-top:70px;
  padding:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

.box{
  border:2px solid green;
  border-radius:10px;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.box span{
  color:red;
  font-size:20px;
}

.box p{
  color:blue;
  font-size:13px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#667eea;
  color:white;
  border:none;
  border-radius:8px;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  border-top:1px solid #ccc;
}
</style>

</head>
<body>

<!-- TOP -->
<div class="topbar">
  <div id="userid">ID: --</div>
  <div id="topbalance">₹0</div>
</div>

<div class="container">
<div class="card">

<h3>Welcome 👋</h3>
<p>📱 <span id="mobile"></span></p>
<p>💰 Balance: ₹<span id="balance"></span></p>

<button class="btn" onclick="logout()">Logout</button>

<div class="grid" id="grid"></div>

</div>
</div>

<!-- BOTTOM -->
<div class="bottom-nav">
  <div>🏠 Home</div>
  <div>💰 Wallet</div>
  <div>➕ Add</div>
  <div>👤 Profile</div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="index.html";
}

// USER DATA
document.getElementById("mobile").innerText = user.mobile;
document.getElementById("balance").innerText = user.balance || 0;
document.getElementById("userid").innerText = "ID: " + user.mobile;
document.getElementById("topbalance").innerText = "₹" + (user.balance || 0);

// GOOGLE SHEET DATA
fetch("https://script.google.com/macros/s/AKfycbyiNv6QJCOobWdJDfOE9hpLhAy4OHxA1uAlpsat9aXTkMKpslLODNtxLttbwQr9IAejpQ/exec")
.then(res=>res.json())
.then(data=>{

  let html = "";

  data.forEach(item=>{
    html += `
      <div class="box">
        ${item.name}<br>
        <span>${item.number}</span>
        <p>${item.time}</p>
      </div>
    `;
  });

  document.getElementById("grid").innerHTML = html;

});

function logout(){
  localStorage.removeItem("user");
  window.location.href="index.html";
}
</script>

</body>
</html>
