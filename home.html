<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;   /* 🔥 ye important */
  margin-top:100px;
  padding:10px;
  gap:10px;
}
  
.btn{
  width:48%;
  height:100px;
  margin-bottom:10px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;
  font-weight:bold;

  background:#fff;
  border:3px solid green;
  border-radius:15px;
  cursor:pointer;
}
</style>
</head>

<body>
<div id="wallet">0</div>
<div class="container" id="container">
  Loading...
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "index.html";
}
// ✅ SUPABASE CONFIG (FIXED)
const SUPABASE_URL = "https://katbdbzoufiblnnsoxkk.supabase.co";
const SUPABASE_KEY = "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"; // ❗ space hata diya

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
async function loadWallet(){
  const { data } = await client
    .from("login")
    .select("balance")
    .eq("id", user.id)
    .single();

  if(data){
    document.getElementById("wallet").innerText = "₹ " + data.balance;
  }
}
// 🔥 LOAD BUTTONS
async function loadButtons(){

  let { data, error } = await client
  .from("Game result")
  .select("name, number")
  .limit(3);

  let container = document.getElementById("container");

  if(error){
    container.innerText = "Error";
    console.log(error);
    return;
  }

  if(!data || data.length === 0){
    container.innerText = "No Data";
    return;
  }

  container.innerHTML = "";

  data.forEach(item => {
    let btn = document.createElement("div");
    btn.className = "btn";
    btn.innerText = item.name + " - " + item.number;

    btn.onclick = () => {
      window.location.href = "game.html";
    };

    container.appendChild(btn);
  });

}
loadWallet();
loadButtons();

</script>

</body>
</html>
