<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Data</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(45deg, purple, blue);
  color: white;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.idbox {
  background: green;
  padding: 5px 10px;
  border-radius: 5px;
}

.balancebox {
  background: red;
  padding: 5px 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="idbox" id="userid">ID: Loading...</div>
  <div class="balancebox" id="balance">Loading...</div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "YOUR_PROJECT_URL",
  "YOUR_ANON_KEY"
);

async function loadData() {

  let userId = 1; // abhi fix rakha

  let { data, error } = await supabaseClient
    .from("users")
    .select("*")
    .eq("id", userId)
    .single();

  if (error) {
    document.getElementById("userid").innerText = "Error";
    document.getElementById("balance").innerText = "Error";
    return;
  }

  document.getElementById("userid").innerText = "ID: " + data.id;
  document.getElementById("balance").innerText = "₹" + data.balance;
}

loadData();
</script>

</body>
</html>
