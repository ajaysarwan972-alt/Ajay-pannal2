<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #eee;
    }

    .user-id {
      background: green;
      color: white;
      padding: 10px 15px;
      border-radius: 15px;
      font-weight: bold;
    }

    .wallet {
      background: red;
      color: white;
      padding: 10px 15px;
      border-radius: 15px;
      font-weight: bold;
    }

    /* Grid */
    .games {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 15px;
    }

    /* Big Box */
    .game-box {
      background: #fff;
      border-radius: 15px;
      padding: 30px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      border: 3px solid limegreen;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .game-box.red {
      border-color: red;
    }

    .game-box h3 {
      margin: 10px 0;
      font-size: 20px;
    }

    .game-box p {
      font-size: 14px;
      color: #555;
    }

  </style>
</head>

<body>

<!-- TOP -->
<div class="top-bar">
  <div class="user-id">ID: 29484</div>
  <div class="wallet">₹ 120.00</div>
</div>

<!-- BOXES -->
<div class="games">

  <div class="game-box" onclick="openGame('disawar')">
    <h3>DISAWAR</h3>
    <p>6:00 am - 4:00 am</p>
  </div>

  <div class="game-box" onclick="openGame('disawar_bazar')">
    <h3>DISAWAR BAZAR</h3>
    <p>6:00 am - 4:30 am</p>
  </div>

  <div class="game-box red" onclick="openGame('delhi')">
    <h3>DELHI BAZAR</h3>
    <p>6:00 am - 2:45 pm</p>
  </div>

  <div class="game-box red" onclick="openGame('taj')">
    <h3>TAJ</h3>
    <p>6:00 am - 3:00 pm</p>
  </div>

  <div class="game-box red" onclick="openGame('ganesh')">
    <h3>SHRI GANESH</h3>
    <p>6:00 am - 4:10 pm</p>
  </div>

  <div class="game-box red" onclick="openGame('faridabad')">
    <h3>FARIDABAD</h3>
    <p>6:00 am - 5:45 pm</p>
  </div>

  <div class="game-box" onclick="openGame('faridabad_vip')">
    <h3>FARIDABAD VIP</h3>
    <p>6:00 am - 8:00 pm</p>
  </div>

  <div class="game-box" onclick="openGame('ghaziabad')">
    <h3>GHAZIABAD</h3>
    <p>6:00 am - 8:45 pm</p>
  </div>

  <div class="game-box" onclick="openGame('game9')">
    <h3>GAME 9</h3>
    <p>Time</p>
  </div>

  <div class="game-box" onclick="openGame('game10')">
    <h3>GAME 10</h3>
    <p>Time</p>
  </div>

</div>

<script>

function openGame(gameName){
  // game name save
  localStorage.setItem("currentGame", gameName);

  // open page
  window.location.href = "game.html";
}

</script>

</body>
</html>
