<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;}

.top{
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.box{
  background:#eee;
  border:3px solid green;
  border-radius:15px;
  padding:30px 10px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.disabled{
  background:#ccc;
  border-color:red;
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div class="top">
  <h3>User ID: <span id="userId">Loading...</span></h3>
  <h3>Balance: ₹<span id="balance">Loading...</span></h3>
</div>

<div class="grid" id="container">Loading...</div>

<div class="bottom">
  <div>🏠 Home</div>
  <div>💰 Wallet</div>
  <div>📞 Support</div>
  <div>🚪 Logout</div>
</div>

<script>

// ✅ TERA PROJECT URL (already set)
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";

// 🔴 SIRF YEH DALNA HAI
const supabaseKey = "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a ";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// ⏰ TIME CHECK
function isOpen(open, close){
  let now = new Date();
  let current = now.getHours()*60 + now.getMinutes();

  let o = open.split(":");
  let c = close.split(":");

  let openMin = parseInt(o[0])*60 + parseInt(o[1]);
  let closeMin = parseInt(c[0])*60 + parseInt(c[1]);

  return current >= openMin && current <= closeMin;
}

// 🔥 LOAD DATA
async function loadGames(){

let { data, error } = await supabase
.from("Game")
.select("*")
.order("id");

let container = document.getElementById("container");

if(error){
  container.innerText = "Error loading data";
  console.log(error);
  return;
}

if(!data || data.length === 0){
  container.innerText = "No Data";
  return;
}

container.innerHTML = "";

data.forEach(item => {

  let box = document.createElement("div");
  box.className = "box";

  let status = isOpen(item.open, item.close);

  box.innerText = item.name + " - " + item.number;

  if(!status){
    box.classList.add("disabled");
  }

  box.onclick = () => {
    if(status){
      window.location.href = "game.html";
    }else{
      alert("Game Closed");
    }
  };

  container.appendChild(box);

});

}

loadGames();

</script>

</body>
</html>
