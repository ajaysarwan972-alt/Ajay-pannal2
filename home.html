<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  text-align:center;
}

.box{
  background:white;
  margin:20px;
  padding:20px;
  border-radius:15px;
}

input{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:90%;
  padding:12px;
  background:red;
  color:white;
  border:none;
  border-radius:20px;
  font-size:18px;
}

a{
  text-decoration:none;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="text" id="mobile" placeholder="Mobile Number">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<br><br>

<a href="signup.html">
<button style="background:blue;">REGISTER NOW</button>
</a>

<br><br>

<a href="https://wa.me/918901239533">
  WhatsApp Support
</a>

</div>

<script>

async function login(){

let mobile = document.getElementById("mobile").value.trim();
let password = document.getElementById("password").value.trim();

if(!mobile || !password){
  alert("Enter details first");
  return;
}

const res = await fetch("https://api.baserow.io/api/database/rows/table/897341/?user_field_names=true", {
  headers: {
    "Authorization": "Token 3S3iB1eHvIZwRS163mnl32fuzhQ5heQf"
  }
});

const data = await res.json();

let found = false;

for(let user of data.results){

  if(
    user.mobile.toString().trim() === mobile &&
    user.password.toString().trim() === password
  ){
    found = true;
    localStorage.setItem("mobile", mobile);
    break;
  }

}

if(found){
  alert("Login Success ✅");
  window.location.href = "home.html";
}else{
  alert("Wrong Mobile or Password ❌");
}

}

</script>

</body>
</html>
