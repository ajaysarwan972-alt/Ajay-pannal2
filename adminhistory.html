<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin History</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#f2f2f2;font-family:Arial;margin:0;}

.header{
background:#fff;
padding:15px;
text-align:center;
font-weight:bold;
}

.card{
background:#fff;
margin:10px;
padding:15px;
border-radius:12px;
}

.row{
display:flex;
justify-content:space-between;
}

.market{color:red;font-weight:bold;}
.date{font-size:12px;color:#666;}

.amount{
background:red;
color:#fff;
padding:5px 10px;
border-radius:6px;
}
</style>
</head>

<body>

<div class="header">Admin History</div>
<div id="history"></div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

async function loadHistory(){

let {data} = await client
.from("history")
.select("*")
.order("id",{ascending:false});

let html="";

data.forEach(item=>{

let numbers=[];

try{

if(!item.data) return;

let parsed = typeof item.data==="string"
? JSON.parse(item.data)
: item.data;

if(!Array.isArray(parsed)) return;

parsed.forEach(p=>{

if(!p || p.number==="TYPING") return;

let num="";
let amt=0;

/* NORMAL */
if(p.number!==undefined && p.amount!==undefined && !p.type){
num=String(p.number).padStart(2,'0');
amt=Number(p.amount);
}

/* COPY PASTE */
else if(p.num!==undefined && p.a!==undefined){
num=String(p.num).padStart(2,'0');
amt=Number(p.a);
}

/* ANDAR */
else if(p.type==="A"){
num=p.number+"×";
amt=Number(p.amount||0);
}

/* BAHAR */
else if(p.type==="B"){
num="×"+p.number;
amt=Number(p.amount||0);
}

/* PUSH */
if(num!=="" && !isNaN(amt)){
numbers.push({number:num,amount:amt});
}

});

}catch(e){
console.log("error",item.data);
}

/* SHOW */
numbers.forEach(n=>{

html+=`
<div class="card">
<div class="row">
<div class="market">${item.market}</div>
<div class="date">${new Date(item.created_at).toLocaleString()}</div>
</div>
<div class="row">
<div>User: ${item.user_id} | Bet No: ${n.number}</div>
<div class="amount">₹ ${n.amount}</div>
</div>
</div>
`;

});

});

document.getElementById("history").innerHTML = html || "No Data";

}

loadHistory();

</script>

</body>
</html>
