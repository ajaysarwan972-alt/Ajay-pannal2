<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin History</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    background:#f2f2f2;
    font-family:Arial;
    margin:0;
}

.header{
  background:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.filters{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:10px;
    background:#fff;
}

.filters select, .filters input{
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
    flex:1;
}

.filters button{
    padding:8px 12px;
    border:none;
    background:#28a745;
    color:#fff;
    border-radius:8px;
}

.card{
    background:#fff;
    margin:10px;
    padding:15px;
    border-radius:12px;
}

.row{
    display:flex;
    justify-content:space-between;
}

.market{
    color:red;
    font-weight:bold;
}

.date{
    font-size:12px;
    color:#666;
}

.amount{
    background:red;
    color:#fff;
    padding:5px 10px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">Admin History</div>

<div class="filters">
    <select id="filterUser"></select>
    <select id="filterMarket"></select>
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="loadHistory()">Apply</button>
</div>

<div id="history"></div>

<script>
const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 LOAD DROPDOWN DATA (AUTO FROM SUPABASE)
async function loadFilters(){

    const { data, error } = await client
        .from("history")
        .select("user_id, market");

    if(error){
        console.log(error);
        return;
    }

    let users = new Set();
    let markets = new Set();

    data.forEach(item=>{
        if(item.user_id) users.add(item.user_id);
        if(item.market) markets.add(item.market);
    });

    // USER DROPDOWN
    let userHTML = `<option value="">All Users</option>`;
    users.forEach(u=>{
        userHTML += `<option value="${u}">${u}</option>`;
    });
    document.getElementById("filterUser").innerHTML = userHTML;

    // MARKET DROPDOWN
    let marketHTML = `<option value="">All Market</option>`;
    markets.forEach(m=>{
        marketHTML += `<option value="${m}">${m}</option>`;
    });
    document.getElementById("filterMarket").innerHTML = marketHTML;
}

// 🔥 LOAD DATA
async function loadHistory(){

    const user = document.getElementById("filterUser").value;
    const market = document.getElementById("filterMarket").value;
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    let query = client.from("history").select("*").order("id", { ascending: false });

    if(user){
        query = query.eq("user_id", user);
    }

    if(market){
        query = query.eq("market", market);
    }

    if(start){
        query = query.gte("created_at", start + "T00:00:00");
    }

    if(end){
        query = query.lte("created_at", end + "T23:59:59");
    }

    const { data, error } = await query;

    if(error){
        console.log(error);
        return;
    }

    let html = "";

    data.forEach(item=>{

        let numbers = [];

        try{
            let parsed = JSON.parse(item.data || "[]");

            if(Array.isArray(parsed)){
                numbers = parsed;
            } else if(typeof parsed === "object"){
                numbers = Object.entries(parsed).map(([k,v])=>({
                    number: k,
                    amount: typeof v === "object" ? v.amount || v.value : v
                }));
            }
        }catch(e){
            return;
        }

        let date = new Date(item.created_at).toLocaleString();

        numbers.forEach(n=>{
            let num = String(n.number ?? "00").padStart(2,'0');
            let amount = n.amount ?? 0;

            html += `
            <div class="card">
                <div class="row">
                    <div class="market">${item.market}</div>
                    <div class="date">${date}</div>
                </div>
                <div class="row">
                    <div>User: ${item.user_id} | Bet No: ${num}</div>
                    <div class="amount">₹ ${amount}</div>
                </div>
            </div>
            `;
        });
    });

    document.getElementById("history").innerHTML = html || "No Data Found";
}

// 🔥 INIT
loadFilters();
loadHistory();

</script>

</body>
</html>
