<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin History</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    background:#f2f2f2;
    font-family:Arial;
    margin:0;
}

.header{
  background:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

/* 🔥 FILTER BUTTON STYLE */
.filters{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:10px;
    background:#fff;
}

.filters button, .filters select{
    padding:8px 12px;
    border:none;
    background:#007bff;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}

.filters button.active{
    background:red;
}

/* CARD */
.card{
    background:#fff;
    margin:10px;
    padding:15px;
    border-radius:12px;
}

.row{
    display:flex;
    justify-content:space-between;
}

.market{
    color:red;
    font-weight:bold;
}

.date{
    font-size:12px;
    color:#666;
}

.bet{
    margin-top:5px;
}

.amount{
    background:red;
    color:#fff;
    padding:5px 10px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">Admin History</div>

<!-- 🔥 NEW FILTER UI -->
<div class="filters">

    <!-- USER BUTTON FILTER -->
    <button onclick="setUser('')" class="active">All</button>
    <button onclick="setUser('1')">User 1</button>
    <button onclick="setUser('2')">User 2</button>
    <button onclick="setUser('3')">User 3</button>
    <button onclick="setUser('4')">User 4</button>
    <button onclick="setUser('5')">User 5</button>

    <!-- MARKET DROPDOWN -->
    <select onchange="setMarket(this.value)">
        <option value="">All Market</option>
        <option value="GALI">GALI</option>
        <option value="DS">DS</option>
        <option value="FD">FD</option>
        <option value="GZ">GZ</option>
    </select>

</div>

<div id="history"></div>

<script>
const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 GLOBAL FILTER STATE
let selectedUser = "";
let selectedMarket = "";

// USER BUTTON CLICK
function setUser(id){
    selectedUser = id;

    // active button highlight
    document.querySelectorAll(".filters button").forEach(btn=>{
        btn.classList.remove("active");
    });
    event.target.classList.add("active");

    loadHistory();
}

// MARKET SELECT
function setMarket(market){
    selectedMarket = market;
    loadHistory();
}

// 🔥 MAIN FUNCTION
async function loadHistory(){

    let query = client.from("history").select("*").order("id", { ascending: false });

    if(selectedUser){
        query = query.eq("user_id", selectedUser);
    }

    if(selectedMarket){
        query = query.eq("market", selectedMarket);
    }

    const { data, error } = await query;

    if(error){
        console.log(error);
        return;
    }

    let html = "";

    data.forEach(item=>{
        let numbers = [];

        try{
            let parsed = JSON.parse(item.data || "[]");

            if(Array.isArray(parsed)){
                numbers = parsed;
            } else if(typeof parsed === "object"){
                numbers = Object.entries(parsed).map(([k,v])=>({
                    number: k,
                    amount: typeof v === "object" ? v.amount || v.value : v
                }));
            }
        }catch(e){
            return;
        }

        let date = new Date(item.created_at).toLocaleString();

        numbers.forEach(n=>{
            let num = n.number ?? "00";
            let amount = n.amount ?? 0;
            let formattedNum = String(num).padStart(2,'0');

            html += `
            <div class="card">
                <div class="row">
                    <div class="market">${item.market}</div>
                    <div class="date">${date}</div>
                </div>

                <div class="row bet">
                    <div>User: ${item.user_id} | Bet No: ${formattedNum}</div>
                    <div class="amount">₹ ${amount}</div>
                </div>
            </div>
            `;
        });
    });

    document.getElementById("history").innerHTML = html || "No Data Found";
}

// LOAD DEFAULT
loadHistory();
</script>

</body>
</html>
