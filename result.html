<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.header{background:red;color:#fff;text-align:center;padding:15px;}
.row{background:#fff;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="header" id="title">Result</div>
<div id="list">Loading...</div>

<script>

// ✅ SUPABASE
const client = window.supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// ✅ GET MARKET NAME FROM URL
const params = new URLSearchParams(window.location.search);
const market = params.get("market");

// TITLE SET
document.getElementById("title").innerText = market + " Result";

// ✅ LOAD DATA
async function loadData(){

 let {data,error} = await client
   .from("Game result")
   .select("*")
   .eq("name", market);

 if(error){
   console.log(error);
   document.getElementById("list").innerHTML="Error loading data";
   return;
 }

 let html="";

 // ✅ TODAY DATE (AUTO)
 let today = new Date().toLocaleDateString();

 if(!data || data.length === 0){
   html = "<h3 style='padding:10px;'>No Data Found</h3>";
 }else{
   data.forEach(d=>{
     html+=`
     <div class="row">
       ${today} - <b>${d.number || "-"}</b>
     </div>`;
   });
 }

 document.getElementById("list").innerHTML=html;
}

// RUN
loadData();

</script>

</body>
</html>
