<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Single Game</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  background:#e5e7eb;
  margin:0;
}

/* HEADER */
.header{
  background:#fff;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.wallet{
  background:red;
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-size:14px;
}

/* CONTAINER */
.container{
  margin:15px;
  background:#fff;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* TITLE */
h2{
  margin:15px 0 10px;
  font-size:16px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:10px;
}

.box{
  text-align:center;
}

label{
  color:red;
  font-weight:bold;
  font-size:13px;
}

input{
  width:100%;
  height:35px;
  border-radius:10px;
  border:1px solid #ccc;
  text-align:center;
  font-size:14px;
}

/* BUTTONS */
.bottom{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.btn{
  width:32%;
  padding:12px;
  border:none;
  border-radius:15px;
  color:#fff;
  font-size:14px;
}

.submit{background:#22c55e;}
.back{background:#ef4444;}
.total{background:#f43f5e;}

/* ✅ WHATSAPP FLOAT SMALL */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:15px;
  width:45px;
  height:45px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
  z-index:999;
}
</style>
</head>

<body>

<div class="header">
  <div id="userId">ID: 0000</div>
  <div class="wallet" id="wallet">₹ 0</div>
</div>

<div class="container">

  <h2>Single Andar</h2>
  <div class="grid" id="andar"></div>

  <h2>Single Bahar</h2>
  <div class="grid" id="bahar"></div>

  <div class="bottom">
    <button class="btn total" id="total">₹ 0</button>
    <button class="btn submit" onclick="calculate()">SUBMIT</button>
    <button class="btn back" onclick="goBack()">BACK</button>
  </div>

</div>

<!-- ✅ WHATSAPP BUTTON -->
<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX" target="_blank">💬</a>

<script>

// 🔥 USER CHECK
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "index.html";
}

// 🔥 SUPABASE
const client = supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 LOAD WALLET + ID
async function loadWallet(){
  const { data } = await client
    .from("login")
    .select("balance")
    .eq("id", user.id)
    .single();

  if(data){
    document.getElementById("wallet").innerText = "₹ " + data.balance;
    document.getElementById("userId").innerText = "ID: " + user.id;
  }
}

loadWallet();

// 🔥 CREATE BOXES
function createBoxes(id){
  let container = document.getElementById(id);

  for(let i=0;i<10;i++){
    let div = document.createElement("div");
    div.className="box";

    div.innerHTML = `
      <label>${i}</label>
      <input type="number" oninput="calcTotal()">
    `;

    container.appendChild(div);
  }
}

createBoxes("andar");
createBoxes("bahar");

// 🔥 TOTAL
function calcTotal(){
  let inputs = document.querySelectorAll("input");
  let total = 0;

  inputs.forEach(inp=>{
    total += Number(inp.value) || 0;
  });

  document.getElementById("total").innerText = "₹ " + total;
}

// 🔥 SUBMIT WITH BALANCE CUT
async function calculate(){

  let inputs = document.querySelectorAll("input");
  let total = 0;

  inputs.forEach(inp=>{
    total += Number(inp.value) || 0;
  });

  if(total <= 0){
    alert("Amount dalo");
    return;
  }

  const { data } = await client
    .from("login")
    .select("balance")
    .eq("id", user.id)
    .single();

  if(data.balance < total){
    alert("Insufficient balance");
    return;
  }

  await client
    .from("login")
    .update({ balance: data.balance - total })
    .eq("id", user.id);

  inputs.forEach(inp => inp.value = "");

  calcTotal();
  loadWallet();

  alert("Game Submitted");
}

// 🔥 BACK
function goBack(){
  window.history.back();
}

</script>

</body>
</html>
