<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Single Game</title>

<style>
body{
  font-family:Arial;
  background:#e5e7eb;
  margin:0;
}

/* HEADER */
.header{
  background:#fff;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.wallet{
  background:red;
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-size:14px;
}

/* CONTAINER */
.container{
  margin:15px;
  background:#fff;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* TITLE */
h2{
  margin:15px 0 10px;
  font-size:16px;
}

/* GRID FIX */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:10px;
}

.box{
  text-align:center;
}

label{
  color:red;
  font-weight:bold;
  font-size:13px;
}

input{
  width:100%;
  height:35px;
  border-radius:10px;
  border:1px solid #ccc;
  text-align:center;
  font-size:14px;
}

/* BOTTOM BUTTONS */
.bottom{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.btn{
  width:32%;
  padding:12px;
  border:none;
  border-radius:15px;
  color:#fff;
  font-size:14px;
}

.submit{background:#22c55e;}
.back{background:#ef4444;}
.total{background:#f43f5e;}
</style>
</head>

<body>

<div class="header">
  <div>☰ Golde n</div>
  <div class="wallet">₹ 0.70</div>
</div>

<div class="container">

  <h2>Single Andar</h2>
  <div class="grid" id="andar"></div>

  <h2>Single Bahar</h2>
  <div class="grid" id="bahar"></div>

  <div class="bottom">
    <button class="btn total" id="total">₹ 0</button>
    <button class="btn submit" onclick="calculate()">SUBMIT</button>
    <button class="btn back" onclick="goBack()">BACK</button>
  </div>

</div>

<script>

// 🔥 CREATE BOXES (andar + bahar same system)
function createBoxes(id){
  let container = document.getElementById(id);

  for(let i=0;i<10;i++){
    let div = document.createElement("div");
    div.className="box";

    div.innerHTML = `
      <label>${i}</label>
      <input type="number" oninput="calcTotal()">
    `;

    container.appendChild(div);
  }
}

createBoxes("andar");
createBoxes("bahar");

// 🔥 TOTAL CALC (same system)
function calcTotal(){
  let inputs = document.querySelectorAll("input");
  let total = 0;

  inputs.forEach(inp=>{
    total += Number(inp.value) || 0;
  });

  document.getElementById("total").innerText = "₹ " + total;
}

// 🔥 SUBMIT (same simple)
function calculate(){
  alert("Game Submitted");
}

// 🔥 BACK
function goBack(){
  window.history.back();
}

</script>

</body>
</html>
