<!DOCTYPE html>
<html>
<head>
  <title>Login Test</title>
  <style>
    body {
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#eee;
      font-family:Arial;
    }
    .box {
      background:#fff;
      padding:20px;
      border-radius:10px;
      width:300px;
      text-align:center;
    }
    input, button {
      width:100%;
      padding:10px;
      margin:10px 0;
    }
    button {
      background:green;
      color:white;
      border:none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  <input type="text" id="mobile" placeholder="Mobile">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const mobile = document.getElementById("mobile").value;
  const password = document.getElementById("password").value;

  // 👇 hardcoded test
  if (mobile === "8901239533" && password === "123456") {
    alert("Login Success ✅");
    window.location.href = "home.html";
  } else {
    alert("Wrong login ❌");
  }
}
</script>

</body>
</html>
