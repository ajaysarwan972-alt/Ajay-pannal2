<script>
async function login() {

  const mobile = document.getElementById("mobile").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!mobile || !password){
    alert("Mobile aur Password dalo");
    return;
  }

  try {
    const res = await fetch("https://api.baserow.io/api/database/rows/table/897341/?user_field_names=true", {
      headers: {
        "Authorization": "Token 3S3iB1eHvIZwRS163mm13ZfuzhQ5heQf"
      }
    });

    const data = await res.json();

    let found = false;

    for (let user of data.results) {

      if(
        user.mobile.toString().trim() === mobile &&
        user.password.toString().trim() === password
      ){
        found = true;
        localStorage.setItem("mobile", mobile);
        break;
      }

    }

    if(found){
      alert("Login Success ✅");
      window.location.href = "home.html";
    } else {
      alert("Wrong Mobile or Password ❌");
    }

  } catch (err) {
    alert("Error aa gaya ❌");
    console.log(err);
  }

}
</script>
