<script>

window.onerror = function(message, source, lineno, colno, error) {
  alert("Error: " + message + " Line: " + lineno);
};

async function login() {

  const mobileInput = document.getElementById("mobile");
  const passwordInput = document.getElementById("password");

  if(!mobileInput || !passwordInput){
    alert("Input field nahi mila");
    return;
  }

  const mobile = mobileInput.value.trim();
  const password = passwordInput.value.trim();

  if(!mobile || !password){
    alert("Mobile aur Password dalo");
    return;
  }

  try {

    const res = await fetch("https://api.baserow.io/api/database/rows/table/897341/?user_field_names=true", {
      headers: {
        "Authorization": "Token 3S3iB1eHvIZwRS163mm13ZfuzhQ5heQf"
      }
    });

    const data = await res.json();

    console.log("DATA:", data); // DEBUG

    if(!data.results){
      alert("Data nahi aa raha Baserow se");
      return;
    }

    let found = false;

    for (let user of data.results) {

      console.log(user); // DEBUG

      if(
        user.mobile &&
        user.password &&
        user.mobile.toString().trim() === mobile &&
        user.password.toString().trim() === password
      ){
        found = true;
        localStorage.setItem("mobile", mobile);
        break;
      }
    }

    if(found){
      alert("Login Success ✅");
      window.location.href = "home.html";
    } else {
      alert("Wrong Mobile or Password ❌");
    }

  } catch (err) {
    alert("Fetch Error ❌");
    console.log(err);
  }

}

</script>
