<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 90%;
  max-width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

button:hover {
  background: #5a67d8;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="tel" id="mobile" placeholder="Enter Mobile Number" maxlength="10">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const mobile = document.getElementById("mobile").value;
  const password = document.getElementById("password").value;

  if (mobile.length !== 10) {
    alert("Enter valid 10 digit mobile number");
    return;
  }

  if (password === "") {
    alert("Enter password");
    return;
  }

  // Simple login (no database)
  localStorage.setItem("user", mobile);

  // redirect to home page
  window.location.href = "home.html";
}
</script>

</body>
</html>
