<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="text" id="mobile" placeholder="Mobile Number"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button><br><br>

<a href="signup.html">Create Account (Signup)</a>

<!-- ✅ Sabse pehle ye script load hoga -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

async function login() {
  const mobile = document.getElementById("mobile").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!mobile || !password) {
    alert("Fill all fields");
    return;
  }

  try {
    const { data, error } = await supabase
      .from("Wallet")
      .select("*")
      .eq("Moble number", mobile)
      .eq("Pasword", password);

    if (error) throw error;

    if (data.length > 0) {
      localStorage.setItem("user", mobile);
      alert("Login Success ✅");
      window.location.href = "home.html";
    } else {
      alert("Wrong Mobile or Password ❌");
    }

  } catch (err) {
    alert("Error: " + err.message);
  }
}
</script>

</body>
</html>
