<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input type="text" id="mobile" placeholder="Mobile Number">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {

  var mobile = document.getElementById("mobile").value.trim();
  var password = document.getElementById("password").value.trim();

  // 👇 users list (edit here)
  var users = {
    "8901239533": "1111",
    "7357871944": "2222",
    "9999999999": "3333",
    "8888888888": "4444",
    "7777777777": "5555",
    "6666666666": "6666",
    "5555555555": "7777",
    "4444444444": "8888",
    "3333333333": "9999",
    "2222222222": "0000"
  };

  // check empty
  if (mobile === "" || password === "") {
    alert("Enter mobile and password");
    return;
  }

  // login check
  if (users[mobile] && users[mobile] === password) {
    alert("Login Success ✅");

    localStorage.setItem("mobile", mobile);

    window.location.href = "home.html";
  } else {
    alert("Wrong mobile or password ❌");
  }
}
</script>

</body>
</html>
