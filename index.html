<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 350px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 95%;
      padding: 12px;
      margin: 10px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
    }

    .login-btn {
      background: red;
      color: white;
    }

    .signup-btn {
      background: blue;
      color: white;
    }

    .wa {
      color: green;
      margin-top: 10px;
      display: block;
    }

  </style>
</head>

<body>

<div class="box">

  <h2>Login</h2>

  <input type="text" id="mobile" placeholder="Mobile Number">
  <input type="password" id="password" placeholder="Password">

  <button class="login-btn" onclick="login()">LOGIN</button>

  <button class="signup-btn" onclick="goSignup()">REGISTER NOW</button>

  <a class="wa" href="https://wa.me/918901239533">WhatsApp Support</a>

</div>

<script>
async function login() {

  const mobile = document.getElementById("mobile").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!mobile || !password){
    alert("Mobile aur Password dalo");
    return;
  }

  try {

    const res = await fetch("https://api.baserow.io/api/database/rows/table/897341/?user_field_names=true", {
      headers: {
        "Authorization": "Token 3S3iB1eHvIZwRS163mm13ZfuzhQ5heQf"
      }
    });

    const data = await res.json();

    let found = false;

    for (let user of data.results) {

      if(
        user.mobile == mobile &&
        user.password == password
      ){
        found = true;
        localStorage.setItem("mobile", mobile);
        break;
      }
    }

    if(found){
      alert("Login Success ✅");
      window.location.href = "home.html";
    } else {
      alert("Wrong Mobile or Password ❌");
    }

  } catch (err) {
    alert("Error aa gaya ❌");
    console.log(err);
  }

}

function goSignup(){
  window.location.href = "signup.html";
}
</script>

</body>
</html>
