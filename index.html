<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{font-family:Arial;background:#f2f2f2;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:20px;border-radius:15px;width:300px;text-align:center;}
input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:10px;background:#1565c0;color:white;border:none;border-radius:8px;}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="text" id="mobile" placeholder="Mobile Number">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="signup.html">Create Account</a>
</div>


<script>
async function login() {

  const mobile = document.getElementById("mobile").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://api.baserow.io/api/database/rows/table/897341/?user_field_names=true", {
    headers: {
      "Authorization": "Token 3S3iB1eHvIZwRS163mml32fuZhQ5heQf"
    }
  });

  const data = await res.json();

  let found = false;

  data.results.forEach(user => {
    if(user.mobile == mobile && user.password == password){
      found = true;
      localStorage.setItem("mobile", mobile);
    }
  });

  if(found){
    alert("Login Success ✅");
    window.location.href = "home.html";
  } else {
    alert("Wrong Mobile or Password ❌");
  }

}
</script>

</body>
</html>
