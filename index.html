<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
      margin-top: 100px;
    }

    input {
      width: 250px;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: blue;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h2>Login</h2>

<input type="text" id="mobile" placeholder="Mobile Number"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p onclick="window.location.href='signup.html'" style="color:blue;cursor:pointer;">
  Create Account (Signup)
</p>

<script>

function login(){

  var mobile = document.getElementById("mobile").value;
  var password = document.getElementById("password").value;

  if(mobile=="8901239533" && password=="1111"){
    alert("Login Success");
    localStorage.setItem("user", mobile);
    window.location.href="home.html";
  }

  else if(mobile=="9000000001" && password=="1111"){
    alert("Login Success");
    localStorage.setItem("user", mobile);
    window.location.href="home.html";
  }

  else if(mobile=="9000000002" && password=="2222"){
    alert("Login Success");
    localStorage.setItem("user", mobile);
    window.location.href="home.html";
  }

  else if(mobile=="9000000003" && password=="3333"){
    alert("Login Success");
    localStorage.setItem("user", mobile);
    window.location.href="home.html";
  }

  else if(mobile=="9000000004" && password=="4444"){
    alert("Login Success");
    localStorage.setItem("user", mobile);
    window.location.href="home.html";
  }

  else{
    alert("Wrong Mobile or Password");
  }

}

</script>

</body>
</html>
