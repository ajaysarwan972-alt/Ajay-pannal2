<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{font-family:Arial;background:#f2f2f2;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:20px;border-radius:10px;width:300px;}
input{width:100%;padding:10px;margin:10px 0;}
button{width:100%;padding:10px;background:green;color:white;border:none;}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="text" id="mobile" placeholder="Mobile Number">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="signup.html">Create Account</a>

</div>

<script>

async function login(){

let mobile = document.getElementById("mobile").value.trim();
let password = document.getElementById("password").value.trim();

if(!mobile || !password){
alert("Enter details");
return;
}

const res = await fetch("https://api.baserow.io/api/database/rows/table/897341/?user_field_names=true",{
headers:{
"Authorization":"Token 3S3iB1eHvIZwRS163mml32fuzhQ5heQf"
}
});

const data = await res.json();

let foundUser = null;

for(let user of data.results){

if(
user.mobile?.toString().trim() === mobile &&
user.password?.toString().trim() === password
){
foundUser = user;
break;
}

}

if(foundUser){

localStorage.setItem("user", JSON.stringify(foundUser));

alert("Login Success ✅");
window.location.href = "home.html";

}else{
alert("Wrong Mobile or Password ❌");
}

}

</script>

</body>
</html>
