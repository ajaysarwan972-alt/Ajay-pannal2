<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 10px;
    }

    .signup {
      margin-top: 15px;
      color: blue;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="mobile" placeholder="Enter Mobile Number">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <div class="signup" onclick="window.location.href='signup.html'">
    Create Account (Signup)
  </div>
</div>

<script>
function login() {
  let mobile = document.getElementById("mobile").value;
  let password = document.getElementById("password").value;

  let savedMobile = localStorage.getItem("mobile");
  let savedPassword = localStorage.getItem("password");

  if(mobile === savedMobile && password === savedPassword){
    alert("Login Success");
    window.location.href = "home.html";
  } else {
    alert("Wrong Mobile or Password");
  }
}
</script>

</body>
</html>
