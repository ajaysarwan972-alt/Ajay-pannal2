<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
  font-family:Arial;
  background:#f2f2f2;
  text-align:center;
  padding-top:50px;
}
.box{
  background:white;
  width:300px;
  margin:auto;
  padding:20px;
  border-radius:10px;
}
input{
  width:90%;
  padding:10px;
  margin:10px;
}
button{
  width:95%;
  padding:12px;
  background:red;
  color:white;
  border:none;
  border-radius:8px;
}
a{
  display:block;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="text" id="mobile" placeholder="Mobile Number">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<a href="signup.html">REGISTER NOW</a>

<a href="https://wa.me/918901239533">WhatsApp Support</a>

</div>

<script>

async function login(){

let mobile = document.getElementById("mobile").value.trim();
let password = document.getElementById("password").value.trim();

try{

let res = await fetch("https://api.baserow.io/api/database/rows/table/897341/?user_field_names=true", {
headers:{
"Authorization":"Token 353iB1eHvIZwRS163mnl32fuzhQ5heQf"
}
});

let data = await res.json();

let found = false;

for(let user of data.results){

if(
user.mobile == mobile &&
user.password == password
){
found = true;
localStorage.setItem("mobile", mobile);
break;
}

}

if(found){
alert("Login Success ✅");
window.location.href = "home.html";
}else{
alert("Wrong Mobile or Password ❌");
}

}catch(e){
alert("Server Error ❌");
console.log(e);
}

}

</script>

</body>
</html>
