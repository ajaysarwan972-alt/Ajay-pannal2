<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#eee;
  text-align:center;
}

h1{
  color:red;
}

.input-box{
  width:80%;
  margin:15px auto;
  padding:15px;
  border-radius:15px;
  border:none;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

button{
  width:80%;
  padding:15px;
  background:red;
  color:#fff;
  border:none;
  border-radius:30px;
  font-size:18px;
}

.register{
  background:#3498db;
}
</style>

</head>

<body>

<h1>Login</h1>

<input type="text" id="mobile" class="input-box" placeholder="Mobile Number">
<input type="password" id="password" class="input-box" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p>New User?</p>
<button class="register" onclick="window.location.href='signup.html'">REGISTER NOW</button>

<script>

async function login(){

let mobile = document.getElementById("mobile").value;
let password = document.getElementById("password").value;

// 🔴🔴🔴 BAS YAHAN DALNA HAI 🔴🔴🔴
let BASEROW_URL = "https://api.baserow.io/api/database/rows/table/897341/?user_field_names=true";
let API_TOKEN = "3S3iB1eHvIZwRS163mml32fuZhQ5heQf";
// 🔴🔴🔴 BAS ITNA HI 🔴🔴🔴

let res = await fetch(BASEROW_URL, {
  headers: {
    "Authorization": "Token " + API_TOKEN
  }
});

let data = await res.json();

let user = data.results?.find(
  u => String(u.mobile) === String(mobile) &&
       String(u.password) === String(password)
);

if(user){
  localStorage.setItem("user", JSON.stringify(user));
  alert("Login Success ✅");
  window.location.href = "home.html";
}else{
  alert("Wrong Mobile or Password ❌");
}

}

</script>

</body>
</html>
