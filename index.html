<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{font-family:Arial;background:#f2f2f2;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:20px;border-radius:15px;width:300px;text-align:center;}
input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:10px;background:#1565c0;color:white;border:none;border-radius:8px;}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="text" id="mobile" placeholder="Mobile Number">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="signup.html">Create Account</a>
</div>

<script>

const fixedUsers = [
{mobile:"8901239533",password:"2222",balance:1000},
{mobile:"7357871944",password:"1111",balance:1000},
{mobile:"9000000001",password:"3333",balance:1000},
{mobile:"9000000002",password:"4444",balance:1000},
{mobile:"9000000003",password:"5555",balance:1000},
{mobile:"9000000004",password:"6666",balance:1000},
{mobile:"9000000005",password:"7777",balance:1000},
{mobile:"9000000006",password:"8888",balance:1000},
{mobile:"9000000007",password:"9999",balance:1000},
{mobile:"9000000008",password:"1010",balance:1000}
];

function login(){

let mobile=document.getElementById("mobile").value.trim();
let password=document.getElementById("password").value.trim();

let users=JSON.parse(localStorage.getItem("users"))||[];

let allUsers=fixedUsers.concat(users);

let user=allUsers.find(u=>u.mobile==mobile && u.password==password);

if(user){
localStorage.setItem("loginUser",mobile);

// save balance if new
if(!localStorage.getItem("balance_"+mobile)){
localStorage.setItem("balance_"+mobile,user.balance||1000);
}

alert("Login Success ✅");
window.location.href="home.html";

}else{
alert("Wrong login ❌");
}
}

</script>

</body>
</html>
