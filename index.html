<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: blue;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input type="text" id="mobile" placeholder="Mobile Number">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p onclick="window.location.href='signup.html'" style="color:blue;cursor:pointer;">
    Create Account (Signup)
  </p>
</div>

<script>

function login(){

  let mobile = document.getElementById("mobile").value;
  let password = document.getElementById("password").value;

  // 🔥 DEMO ACCOUNTS (simple)
  if(
    (mobile=="8901239533" && password=="1111") ||
    (mobile=="9000000001" && password=="1111") ||
    (mobile=="9000000002" && password=="2222") ||
    (mobile=="9000000003" && password=="3333") ||
    (mobile=="9000000004" && password=="4444") ||
    (mobile=="9000000005" && password=="5555") ||
    (mobile=="9000000006" && password=="6666") ||
    (mobile=="9000000007" && password=="7777") ||
    (mobile=="9000000008" && password=="8888") ||
    (mobile=="9000000009" && password=="9999")
  ){
    alert("Login Success ✅");

    localStorage.setItem("loginUser", mobile);

    window.location.href = "home.html";

  } else {
    alert("Wrong Mobile or Password ❌");
  }

}

</script>

</body>
</html>
