<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="text" id="mobile" placeholder="Mobile"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script>
function login() {
  var mobile = document.getElementById("mobile").value;
  var password = document.getElementById("password").value;

  var url = "https://script.google.com/macros/s/AKfycbwohLCKUO_AZaKa530gZ1AN6n_J9lJmQWzZ_ISmFIHVzo4KtpEAg5Halb8i3q7qu-Ob/exec"
            + "?mobile=" + mobile + "&password=" + password;

  fetch(url)
    .then(res => res.json())
    .then(data => {
      if (data.status === "success") {
        alert("Login Success ✅ Balance: " + data.balance);
        localStorage.setItem("mobile", mobile);
        localStorage.setItem("balance", data.balance);
        window.location.href = "home.html";
      } else {
        alert("Wrong Mobile or Password ❌");
      }
    });
}
</script>

</body>
</html>
