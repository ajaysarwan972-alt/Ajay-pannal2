<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f2f2f2;
    font-family: Arial;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
    text-align: center;
}

input {
    width: 200px;
    padding: 8px;
    margin: 5px;
}

button {
    padding: 8px 15px;
    margin: 5px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input type="text" id="mobile" placeholder="Mobile"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>
    <br>
    <button onclick="window.location.href='signup.html'">Signup</button>
</div>

<script>
function login() {
    var mobile = document.getElementById("mobile").value;
    var password = document.getElementById("password").value;

    var url = "https://script.google.com/macros/s/AKfycbwohLCKUO_AZaKa530gZ1AN6n_J9lJmQWzZ_ISmFIHVzo4KtpEAg5Halb8i3q7qu-Ob/exec"
    + "?mobile=" + mobile + "&password=" + password;

    fetch(url)
    .then(res => res.json())
    .then(data => {
        if (data.status === "success") {
            alert("Login Success ✅ Balance: " + data.balance);
            localStorage.setItem("mobile", mobile);
            localStorage.setItem("balance", data.balance);
            window.location.href = "home.html";
        } else {
            alert("Wrong Mobile or Password ❌");
        }
    });
}
</script>

</body>
</html>
