<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f2f2f2;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
    }

    a {
      display: block;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input type="text" id="mobile" placeholder="Mobile Number">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <a href="signup.html">Create Account (Signup)</a>
</div>

<script>
  const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
  const supabaseKey = "PASTE_YOUR_PUBLISHABLE_KEY_HERE";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function login() {
    const mobile = document.getElementById("mobile").value;
    const password = document.getElementById("password").value;

    try {
      const { data, error } = await supabase
        .from("users")
        .select("*")
        .eq("mobile", mobile)
        .eq("password", password);

      if (error) {
        alert("Error: " + error.message);
        return;
      }

      if (data.length > 0) {
        alert("Login Success ✅");

        // save user
        localStorage.setItem("mobile", mobile);

        // redirect
        window.location.href = "home.html";

      } else {
        alert("Wrong login ❌");
      }

    } catch (err) {
      alert("Network error ❌");
    }
  }
</script>

</body>
</html>
