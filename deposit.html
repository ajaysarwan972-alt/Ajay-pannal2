<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    padding:15px;
}

#userId{
  position:fixed;
  left:15px;
  top:10px;
  background:green;
  color:white;
  padding:8px 15px;
  border-radius:20px;
  font-weight:bold;
  z-index:999;
}
#wallet{
  position:fixed;
  right:15px;
  top:10px;
  background:red;
  color:white;
  padding:8px 15px;
  border-radius:20px;
  font-weight:bold;
  z-index:999;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:20px;
    margin-top:60px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.amount-btns{
    display:flex;
    gap:10px;
}
.amount-btns button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#4facfe,#ff004c);
    color:#fff;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.main-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#7cc84a;
    color:#fff;
    font-weight:bold;
    margin-top:15px;
}

.amount-text{
    font-size:18px;
    font-weight:bold;
    text-align:center;
}

.qr-inner img{
    width:100%;
    max-width:300px;
    height:auto;
}

.upload-btn{
    background:linear-gradient(45deg,#4facfe,#ff004c);
    color:#fff;
    padding:15px;
    border:none;
    border-radius:15px;
    width:100%;
}

.preview img{
    width:80%;
    margin-top:10px;
}

.row{
    display:flex;
    gap:10px;
    margin-top:15px;
}
.back-btn,.confirm-btn{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    color:#fff;
    font-weight:bold;
}
.back-btn{background:red;}
.confirm-btn{background:green;}
</style>
</head>

<body>

<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>

<div class="card" id="step1">
<div class="amount-btns">
<button onclick="setAmount(100)">100</button>
<button onclick="setAmount(200)">200</button>
<button onclick="setAmount(500)">500</button>
<button onclick="setAmount(1000)">1000</button>
</div>

<input type="number" id="amount" placeholder="Enter Amount">
<button class="main-btn" onclick="goStep2()">SUBMIT</button>
</div>

<div class="card" id="step2" style="display:none;">
<div class="amount-text">
<span id="showAmount">0</span> Rs. Pay karo
</div>

<div style="text-align:center">
<img id="qrImage">
</div>

<input type="file" id="file" onchange="previewImage()">

<div class="preview" id="preview"></div>

<div class="row">
<button class="back-btn" onclick="goBack()">BACK</button>
<button class="confirm-btn" onclick="submitDeposit()">CONFIRM</button>
</div>
</div>

<script>
const { createClient } = supabase

const client = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

const user = JSON.parse(localStorage.getItem("user"))

async function loadQR(){
    let { data } = await client.from("settings").select("*").single()
    if(data) document.getElementById("qrImage").src = data.qr
}
loadQR()

async function loadWallet(){
    if(!user) return
    let { data } = await client.from("login").select("balance").eq("id", user.id).single()
    if(data){
        wallet.innerText="₹ "+data.balance
        userId.innerText="ID: "+user.id
    }
}
loadWallet()

function setAmount(val){ amount.value=val }

function goStep2(){
    let amt=amount.value
    if(!amt) return alert("Amount daal")
    localStorage.setItem("deposit_amount",amt)
    showAmount.innerText=amt
    step1.style.display="none"
    step2.style.display="block"
}

function goBack(){
    step2.style.display="none"
    step1.style.display="block"
}

function previewImage(){
    let file=fileInput.files[0]
    let reader=new FileReader()
    reader.onload=e=>{
        preview.innerHTML=`<img src="${e.target.result}">`
    }
    reader.readAsDataURL(file)
}

async function submitDeposit(){

    let amount=localStorage.getItem("deposit_amount")
    let file=document.getElementById("file").files[0]

    if(!file) return alert("Upload screenshot")

    let fileName=Date.now()+file.name

    let { error:uploadErr } = await client.storage.from("screenshots").upload(fileName,file)

    if(uploadErr){
        console.log(uploadErr)
        return alert("Upload error")
    }

    let { data:url }=client.storage.from("screenshots").getPublicUrl(fileName)

    let { data:userData }=await client.from("login").select("mobile,name").eq("id",user.id).single()

    let { error }=await client.from("deposit_requests").insert([{
        user_id:user.id,
        mobile:userData.mobile,
        name:userData.name,
        amount:Number(amount),
        screenshot:url.publicUrl,
        status:"pending"
    }])

    if(error){
        console.log(error)
        return alert("Insert Error ❌")
    }

    alert("Success ✅")
    location.reload()
}
</script>

</body>
</html>
