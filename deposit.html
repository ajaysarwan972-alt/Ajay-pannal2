<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    padding:15px;
}

/* 🔥 TOP BAR */
#userId{
  position:fixed;
  left:15px;
  top:10px;
  background:green;
  color:white;
  padding:8px 15px;
  border-radius:20px;
  font-weight:bold;
  z-index:999;
}
#wallet{
  position:fixed;
  right:15px;
  top:10px;
  background:red;
  color:white;
  padding:8px 15px;
  border-radius:20px;
  font-weight:bold;
  z-index:999;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:20px;
    margin-top:60px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.amount-btns{
    display:flex;
    gap:10px;
}
.amount-btns button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#4facfe,#ff004c);
    color:#fff;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.main-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#7cc84a;
    color:#fff;
    font-weight:bold;
    margin-top:15px;
}

.amount-text{
    font-size:18px;
    font-weight:bold;
    text-align:center;
    margin-bottom:15px;
}
.amount-text span{
    color:green;
}

.upload-box{
    background:#f2f2f2;
    padding:20px;
    border-radius:20px;
    text-align:center;
}

.upload-btn{
    background:linear-gradient(45deg,#4facfe,#ff004c);
    color:#fff;
    padding:15px;
    border:none;
    border-radius:15px;
    font-weight:bold;
    width:100%;
}

.preview{
    margin-top:15px;
}
.preview img{
    width:80%;
    border-radius:10px;
}

.row{
    display:flex;
    gap:10px;
    margin-top:15px;
}
.back-btn{
    flex:1;
    background:#ff4d4d;
    color:#fff;
    border:none;
    padding:15px;
    border-radius:15px;
    font-weight:bold;
}
.confirm-btn{
    flex:1;
    background:#7cc84a;
    color:#fff;
    border:none;
    padding:15px;
    border-radius:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- 🔥 TOP -->
<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>

<!-- STEP 1 -->
<div class="card" id="step1">
<div class="amount-btns">
<button onclick="setAmount(100)">100</button>
<button onclick="setAmount(200)">200</button>
<button onclick="setAmount(500)">500</button>
<button onclick="setAmount(1000)">1000</button>
</div>

<input type="number" id="amount" placeholder="Enter Amount">
<button class="main-btn" onclick="goStep2()">SUBMIT</button>
</div>

<!-- STEP 2 -->
<div class="card" id="step2" style="display:none;">
<div class="amount-text">
<span id="showAmount">0</span> Rs. रुपये का स्क्रीनशॉट अपलोड करें फिर Confirm बटन पर क्लिक करें।
</div>

<div class="upload-box">
<input type="file" id="file" onchange="previewImage()" style="display:none;">
<button class="upload-btn" onclick="document.getElementById('file').click()">
UPLOAD PAYMENT SCREENSHOT
</button>

<div class="preview" id="preview"></div>

<div class="row">
<button class="back-btn" onclick="goBack()">BACK</button>
<button class="confirm-btn" onclick="submitDeposit()">CONFIRM</button>
</div>
</div>
</div>

<script>
const { createClient } = supabase

const client = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// 🔥 LOAD USER + WALLET
const user = JSON.parse(localStorage.getItem("user"))

async function loadWallet(){
    if(!user) return

    const { data } = await client
    .from("login")
    .select("balance")
    .eq("id", user.id)
    .single()

    if(data){
        document.getElementById("wallet").innerText = "₹ " + data.balance
        document.getElementById("userId").innerText = "ID: " + user.id
    }
}

loadWallet()

// OLD SYSTEM SAME
if(!localStorage.getItem("user_id")){
    localStorage.setItem("user_id", "1")
    localStorage.setItem("mobile", "9999999999")
}

function setAmount(val){
    document.getElementById("amount").value = val
}

function goStep2(){
    let amt = document.getElementById("amount").value
    if(!amt){
        alert("Amount daal")
        return
    }

    localStorage.setItem("deposit_amount", amt)

    document.getElementById("showAmount").innerText = amt

    document.getElementById("step1").style.display="none"
    document.getElementById("step2").style.display="block"
}

function goBack(){
    document.getElementById("step2").style.display="none"
    document.getElementById("step1").style.display="block"
}

function previewImage(){
    let file = document.getElementById("file").files[0]
    if(file){
        let reader = new FileReader()
        reader.onload = function(e){
            document.getElementById("preview").innerHTML =
            `<img src="${e.target.result}">`
        }
        reader.readAsDataURL(file)
    }
}

async function submitDeposit(){

    let amount = localStorage.getItem("deposit_amount")
    let file = document.getElementById("file").files[0]

    if(!file){
        alert("Screenshot upload kar")
        return
    }

    let fileName = Date.now()+"_"+file.name

    let { error } = await client.storage
    .from("screenshots")
    .upload(fileName, file)

    if(error){
        alert("Upload error")
        return
    }

    let { data } = client.storage
    .from("screenshots")
    .getPublicUrl(fileName)

    let userId = localStorage.getItem("user_id")
    let mobile = localStorage.getItem("mobile")

    let { error: dbError } = await client.from("deposit_requests").insert({
        user_id: userId,
        mobile: mobile,
        amount: amount,
        screenshot: data.publicUrl,
        status: "pending"
    })

    if(dbError){
        alert("DB Error: "+dbError.message)
        return
    }

    alert("Request Sent ✅")
    location.reload()
}
</script>

</body>
</html>
