<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    padding:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.amount-btns{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.amount-btns button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,blue,red);
    color:#fff;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.main-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:green;
    color:#fff;
    font-weight:bold;
}

.copy-box{
    display:flex;
    justify-content:space-between;
    background:orange;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.copy-btn{
    background:linear-gradient(45deg,blue,red);
    color:#fff;
    border:none;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="card">

<div class="amount-btns">
<button onclick="setAmount(100)">100</button>
<button onclick="setAmount(200)">200</button>
<button onclick="setAmount(500)">500</button>
<button onclick="setAmount(1000)">1000</button>
</div>

<input type="number" id="amount" placeholder="Amount">

<button class="main-btn" onclick="nextStep()">SUBMIT</button>

</div>

<div class="card" id="step2" style="display:none;">

<div class="copy-box">
<span id="upi">paynearby.0000547174@indus</span>
<button class="copy-btn" onclick="copyUpi()">Copy</button>
</div>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay" width="100%">

<input type="text" id="utr" placeholder="Enter UTR">

<input type="file" id="file">

<button class="main-btn" onclick="submitDeposit()">CONFIRM</button>

</div>

<script>

const supabase = window.supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

function setAmount(val){
    document.getElementById("amount").value = val
}

function nextStep(){
    let amt = document.getElementById("amount").value
    if(!amt){
        alert("Amount daal")
        return
    }
    document.getElementById("step2").style.display="block"
}

function copyUpi(){
    let text = document.getElementById("upi").innerText
    navigator.clipboard.writeText(text)
    alert("Copied")
}

async function submitDeposit(){

    let amount = document.getElementById("amount").value
    let utr = document.getElementById("utr").value
    let file = document.getElementById("file").files[0]

    if(!file || !utr){
        alert("UTR + Screenshot daal")
        return
    }

    let fileName = Date.now()+"_"+file.name

    // upload screenshot
    await supabase.storage.from("screenshots").upload(fileName, file)

    let { data } = supabase.storage.from("screenshots").getPublicUrl(fileName)

    let imageUrl = data.publicUrl

    let userId = localStorage.getItem("user_id")
    let mobile = localStorage.getItem("mobile")

    // insert request
    await supabase.from("deposit_requests").insert({
        user_id: userId,
        mobile: mobile,
        amount: amount,
        utr: utr,
        screenshot: imageUrl,
        status: "pending"
    })

    alert("Request sent successfully")

    // clear fields
    document.getElementById("amount").value=""
    document.getElementById("utr").value=""
    document.getElementById("file").value=""
    document.getElementById("step2").style.display="none"
}

</script>

</body>
</html>
