<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    padding:15px;
}

/* CARD */
.card{
    background:#fff;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* AMOUNT BUTTON */
.amount-btns{
    display:flex;
    gap:10px;
}
.amount-btns button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#4facfe,#ff004c);
    color:#fff;
    font-weight:bold;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* MAIN BUTTON */
.main-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#7cc84a;
    color:#fff;
    font-weight:bold;
    margin-top:15px;
}

/* COPY BOX */
.copy-box{
    display:flex;
    justify-content:space-between;
    background:linear-gradient(45deg,#fbb034,#ffdd00);
    padding:12px;
    border-radius:15px;
    margin-bottom:15px;
}
.copy-btn{
    background:linear-gradient(45deg,#4facfe,#ff004c);
    color:#fff;
    border:none;
    padding:10px;
    border-radius:10px;
}

/* BUTTON ROW */
.row{
    display:flex;
    gap:10px;
}
.choice-btn{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    color:#fff;
    font-weight:bold;
}
.utr-btn{ background:#7cc84a; }
.ss-btn{ background:linear-gradient(45deg,#4facfe,#ff004c); }

/* PREVIEW */
.preview{
    margin-top:15px;
    text-align:center;
}
.preview img{
    width:70%;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- STEP 1 -->
<div class="card" id="step1">
<div class="amount-btns">
<button onclick="setAmount(100)">100</button>
<button onclick="setAmount(200)">200</button>
<button onclick="setAmount(500)">500</button>
<button onclick="setAmount(1000)">1000</button>
</div>

<input type="number" id="amount" placeholder="Enter Amount">
<button class="main-btn" onclick="goStep2()">SUBMIT</button>
</div>

<!-- STEP 2 -->
<div class="card" id="step2" style="display:none;">
<div class="copy-box">
<span id="upi">paynearby.0000547174@indus</span>
<button class="copy-btn" onclick="copyUpi()">Copy</button>
</div>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay" width="100%">

<div class="row" style="margin-top:15px;">
<button class="choice-btn utr-btn" onclick="goStep3('utr')">ENTER UTR</button>
<button class="choice-btn ss-btn" onclick="goStep3('ss')">UPLOAD SCREENSHOT</button>
</div>
</div>

<!-- STEP 3 UTR -->
<div class="card" id="step3_utr" style="display:none;">
<input type="text" id="utr" placeholder="Enter UTR Number">
<button class="main-btn" onclick="submitDeposit()">CONFIRM</button>
</div>

<!-- STEP 3 SCREENSHOT -->
<div class="card" id="step3_ss" style="display:none;">
<input type="file" id="file" onchange="previewImage()">

<div class="preview" id="preview"></div>

<button class="main-btn" onclick="submitDeposit()">CONFIRM</button>
</div>

<script>
const { createClient } = supabase

const client = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// TEST USER
if(!localStorage.getItem("user_id")){
    localStorage.setItem("user_id", "1")
    localStorage.setItem("mobile", "9999999999")
}

function setAmount(val){
    document.getElementById("amount").value = val
}

function goStep2(){
    let amt = document.getElementById("amount").value
    if(!amt){
        alert("Amount daal")
        return
    }
    document.getElementById("step1").style.display="none"
    document.getElementById("step2").style.display="block"
}

function goStep3(type){
    document.getElementById("step2").style.display="none"

    if(type==="utr"){
        document.getElementById("step3_utr").style.display="block"
    }else{
        document.getElementById("step3_ss").style.display="block"
    }
}

function copyUpi(){
    let text = document.getElementById("upi").innerText
    navigator.clipboard.writeText(text)
    alert("Copied")
}

/* IMAGE PREVIEW */
function previewImage(){
    let file = document.getElementById("file").files[0]
    if(file){
        let reader = new FileReader()
        reader.onload = function(e){
            document.getElementById("preview").innerHTML =
            `<img src="${e.target.result}">`
        }
        reader.readAsDataURL(file)
    }
}

async function submitDeposit(){

    let amount = document.getElementById("amount").value
    let utr = document.getElementById("utr")?.value || ""
    let file = document.getElementById("file")?.files[0]

    if(!utr && !file){
        alert("UTR ya Screenshot daal")
        return
    }

    let imageUrl = ""

    if(file){
        let fileName = Date.now()+"_"+file.name

        let { error } = await client.storage
        .from("screenshots")
        .upload(fileName, file)

        if(error){
            alert("Upload error")
            return
        }

        let { data } = client.storage
        .from("screenshots")
        .getPublicUrl(fileName)

        imageUrl = data.publicUrl
    }

    let userId = localStorage.getItem("user_id")
    let mobile = localStorage.getItem("mobile")

    let { error } = await client.from("deposit_requests").insert({
        user_id: userId,
        mobile: mobile,
        amount: amount,
        utr: utr,
        screenshot: imageUrl,
        status: "pending"
    })

    if(error){
        alert("DB Error: "+error.message)
        return
    }

    alert("Request Sent ✅")
    location.reload()
}
</script>

</body>
</html>
