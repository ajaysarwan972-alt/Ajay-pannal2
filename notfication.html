<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{font-family:Arial;background:#f2f4f8;padding:20px;}
    .box{max-width:400px;margin:auto;background:#fff;padding:20px;border-radius:10px;}
    input,textarea{width:100%;padding:10px;margin:10px 0;}
    button{width:100%;padding:12px;background:#1e88e5;color:#fff;border:none;}
  </style>
</head>

<body>

<div class="box">
  <h2>Send Notification 🔔</h2>

  <input type="text" id="title" placeholder="Title">
  <textarea id="message" placeholder="Message"></textarea>

  <button onclick="send()">Send</button>
</div>

<script>
function send() {

  let title = document.getElementById("title").value;
  let message = document.getElementById("message").value;

  fetch("https://onesignal.com/api/v1/notifications", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "os_v2_app_us4xrpihfrdbtgv226vn35fhujdut25g6n4ewdu3jvl472s52mrprqehmrkog57q6n3thbuihpilv47cumrge27okpqfkdu277fowxq"
    },
    body: JSON.stringify({
      app_id: "a4b978bd-072c-4619-9aba-d7aaddf4a7a2",
      included_segments: ["All"],
      headings: { en: title },
      contents: { en: message }
    })
  })
  .then(res => res.json())
  .then(() => alert("Notification Sent 🔔"))
  .catch(() => alert("Error"));
}
</script>

</body>
</html>
