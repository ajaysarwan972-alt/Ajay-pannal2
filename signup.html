<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, red, black);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }

    h2 {
      color: red;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: red;
      color: white;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      background: black;
    }

    a {
      text-decoration: none;
      color: red;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Signup</h2>

  <input type="text" placeholder="Full Name">
  <input type="text" placeholder="Mobile Number">
  <input type="password" placeholder="Password">

  <button>REGISTER</button>

  <p>Already have account? <a href="index.html">Login</a></p>
</div>

</body>
</html>
