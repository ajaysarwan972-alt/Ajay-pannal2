<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding: 20px; }

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 700px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

.update-box {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

img{
    width:80px;
}
</style>
</head>

<body>

<!-- 🔔 ALARM -->
<audio id="alarm" loop>
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<button onclick="stopAlarm()" style="background:red;color:#fff;padding:10px;border:none;border-radius:10px;margin-bottom:15px;">
STOP ALARM
</button>

<h2>login</h2>

<div class="update-box">
    <select id="userId"></select>
    <input type="number" id="amount" placeholder="Enter amount">
    <select id="action">
        <option value="deposit">Deposit</option>
        <option value="withdraw">Withdraw</option>
    </select>
    <button onclick="updateBalance()">Update</button>
</div>

<div class="frame">
<table>
<thead>
<tr>
<th>id</th><th>name</th><th>mobile</th><th>password</th><th>balance</th>
</tr>
</thead>
<tbody id="userData"></tbody>
</table>
</div>

<h2>Deposit Requests</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>ID</th><th>User</th><th>Amount</th><th>UTR</th><th>Screenshot</th><th>Status</th>
</tr>
</thead>
<tbody id="depositData"></tbody>
</table>
</div>

<h2>Withdraw Requests</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>ID</th><th>User</th><th>Amount</th><th>QR / Bank</th><th>Status</th>
</tr>
</thead>
<tbody id="withdrawData"></tbody>
</table>
</div>

<h2>Game result</h2>
<div class="frame">

<div class="update-box">
<select id="marketSelect"></select>
<input type="text" id="marketValue">
<button onclick="updateMarketNumber()">Update</button>
</div>

<table>
<thead>
<tr>
<th>id</th><th>name</th><th>number</th><th>open</th><th>close</th>
</tr>
</thead>
<tbody id="gameData"></tbody>
</table>
</div>

<h2>history</h2>

<div class="update-box">
<select id="historyUser"><option value="all">Select ID</option></select>
<select id="historyMarket"><option value="all">Select Market</option></select>
<input type="date" id="historyDate">
<button onclick="filterHistory()">Filter</button>
<button onclick="copyAll()">Copy All</button>
</div>

<div class="frame">
<table>
<thead>
<tr>
<th>id</th><th>user_id</th><th>market</th><th>data</th><th>total</th><th>created_at</th>
</tr>
</thead>
<tbody id="historyData"></tbody>
</table>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

let filteredData = []

// 🔔 ALARM LOGIC
let lastDepositCount = 0
let lastWithdrawCount = 0

function playAlarm(){
    document.getElementById("alarm").play()
}

function stopAlarm(){
    let a = document.getElementById("alarm")
    a.pause()
    a.currentTime = 0
}
window.stopAlarm = stopAlarm

// USERS
async function loadUsers(){
    const { data } = await supabase.from("login").select("*")
    let html="", opt=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td>${r.mobile}</td>
        <td>${r.password}</td>
        <td>${r.balance}</td>
        </tr>`
        opt+=`<option value="${r.id}">${r.id}</option>`
    })
    userData.innerHTML=html
    userId.innerHTML = opt
    historyUser.innerHTML = '<option value="all">Select ID</option>'+opt
}

// 🔥 DEPOSIT
async function loadDeposits(){
    const { data } = await supabase.from("deposit_requests").select("*")

    if(data.length > lastDepositCount){
        playAlarm()
    }
    lastDepositCount = data.length

    let html=""
    data.reverse().forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.mobile}</td>
        <td>${r.amount}</td>
        <td>${r.utr || "-"}</td>
        <td>${r.screenshot ? `<a href="${r.screenshot}" target="_blank"><img src="${r.screenshot}"></a>` : "-"}</td>
        <td>${r.status}</td>
        </tr>`
    })
    depositData.innerHTML = html
}

// 🔥 WITHDRAW
async function loadWithdraw(){
    const { data } = await supabase.from("withdraw_requests").select("*")

    if(data.length > lastWithdrawCount){
        playAlarm()
    }
    lastWithdrawCount = data.length

    let html=""
    data.reverse().forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.mobile}</td>
        <td>${r.amount}</td>
        <td>${r.upi}</td>
        <td>${r.status}</td>
        </tr>`
    })
    withdrawData.innerHTML = html
}

// बाकी same
async function loadMarkets(){
    const { data } = await supabase.from("Game result").select("name")
    let opt='<option value="all">Select Market</option>'
    data.forEach(r=> opt+=`<option value="${r.name}">${r.name}</option>`)
    marketSelect.innerHTML=opt
    historyMarket.innerHTML=opt
}

window.updateMarketNumber = async ()=>{
    let v = marketValue.value
    if(!v) return
    await supabase.from("Game result").update({number:v}).eq("name",marketSelect.value)
    marketValue.value=""
    loadGames()
}

async function loadGames(){
    const { data } = await supabase.from("Game result").select("*")
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td>${r.number}</td>
        <td>${r.open}</td>
        <td>${r.close}</td>
        </tr>`
    })
    gameData.innerHTML=html
}

async function loadHistory(){
    const { data } = await supabase.from("history").select("*")
    renderHistory(data)
}

function renderHistory(data){
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.user_id}</td>
        <td>${r.market}</td>
        <td>${r.data}</td>
        <td>${r.total}</td>
        <td>${r.created_at}</td>
        </tr>`
    })
    historyData.innerHTML=html
}

// AUTO REFRESH
setInterval(()=>{
    loadDeposits()
    loadWithdraw()
}, 5000)

// LOAD
loadUsers()
loadMarkets()
loadGames()
loadHistory()
loadDeposits()
loadWithdraw()

</script>

</body>
</html>
