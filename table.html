<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding: 20px; }

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 700px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

.filter-box, .update-box {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.delete-btn{
    background:red;
    color:#fff;
    border:none;
    padding:4px 6px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<h2>login</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>id</th><th>name</th><th>mobile</th><th>password</th><th>balance</th>
</tr>
</thead>
<tbody id="userData"></tbody>
</table>
</div>

<!-- GAME -->
<h2>Game result</h2>
<div class="frame">

<div class="update-box">
<select id="marketSelect"></select>
<input type="text" id="marketValue" placeholder="Enter value">
<button onclick="updateMarketNumber()">Update</button>
</div>

<table>
<thead>
<tr>
<th>id</th><th>name</th><th>number</th><th>open</th><th>close</th>
</tr>
</thead>
<tbody id="gameData"></tbody>
</table>
</div>

<!-- FILTER -->
<div class="filter-box">
<select id="userFilter">
<option value="all">All Users</option>
</select>

<select id="marketFilter"></select>

<input type="date" id="dateFilter">

<button onclick="loadFiltered()">Load</button>
</div>

<!-- OUTPUT -->
<div class="frame" id="outputBox"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// 🔥 LOAD USERS
async function loadUsers(){
    const { data } = await supabase.from("login").select("*")
    let html="", opt=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td>${r.mobile}</td>
        <td>${r.password}</td>
        <td>${r.balance}</td>
        </tr>`
        opt+=`<option value="${r.id}">${r.id}</option>`
    })
    userData.innerHTML=html
    userFilter.innerHTML += opt
}

// 🔥 LOAD MARKET
async function loadMarkets(){
    const { data } = await supabase.from("Game result").select("name")
    let opt=""
    data.forEach(r=>{
        opt+=`<option value="${r.name}">${r.name}</option>`
    })
    marketSelect.innerHTML=opt
    marketFilter.innerHTML=opt
}

// 🔥 UPDATE MARKET NUMBER (2 digit + clear)
window.updateMarketNumber = async () => {
    let value = marketValue.value
    const market = marketSelect.value

    if(value==="") return

    value = value.padStart(2,"0")

    await supabase.from("Game result")
    .update({ number:value })
    .eq("name",market)

    marketValue.value=""
    loadGames()
}

// 🔥 LOAD GAME
async function loadGames(){
    const { data } = await supabase.from("Game result").select("*")
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td>${r.number}</td>
        <td>${r.open}</td>
        <td>${r.close}</td>
        </tr>`
    })
    gameData.innerHTML=html
}

// 🔥 MAIN FILTER + CONVERT
window.loadFiltered = async ()=>{
    const uid = userFilter.value
    const market = marketFilter.value
    const date = dateFilter.value

    let query = supabase.from("history").select("*")

    if(uid !== "all") query = query.eq("user_id", uid)
    if(market) query = query.eq("market", market)
    if(date) query = query.gte("created_at", date)

    const { data } = await query

    let output=""

    data.forEach(row=>{
        let raw = row.data || ""

        // FORMAT 1
        raw.replace(/"num":"(\\d+)","a":(\\d+)/g,(m,n,a)=>{
            output+=makeLine(n,a,row.id)
        })

        // FORMAT 2
        raw.replace(/"number":"(\\d+)","amount":(\\d+)/g,(m,n,a)=>{
            output+=makeLine(n,a,row.id)
        })

        // FORMAT 3
        raw.replace(/"type":"(A|B)","number":(\\d+),"amount":(\\d+)/g,(m,t,n,a)=>{
            n = String(n).padStart(2,"0")
            if(t==="A") output+=`<div>${"×"+n+"-"+a} ${btn(row.id,n,a)}</div>`
            if(t==="B") output+=`<div>${n+"×-"+a} ${btn(row.id,n,a)}</div>`
        })
    })

    outputBox.innerHTML = output || "No Data"
}

// 🔥 LINE BUILDER
function makeLine(n,a,id){
    n = String(n).padStart(2,"0")
    return `<div>${n}-${a} ${btn(id,n,a)}</div>`
}

// 🔥 DELETE BUTTON
function btn(id,n,a){
    return `<button class="delete-btn" onclick="deleteItem('${id}','${n}','${a}')">X</button>`
}

// 🔥 DELETE SYSTEM
window.deleteItem = async (id,n,a)=>{
    let action = prompt("1 = Detail delete\n2 = Table delete\n3 = Cancel")

    if(action==="1"){
        loadFiltered() // refresh only
    }
    else if(action==="2"){
        await supabase.from("history").delete().eq("id",id)
        loadFiltered()
    }
}

// INIT
loadUsers()
loadMarkets()
loadGames()
</script>

</body>
</html>
