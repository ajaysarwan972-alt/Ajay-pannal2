<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; padding: 20px; }

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 900px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

button{
    padding:5px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.approve{background:green;color:#fff;}
.cancel{background:red;color:#fff;}
</style>
</head>

<body>

<h2>Deposit Requests</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>ID</th><th>User ID</th><th>Name</th><th>Mobile</th><th>Amount</th><th>Screenshot</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="depositData"></tbody>
</table>
</div>

<h2>Withdraw Requests</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>ID</th><th>User ID</th><th>Name</th><th>Mobile</th><th>Amount</th><th>QR</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="withdrawData"></tbody>
</table>
</div>

<script>
const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// 🔥 LOAD DEPOSIT
async function loadDeposits(){
    let { data } = await client
    .from("deposit_requests")
    .select(`
        *,
        login:user_id (id,name,mobile,balance)
    `)

    let html=""

    data.reverse().forEach(r=>{
        html+=`
        <tr>
        <td>${r.id}</td>
        <td>${r.login?.id}</td>
        <td>${r.login?.name}</td>
        <td>${r.login?.mobile}</td>
        <td>${r.amount}</td>
        <td><img src="${r.screenshot}" width="60"></td>
        <td>${r.status}</td>
        <td>
            <button class="approve" onclick="approveDeposit(${r.id},${r.login?.id},${r.amount})">Approve</button>
            <button class="cancel" onclick="cancelDeposit(${r.id})">Cancel</button>
        </td>
        </tr>`
    })

    depositData.innerHTML = html
}

// ✅ APPROVE DEPOSIT
async function approveDeposit(id,userId,amount){

    let { data } = await client.from("login").select("balance").eq("id",userId).single()

    let newBal = data.balance + amount

    await client.from("login").update({balance:newBal}).eq("id",userId)

    await client.from("deposit_requests").update({status:"approved"}).eq("id",id)

    alert("Deposit Approved ✅")
    loadDeposits()
}

// ❌ CANCEL
async function cancelDeposit(id){
    await client.from("deposit_requests").update({status:"cancelled"}).eq("id",id)
    loadDeposits()
}

// 🔥 LOAD WITHDRAW
async function loadWithdraw(){
    let { data } = await client
    .from("withdraw_requests")
    .select(`
        *,
        login:user_id (id,name,mobile,balance)
    `)

    let html=""

    data.reverse().forEach(r=>{
        html+=`
        <tr>
        <td>${r.id}</td>
        <td>${r.login?.id}</td>
        <td>${r.login?.name}</td>
        <td>${r.login?.mobile}</td>
        <td>${r.amount}</td>
        <td>${r.upi}</td>
        <td>${r.status}</td>
        <td>
            <button class="approve" onclick="approveWithdraw(${r.id},${r.login?.id},${r.amount})">Approve</button>
            <button class="cancel" onclick="cancelWithdraw(${r.id},${r.login?.id},${r.amount})">Cancel</button>
        </td>
        </tr>`
    })

    withdrawData.innerHTML = html
}

// ✅ APPROVE WITHDRAW
async function approveWithdraw(id,userId,amount){

    let { data } = await client.from("login").select("balance").eq("id",userId).single()

    if(data.balance < amount){
        alert("Balance kam hai ❌")
        return
    }

    let newBal = data.balance - amount

    await client.from("login").update({balance:newBal}).eq("id",userId)

    await client.from("withdraw_requests").update({status:"approved"}).eq("id",id)

    alert("Withdraw Approved ✅")
    loadWithdraw()
}

// ❌ CANCEL WITH REFUND
async function cancelWithdraw(id,userId,amount){

    let { data } = await client.from("login").select("balance").eq("id",userId).single()

    let newBal = data.balance + amount

    await client.from("login").update({balance:newBal}).eq("id",userId)

    await client.from("withdraw_requests").update({status:"cancelled"}).eq("id",id)

    alert("Cancelled + Refund ✅")
    loadWithdraw()
}

// AUTO LOAD
loadDeposits()
loadWithdraw()

setInterval(()=>{
    loadDeposits()
    loadWithdraw()
},5000)

</script>

</body>
</html>
