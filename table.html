<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding: 20px; }

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 700px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

.filter-box, .update-box {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.delete-btn{
    background:red;
    color:#fff;
    border:none;
    padding:4px 6px;
    cursor:pointer;
}

/* 🔥 NEW LIST SYSTEM */
#outputBox{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
}

.item{
    background:#f2f2f2;
    padding:6px;
    display:flex;
    justify-content:space-between;
    border-radius:5px;
}
</style>
</head>

<body>

<h2>login</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>id</th><th>name</th><th>mobile</th><th>password</th><th>balance</th>
</tr>
</thead>
<tbody id="userData"></tbody>
</table>
</div>

<h2>Game result</h2>
<div class="frame">

<div class="update-box">
<select id="marketSelect"></select>
<input type="text" id="marketValue" placeholder="Enter value">
<button onclick="updateMarketNumber()">Update</button>
</div>

<table>
<thead>
<tr>
<th>id</th><th>name</th><th>number</th><th>open</th><th>close</th>
</tr>
</thead>
<tbody id="gameData"></tbody>
</table>
</div>

<h2>history</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>id</th><th>user_id</th><th>market</th><th>data</th><th>total</th><th>created_at</th>
</tr>
</thead>
<tbody id="historyData"></tbody>
</table>
</div>

<div class="filter-box">
<select id="userFilter">
<option value="all">All Users</option>
</select>

<select id="marketFilter"></select>

<input type="date" id="dateFilter">

<button onclick="loadFiltered()">Load</button>
<button onclick="copyAll()">Copy All</button>
</div>

<!-- 🔥 LIST OUTPUT -->
<div id="outputBox"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

let currentList = []

async function loadUsers(){
    const { data } = await supabase.from("login").select("*")
    let html="", opt=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td>${r.mobile}</td>
        <td>${r.password}</td>
        <td>${r.balance}</td>
        </tr>`
        opt+=`<option value="${r.id}">${r.id}</option>`
    })
    userData.innerHTML=html
    userFilter.innerHTML += opt
}

async function loadMarkets(){
    const { data } = await supabase.from("Game result").select("name")
    let opt=""
    data.forEach(r=>{
        opt+=`<option value="${r.name}">${r.name}</option>`
    })
    marketSelect.innerHTML=opt
    marketFilter.innerHTML=opt
}

window.updateMarketNumber = async () => {
    let value = marketValue.value
    const market = marketSelect.value

    if(value==="") return

    value = value.padStart(2,"0")

    await supabase.from("Game result")
    .update({ number:value })
    .eq("name",market)

    marketValue.value=""
    loadGames()
}

async function loadGames(){
    const { data } = await supabase.from("Game result").select("*")
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td>${r.number}</td>
        <td>${r.open}</td>
        <td>${r.close}</td>
        </tr>`
    })
    gameData.innerHTML=html
}

async function loadHistory(){
    const { data } = await supabase.from("history").select("*")
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.user_id}</td>
        <td>${r.market}</td>
        <td>${r.data}</td>
        <td>${r.total}</td>
        <td>${r.created_at}</td>
        </tr>`
    })
    historyData.innerHTML=html
}

// 🔥 FILTER + LIST SYSTEM
window.loadFiltered = async ()=>{
    const uid = userFilter.value
    const market = marketFilter.value
    const date = dateFilter.value

    let query = supabase.from("history").select("*")

    if(uid !== "all") query = query.eq("user_id", uid)
    if(market) query = query.eq("market", market)

    if(date){
        const start = date + "T00:00:00"
        const end = date + "T23:59:59"
        query = query.gte("created_at", start).lte("created_at", end)
    }

    const { data } = await query

    currentList = []

    data.forEach(row=>{
        let raw = row.data || ""

        raw.replace(/"num":"(\\d+)","a":(\\d+)/g,(m,n,a)=>{
            addItem(n,a,row.id)
        })

        raw.replace(/"number":"(\\d+)","amount":(\\d+)/g,(m,n,a)=>{
            addItem(n,a,row.id)
        })

        raw.replace(/"type":"(A|B)","number":(\\d+),"amount":(\\d+)/g,(m,t,n,a)=>{
            n = String(n).padStart(2,"0")
            if(t==="A") currentList.push({text:"×"+n+"-"+a,id:row.id})
            if(t==="B") currentList.push({text:n+"×-"+a,id:row.id})
        })
    })

    render()
}

function addItem(n,a,id){
    n = String(n).padStart(2,"0")
    currentList.push({text:n+"-"+a,id})
}

function render(){
    let html=""
    currentList.forEach((d,i)=>{
        html+=`
