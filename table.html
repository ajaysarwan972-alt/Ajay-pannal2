<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding: 20px; }

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 700px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

.update-box {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
</style>
</head>

<body>

<h2>login</h2>

<div class="update-box">
    <select id="userId"></select>
    <input type="number" id="amount" placeholder="Enter amount">
    <select id="action">
        <option value="deposit">Deposit</option>
        <option value="withdraw">Withdraw</option>
    </select>
    <button onclick="updateBalance()">Update</button>
</div>

<div class="frame">
<table>
<thead>
<tr>
<th>id</th><th>name</th><th>mobile</th><th>password</th><th>balance</th>
</tr>
</thead>
<tbody id="userData"></tbody>
</table>
</div>

<h2>Game result</h2>
<div class="frame">

<div class="update-box">
<select id="marketSelect"></select>
<input type="text" id="marketValue">
<button onclick="updateMarketNumber()">Update</button>
</div>

<table>
<thead>
<tr>
<th>id</th><th>name</th><th>number</th><th>open</th><th>close</th>
</tr>
</thead>
<tbody id="gameData"></tbody>
</table>
</div>

<h2>history</h2>

<!-- ✅ NEW FILTER -->
<div class="update-box">
<select id="historyUser"><option value="all">Select ID</option></select>
<select id="historyMarket"><option value="all">Select Market</option></select>
<input type="date" id="historyDate">
<button onclick="filterHistory()">Filter</button>
<button onclick="copyAll()">Copy All</button>
</div>

<div class="frame">
<table>
<thead>
<tr>
<th>id</th><th>user_id</th><th>market</th><th>data</th><th>total</th><th>created_at</th>
</tr>
</thead>
<tbody id="historyData"></tbody>
</table>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

let filteredData = []

async function loadUsers(){
    const { data } = await supabase.from("login").select("*")
    let html="", opt=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td>${r.mobile}</td>
        <td>${r.password}</td>
        <td>${r.balance}</td>
        </tr>`
        opt+=`<option value="${r.id}">${r.id}</option>`
    })
    userData.innerHTML=html
    userId.innerHTML = opt
    historyUser.innerHTML = '<option value="all">Select ID</option>'+opt
}

window.updateBalance = async ()=>{
    let id = userId.value
    let amount = parseInt(document.getElementById("amount").value)
    let action = action.value

    if(!amount) return alert("Amount daal")

    const { data } = await supabase.from("login").select("balance").eq("id",id).single()
    let newBalance = action==="deposit" ? data.balance+amount : data.balance-amount

    await supabase.from("login").update({balance:newBalance}).eq("id",id)

    alert("Updated")
    document.getElementById("amount").value=""
    loadUsers()
}

async function loadMarkets(){
    const { data } = await supabase.from("Game result").select("name")
    let opt='<option value="all">Select Market</option>'
    data.forEach(r=> opt+=`<option value="${r.name}">${r.name}</option>`)
    marketSelect.innerHTML=opt
    historyMarket.innerHTML=opt
}

window.updateMarketNumber = async ()=>{
    let v = marketValue.value
    if(!v) return
    await supabase.from("Game result").update({number:v}).eq("name",marketSelect.value)
    marketValue.value=""
    loadGames()
}

async function loadGames(){
    const { data } = await supabase.from("Game result").select("*")
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td>${r.number}</td>
        <td>${r.open}</td>
        <td>${r.close}</td>
        </tr>`
    })
    gameData.innerHTML=html
}

async function loadHistory(){
    const { data } = await supabase.from("history").select("*")
    renderHistory(data)
}

window.filterHistory = async ()=>{
    let uid = historyUser.value
    let market = historyMarket.value
    let date = historyDate.value

    let query = supabase.from("history").select("*")

    if(uid!=="all") query=query.eq("user_id",uid)
    if(market!=="all") query=query.eq("market",market)
    if(date){
        query=query.gte("created_at",date).lte("created_at",date+"T23:59:59")
    }

    const { data } = await query
    filteredData = data
    renderHistory(data)
}

function renderHistory(data){
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.user_id}</td>
        <td>${r.market}</td>
        <td>
            ${r.data}
            <br>
            <button onclick="copySingle('${r.data}')">Copy</button>
        </td>
        <td>${r.total}</td>
        <td>${r.created_at}</td>
        </tr>`
    })
    historyData.innerHTML=html
}

window.copySingle = (text)=>{
    navigator.clipboard.writeText(text)
    alert("Copied")
}

window.copyAll = ()=>{
    let text = (filteredData.length?filteredData:[]).map(x=>x.data).join("\n\n")
    navigator.clipboard.writeText(text)
    alert("All Copied")
}

loadUsers()
loadMarkets()
loadGames()
loadHistory()
</script>

</body>
</html>
