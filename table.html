<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding: 20px; }

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 700px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

/* 🔥 COPY ENABLE */
td, input, textarea {
    user-select: text;
}

input {
    width: 100%;
    border: none;
    text-align: center;
}

textarea {
    width: 100%;
    height: 70px;
    border: none;
    resize: vertical;
    text-align: left;
    white-space: pre-wrap;
    word-break: break-word;
}

.search {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
}

/* COPY BUTTON */
.copy-btn {
    margin-top: 5px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>login</h2>
<div class="frame">
<input class="search" placeholder="Search login..." onkeyup="filterTable('userData', this.value)">
<table>
<thead>
<tr>
<th>id</th>
<th>name</th>
<th>mobile</th>
<th>password</th>
<th>balance</th>
</tr>
</thead>
<tbody id="userData"></tbody>
</table>
</div>

<h2>Game result</h2>
<div class="frame">
<input class="search" placeholder="Search game..." onkeyup="filterTable('gameData', this.value)">
<table>
<thead>
<tr>
<th>id</th>
<th>name</th>
<th>number</th>
<th>open</th>
<th>close</th>
</tr>
</thead>
<tbody id="gameData"></tbody>
</table>
</div>

<h2>history</h2>
<div class="frame">
<input class="search" placeholder="Search history..." onkeyup="filterTable('historyData', this.value)">
<table>
<thead>
<tr>
<th>id</th>
<th>user_id</th>
<th>market</th>
<th>data</th>
<th>total</th>
<th>created_at</th>
</tr>
</thead>
<tbody id="historyData"></tbody>
</table>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
    "https://katbdbzoufiblnnsoxkk.supabase.co",
    "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// FILTER
window.filterTable = (tableId, value) => {
    const filter = value.toLowerCase()
    const rows = document.querySelectorAll(`#${tableId} tr`)

    rows.forEach(row => {
        let text = row.innerText.toLowerCase()
        row.style.display = text.includes(filter) ? "" : "none"
    })
}

// 🔥 COPY FUNCTION
window.copyText = (text) => {
    navigator.clipboard.writeText(text)
    alert("Copied!")
}


// LOGIN
async function loadUsers(){
    const { data } = await supabase.from("login").select("*")

    let html = ""
    data.forEach(row => {
        html += `
        <tr>
            <td onclick="copyText('${row.id}')">${row.id}</td>
            <td><input value="${row.name || ""}" onchange="updateUser('${row.id}','name',this.value)"></td>
            <td><input value="${row.mobile || ""}" onchange="updateUser('${row.id}','mobile',this.value)"></td>
            <td><input value="${row.password || ""}" onchange="updateUser('${row.id}','password',this.value)"></td>
            <td><input value="${row.balance || ""}" onchange="updateUser('${row.id}','balance',this.value)"></td>
        </tr>`
    })

    document.getElementById("userData").innerHTML = html
}

window.updateUser = async (id, col, val) => {
    await supabase.from("login").update({ [col]: val }).eq("id", id)
}


// GAME RESULT
async function loadGames(){
    const { data } = await supabase.from("Game result").select("*")

    let html = ""
    data.forEach(row => {
        html += `
        <tr>
            <td onclick="copyText('${row.id}')">${row.id}</td>
            <td><input value="${row.name || ""}" onchange="updateGame('${row.id}','name',this.value)"></td>
            <td><input value="${row.number || ""}" onchange="updateGame('${row.id}','number',this.value)"></td>
            <td><input value="${row.open || ""}" onchange="updateGame('${row.id}','open',this.value)"></td>
            <td><input value="${row.close || ""}" onchange="updateGame('${row.id}','close',this.value)"></td>
        </tr>`
    })

    document.getElementById("gameData").innerHTML = html
}

window.updateGame = async (id, col, val) => {
    await supabase.from("Game result").update({ [col]: val }).eq("id", id)
}


// HISTORY
async function loadHistory(){
    const { data } = await supabase.from("history").select("*")

    let html = ""
    data.forEach(row => {
        html += `
        <tr>
            <td onclick="copyText('${row.id}')">${row.id}</td>
            <td><input value="${row.user_id || ""}" onchange="updateHistory('${row.id}','user_id',this.value)"></td>
            <td><input value="${row.market || ""}" onchange="updateHistory('${row.id}','market',this.value)"></td>
            <td>
                <textarea onchange="updateHistory('${row.id}','data',this.value)">${row.data || ""}</textarea>
                <button class="copy-btn" onclick="copyText(\`${row.data || ""}\`)">Copy</button>
            </td>
            <td><input value="${row.total || ""}" onchange="updateHistory('${row.id}','total',this.value)"></td>
            <td><input value="${row.created_at || ""}" onchange="updateHistory('${row.id}','created_at',this.value)"></td>
        </tr>`
    })

    document.getElementById("historyData").innerHTML = html
}

window.updateHistory = async (id, col, val) => {
    await supabase.from("history").update({ [col]: val }).eq("id", id)
}


// LOAD
loadUsers()
loadGames()
loadHistory()
</script>

</body>
</html>
