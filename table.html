<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding: 20px; }

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 700px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 120px;
    border: none;
    resize: vertical;
}

.copy-btn {
    margin-top: 5px;
    padding: 4px 8px;
    cursor: pointer;
}

.filter-box {
    background: #fff;
    padding: 10px;
    border-radius: 10px;
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

/* 🔥 NEW BOX */
.update-box{
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
</style>
</head>

<body>

<h2>login</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>id</th><th>name</th><th>mobile</th><th>password</th><th>balance</th>
</tr>
</thead>
<tbody id="userData"></tbody>
</table>
</div>

<h2>Game result</h2>
<div class="frame">

<!-- 🔥 MARKET UPDATE SYSTEM -->
<div class="update-box">
<select id="marketSelect"></select>
<input type="text" id="marketValue" placeholder="Enter value">
<button onclick="updateMarketNumber()">Update</button>
</div>

<table>
<thead>
<tr>
<th>id</th><th>name</th><th>number</th><th>open</th><th>close</th>
</tr>
</thead>
<tbody id="gameData"></tbody>
</table>
</div>

<h2>history</h2>
<div class="frame">

<button onclick="copyFilteredData()" style="margin-bottom:10px;">
Copy Filtered Data
</button>

<table>
<thead>
<tr>
<th>id</th><th>user_id</th><th>market</th><th>data</th><th>total</th><th>created_at</th>
</tr>
</thead>
<tbody id="historyData"></tbody>
</table>
</div>

<!-- FILTER -->
<div class="filter-box">
<select id="tableSelect">
<option value="userData">login</option>
<option value="gameData">Game result</option>
<option value="historyData">history</option>
</select>

<select id="columnSelect">
<option value="0">id</option>
<option value="1">col1</option>
<option value="2">col2</option>
<option value="3">col3</option>
<option value="4">col4</option>
<option value="5">col5</option>
</select>

<input type="text" id="filterValue" placeholder="Enter value">
<input type="date" id="dateFilter">

<button onclick="applyFilter()">Filter</button>
<button onclick="resetFilter()">Reset</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// 🔥 LOAD MARKET DROPDOWN
async function loadMarkets(){
    const { data } = await supabase.from("Game result").select("name")
    let options = ""
    data.forEach(r=>{
        options += `<option value="${r.name}">${r.name}</option>`
    })
    document.getElementById("marketSelect").innerHTML = options
}

// 🔥 UPDATE MARKET NUMBER
window.updateMarketNumber = async () => {
    const market = document.getElementById("marketSelect").value
    const value = document.getElementById("marketValue").value

    if(!market || !value) return alert("Fill all")

    await supabase
        .from("Game result")
        .update({ number: value })
        .eq("name", market)

    alert("Updated ✅")
    loadGames()
}

// FILTER
window.applyFilter = () => {
    const tableId = document.getElementById("tableSelect").value
    const colIndex = parseInt(document.getElementById("columnSelect").value)
    const value = document.getElementById("filterValue").value.toLowerCase()
    const dateVal = document.getElementById("dateFilter").value

    document.querySelectorAll(`#${tableId} tr`).forEach(row=>{
        const cells = row.querySelectorAll("td")

        let colMatch = true
        let dateMatch = true

        if(value){
            let text = cells[colIndex]?.innerText.toLowerCase() || ""
            colMatch = text.includes(value)
        }

        if(dateVal && cells.length > 0){
            let dateText = cells[cells.length-1].innerText
            dateMatch = dateText.includes(dateVal)
        }

        row.style.display = (colMatch && dateMatch) ? "" : "none"
    })
}

window.resetFilter = () => {
    ["userData","gameData","historyData"].forEach(id=>{
        document.querySelectorAll(`#${id} tr`).forEach(r=>r.style.display="")
    })
}

window.copyText = (text) => {
    const temp = document.createElement("textarea")
    temp.value = text
    document.body.appendChild(temp)
    temp.select()
    document.execCommand("copy")
    document.body.removeChild(temp)
}

window.copyFilteredData = () => {
    let rows = document.querySelectorAll("#historyData tr")
    let allData = ""

    rows.forEach(row=>{
        if(row.style.display !== "none"){
            let textarea = row.querySelector("textarea")
            if(textarea){
                allData += textarea.value + "\n\n"
            }
        }
    })

    copyText(allData.trim())
}

// LOGIN
async function loadUsers(){
    const { data } = await supabase.from("login").select("*")
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td onclick="copyText('${r.id}')">${r.id}</td>
        <td><input value="${r.name||""}" onchange="updateUser('${r.id}','name',this.value)"></td>
        <td><input value="${r.mobile||""}" onchange="updateUser('${r.id}','mobile',this.value)"></td>
        <td><input value="${r.password||""}" onchange="updateUser('${r.id}','password',this.value)"></td>
        <td><input value="${r.balance||""}" onchange="updateUser('${r.id}','balance',this.value)"></td>
        </tr>`
    })
    userData.innerHTML=html
}
window.updateUser=(id,c,v)=>supabase.from("login").update({[c]:v}).eq("id",id)

// GAME
async function loadGames(){
    const { data } = await supabase.from("Game result").select("*")
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td onclick="copyText('${r.id}')">${r.id}</td>
        <td><input value="${r.name||""}" onchange="updateGame('${r.id}','name',this.value)"></td>
        <td><input value="${r.number||""}" onchange="updateGame('${r.id}','number',this.value)"></td>
        <td><input value="${r.open||""}" onchange="updateGame('${r.id}','open',this.value)"></td>
        <td><input value="${r.close||""}" onchange="updateGame('${r.id}','close',this.value)"></td>
        </tr>`
    })
    gameData.innerHTML=html
}
window.updateGame=(id,c,v)=>supabase.from("Game result").update({[c]:v}).eq("id",id)

// HISTORY
async function loadHistory(){
    const { data } = await supabase.from("history").select("*")
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td onclick="copyText('${r.id}')">${r.id}</td>
        <td><input value="${r.user_id||""}" onchange="updateHistory('${r.id}','user_id',this.value)"></td>
        <td><input value="${r.market||""}" onchange="updateHistory('${r.id}','market',this.value)"></td>
        <td>
        <textarea onchange="updateHistory('${r.id}','data',this.value)">${r.data||""}</textarea>
        <button class="copy-btn" onclick="copyText(\`${r.data||""}\`)">Copy</button>
        </td>
        <td><input value="${r.total||""}" onchange="updateHistory('${r.id}','total',this.value)"></td>
        <td><input value="${r.created_at||""}" onchange="updateHistory('${r.id}','created_at',this.value)"></td>
        </tr>`
    })
    historyData.innerHTML=html
}
window.updateHistory=(id,c,v)=>supabase.from("history").update({[c]:v}).eq("id",id)

// LOAD
loadUsers()
loadGames()
loadHistory()
loadMarkets()
</script>

</body>
</html>
