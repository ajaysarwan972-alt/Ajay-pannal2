<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding: 20px; }

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    margin-bottom: 20px;
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 700px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

input {
    width: 100%;
    border: none;
    text-align: center;
}
</style>
</head>

<body>

<h2>login</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>id</th>
<th>name</th>
<th>mobile</th>
<th>password</th>
<th>balance</th>
</tr>
</thead>
<tbody id="userData"></tbody>
</table>
</div>

<h2>Game result</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>id</th>
<th>name</th>
<th>number</th>
<th>open</th>
<th>close</th>
</tr>
</thead>
<tbody id="gameData"></tbody>
</table>
</div>

<h2>history</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>id</th>
<th>user_id</th>
<th>game</th>
<th>number</th>
<th>amount</th>
<th>status</th>
</tr>
</thead>
<tbody id="historyData"></tbody>
</table>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
    "https://katbdbzoufiblnnsoxkk.supabase.co",
    "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// LOGIN
async function loadUsers(){
    const { data } = await supabase.from("login").select("*")

    let html = ""
    data.forEach(row => {
        html += `
        <tr>
            <td>${row.id}</td>
            <td><input value="${row.name || ""}" onchange="updateUser('${row.id}','name',this.value)"></td>
            <td><input value="${row.mobile || ""}" onchange="updateUser('${row.id}','mobile',this.value)"></td>
            <td><input value="${row.password || ""}" onchange="updateUser('${row.id}','password',this.value)"></td>
            <td><input value="${row.balance || ""}" onchange="updateUser('${row.id}','balance',this.value)"></td>
        </tr>`
    })

    document.getElementById("userData").innerHTML = html
}

window.updateUser = async (id, col, val) => {
    await supabase.from("login").update({ [col]: val }).eq("id", id)
}


// GAME RESULT ✅ (FIXED NAME)
async function loadGames(){
    const { data } = await supabase.from("Game result").select("*")

    let html = ""
    data.forEach(row => {
        html += `
        <tr>
            <td>${row.id}</td>
            <td><input value="${row.name || ""}" onchange="updateGame('${row.id}','name',this.value)"></td>
            <td><input value="${row.number || ""}" onchange="updateGame('${row.id}','number',this.value)"></td>
            <td><input value="${row.open || ""}" onchange="updateGame('${row.id}','open',this.value)"></td>
            <td><input value="${row.close || ""}" onchange="updateGame('${row.id}','close',this.value)"></td>
        </tr>`
    })

    document.getElementById("gameData").innerHTML = html
}

window.updateGame = async (id, col, val) => {
    await supabase.from("Game result").update({ [col]: val }).eq("id", id)
}


// HISTORY ✅ (NOW EDITABLE)
async function loadHistory(){
    const { data } = await supabase.from("history").select("*")

    let html = ""
    data.forEach(row => {
        html += `
        <tr>
            <td>${row.id}</td>
            <td><input value="${row.user_id || ""}" onchange="updateHistory('${row.id}','user_id',this.value)"></td>
            <td><input value="${row.game || ""}" onchange="updateHistory('${row.id}','game',this.value)"></td>
            <td><input value="${row.number || ""}" onchange="updateHistory('${row.id}','number',this.value)"></td>
            <td><input value="${row.amount || ""}" onchange="updateHistory('${row.id}','amount',this.value)"></td>
            <td><input value="${row.status || ""}" onchange="updateHistory('${row.id}','status',this.value)"></td>
        </tr>`
    })

    document.getElementById("historyData").innerHTML = html
}

window.updateHistory = async (id, col, val) => {
    await supabase.from("history").update({ [col]: val }).eq("id", id)
}


// LOAD
loadUsers()
loadGames()
loadHistory()
</script>

</body>
</html>
