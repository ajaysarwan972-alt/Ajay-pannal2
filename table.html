<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding: 20px; }

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 700px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 120px;
    border: none;
    resize: vertical;
}

.copy-btn {
    margin-top: 5px;
    padding: 4px 8px;
    cursor: pointer;
}

.filter-box {
    background: #fff;
    padding: 10px;
    border-radius: 10px;
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.update-box{
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
</style>
</head>

<body>

<h2>Game result</h2>
<div class="frame">

<!-- UPDATE BOX -->
<div class="update-box">
<select id="marketSelect"></select>
<input type="text" id="marketValue" placeholder="Enter value">
<button onclick="updateMarketNumber()">Update</button>
</div>

<table>
<thead>
<tr>
<th>id</th><th>name</th><th>number</th><th>open</th><th>close</th>
</tr>
</thead>
<tbody id="gameData"></tbody>
</table>
</div>

<h2>history</h2>
<div class="frame">

<button onclick="copyFilteredData()">Copy Filtered Data</button>

<table>
<thead>
<tr>
<th>id</th><th>user_id</th><th>market</th><th>data</th><th>total</th><th>created_at</th>
</tr>
</thead>
<tbody id="historyData"></tbody>
</table>
</div>

<!-- FILTER -->
<div class="filter-box">
<select id="tableSelect">
<option value="gameData">Game result</option>
<option value="historyData">history</option>
</select>

<select id="columnSelect">
<option value="2">number / market</option>
<option value="3">data</option>
<option value="4">total</option>
<option value="5">date</option>
</select>

<input type="text" id="filterValue" placeholder="Enter value">
<input type="date" id="dateFilter">

<button onclick="applyFilter()">Filter</button>
<button onclick="resetFilter()">Reset</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// LOAD MARKET
async function loadMarkets(){
    const { data } = await supabase.from("Game result").select("name")
    let options=""
    data.forEach(r=>{
        options += `<option value="${r.name}">${r.name}</option>`
    })
    marketSelect.innerHTML = options
}

// UPDATE MARKET NUMBER (2 digit + clear)
window.updateMarketNumber = async () => {
    const market = document.getElementById("marketSelect").value
    let value = document.getElementById("marketValue").value

    if(!market || value === "") return alert("Fill all")

    // 🔥 2 digit fix
    value = value.padStart(2, '0')

    await supabase
        .from("Game result")
        .update({ number: value })
        .eq("name", market)

    alert("Updated ✅")

    // 🔥 clear input
    document.getElementById("marketValue").value = ""

    loadGames()
}

// FILTER
window.applyFilter = () => {
    const tableId = tableSelect.value
    const colIndex = parseInt(columnSelect.value)
    const value = document.getElementById("filterValue").value.trim()
    const dateVal = document.getElementById("dateFilter").value

    document.querySelectorAll(`#${tableId} tr`).forEach(row=>{
        const cells = row.querySelectorAll("td")

        let colMatch = true
        let dateMatch = true

        if(value){
            let text = (cells[colIndex]?.innerText || "").trim()
            colMatch = text.includes(value)
        }

        if(dateVal){
            let dateText = (cells[cells.length-1]?.innerText || "")
            dateMatch = dateText.includes(dateVal)
        }

        row.style.display = (colMatch && dateMatch) ? "" : "none"
    })
}

window.resetFilter = () => {
    document.querySelectorAll("tr").forEach(r=>r.style.display="")
}

// COPY
window.copyText = (text) => {
    const temp = document.createElement("textarea")
    temp.value = text
    document.body.appendChild(temp)
    temp.select()
    document.execCommand("copy")
    document.body.removeChild(temp)
}

// COPY FILTERED
window.copyFilteredData = () => {
    let rows = document.querySelectorAll("#historyData tr")
    let allData = ""

    rows.forEach(row=>{
        if(row.style.display !== "none"){
            let textarea = row.querySelector("textarea")
            if(textarea){
                allData += textarea.value + "\n\n"
            }
        }
    })

    copyText(allData.trim())
}

// LOAD GAME (READONLY NUMBER)
async function loadGames(){
    const { data } = await supabase.from("Game result").select("*")
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id||""}</td>
        <td>${r.name||""}</td>
        <td><input value="${r.number||""}" readonly></td>
        <td>${r.open||""}</td>
        <td>${r.close||""}</td>
        </tr>`
    })
    gameData.innerHTML=html
}

// LOAD HISTORY
async function loadHistory(){
    const { data } = await supabase.from("history").select("*")
    let html=""
    data.forEach(r=>{
        html+=`<tr>
        <td>${r.id}</td>
        <td>${r.user_id}</td>
        <td>${r.market}</td>
        <td><textarea>${r.data||""}</textarea></td>
        <td>${r.total}</td>
        <td>${r.created_at}</td>
        </tr>`
    })
    historyData.innerHTML=html
}

// INIT
loadGames()
loadHistory()
loadMarkets()
</script>

</body>
</html>
