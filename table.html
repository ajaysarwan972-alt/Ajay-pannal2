<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding: 20px; }

.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 900px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

.update-box {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

img{ width:80px; }

button{
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
.approve{background:green;color:#fff;}
.reject{background:red;color:#fff;}
</style>
</head>

<body>

<audio id="alarm" loop>
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<button onclick="stopAlarm()" style="background:red;color:#fff;padding:10px;border:none;border-radius:10px;margin-bottom:15px;">
STOP ALARM
</button>

<h2>Deposit Requests</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>ID</th><th>User ID</th><th>Name</th><th>Mobile</th>
<th>Amount</th><th>UTR</th><th>Screenshot</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="depositData"></tbody>
</table>
</div>

<h2>Withdraw Requests</h2>
<div class="frame">
<table>
<thead>
<tr>
<th>ID</th><th>User ID</th><th>Name</th><th>Mobile</th>
<th>Amount</th><th>QR</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="withdrawData"></tbody>
</table>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// 🔔 ALARM
let lastDeposit = 0
let lastWithdraw = 0

function playAlarm(){ document.getElementById("alarm").play() }
window.stopAlarm = ()=>{ let a=document.getElementById("alarm"); a.pause(); a.currentTime=0 }

// 🔥 LOAD DEPOSIT
async function loadDeposits(){
const { data } = await supabase
.from("deposit_requests")
.select("*, login(id,name,mobile)")
.order("id",{ascending:false})

if(data.length > lastDeposit){ playAlarm() }
lastDeposit = data.length

let html=""
data.forEach(r=>{
html+=`<tr>
<td>${r.id}</td>
<td>${r.login?.id || '-'}</td>
<td>${r.login?.name || '-'}</td>
<td>${r.login?.mobile || '-'}</td>
<td>${r.amount}</td>
<td>${r.utr || "-"}</td>
<td>${r.screenshot ? `<a href="${r.screenshot}" target="_blank"><img src="${r.screenshot}"></a>` : "-"}</td>
<td>${r.status}</td>
<td>
<button class="approve" onclick="approveDeposit(${r.id},${r.user_id},${r.amount})">Approve</button>
<button class="reject" onclick="rejectDeposit(${r.id})">Cancel</button>
</td>
</tr>`
})
depositData.innerHTML=html
}

// 🔥 LOAD WITHDRAW
async function loadWithdraw(){
const { data } = await supabase
.from("withdraw_requests")
.select("*, login(id,name,mobile)")
.order("id",{ascending:false})

if(data.length > lastWithdraw){ playAlarm() }
lastWithdraw = data.length

let html=""
data.forEach(r=>{
html+=`<tr>
<td>${r.id}</td>
<td>${r.login?.id || '-'}</td>
<td>${r.login?.name || '-'}</td>
<td>${r.login?.mobile || '-'}</td>
<td>${r.amount}</td>
<td>${r.upi}</td>
<td>${r.status}</td>
<td>
<button class="approve" onclick="approveWithdraw(${r.id})">Approve</button>
<button class="reject" onclick="rejectWithdraw(${r.id},${r.user_id},${r.amount})">Cancel</button>
</td>
</tr>`
})
withdrawData.innerHTML=html
}

// ✅ APPROVE DEPOSIT
window.approveDeposit = async (id,user_id,amount)=>{
const { data } = await supabase.from("login").select("balance").eq("id",user_id).single()
let newBalance = (data.balance||0)+amount

await supabase.from("login").update({balance:newBalance}).eq("id",user_id)
await supabase.from("deposit_requests").update({status:"approved"}).eq("id",id)

alert("Deposit Approved")
loadDeposits()
}

// ❌ REJECT DEPOSIT
window.rejectDeposit = async (id)=>{
await supabase.from("deposit_requests").update({status:"rejected"}).eq("id",id)
alert("Deposit Cancelled")
loadDeposits()
}

// ✅ APPROVE WITHDRAW
window.approveWithdraw = async (id)=>{
await supabase.from("withdraw_requests").update({status:"approved"}).eq("id",id)
alert("Withdraw Approved")
loadWithdraw()
}

// ❌ REJECT WITHDRAW (refund)
window.rejectWithdraw = async (id,user_id,amount)=>{
const { data } = await supabase.from("login").select("balance").eq("id",user_id).single()
let newBalance = (data.balance||0)+amount

await supabase.from("login").update({balance:newBalance}).eq("id",user_id)
await supabase.from("withdraw_requests").update({status:"rejected"}).eq("id",id)

alert("Refund Done")
loadWithdraw()
}

// AUTO REFRESH
setInterval(()=>{
loadDeposits()
loadWithdraw()
},5000)

// LOAD
loadDeposits()
loadWithdraw()

</script>

</body>
</html>
