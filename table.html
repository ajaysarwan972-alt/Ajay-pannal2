<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Edit</title>

<style>
body { font-family: Arial; padding: 20px; }

/* 🔥 FRAME */
.frame {
    width: 100%;
    height: 300px;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
}

/* TABLE */
table {
    border-collapse: collapse;
    width: 100%;
    min-width: 600px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

input {
    width: 100%;
    border: none;
    text-align: center;
}
</style>
</head>

<body>

<h2>login (editable)</h2>

<div class="frame">
<table>
<thead>
<tr>
<th>id</th>
<th>name</th>
<th>mobile</th>
<th>password</th>
<th>balance</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
    "https://katbdbzoufiblnnsoxkk.supabase.co",
    "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// LOAD DATA
async function load(){
    const { data, error } = await supabase
        .from("login")
        .select("*")

    if(error){
        alert(error.message)
        return
    }

    let html = ""

    data.forEach(row => {
        html += `
        <tr>
            <td>${row.id}</td>
            <td><input value="${row.name}" onchange="updateData('${row.id}','name',this.value)"></td>
            <td><input value="${row.mobile}" onchange="updateData('${row.id}','mobile',this.value)"></td>
            <td><input value="${row.password}" onchange="updateData('${row.id}','password',this.value)"></td>
            <td><input value="${row.balance}" onchange="updateData('${row.id}','balance',this.value)"></td>
        </tr>`
    })

    document.getElementById("data").innerHTML = html
}

// UPDATE
window.updateData = async (id, column, value) => {
    const { error } = await supabase
        .from("login")
        .update({ [column]: value })
        .eq("id", id)

    if(error){
        alert("Update failed")
    }
}

load()
</script>

</body>
</html>
