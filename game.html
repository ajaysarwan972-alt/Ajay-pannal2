<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }

.container {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
  padding-bottom:80px;
}

.box { background:#fff; padding:8px; text-align:center; border-radius:10px; }

.number { color:red; font-weight:bold; }

.bottom {
  position:fixed; bottom:0; width:100%; display:flex;
}

.total { width:50%; padding:15px; background:blue; color:#fff; text-align:center; }
.submit { width:50%; padding:15px; background:green; color:#fff; text-align:center; }
</style>
</head>

<body>

<div class="container" id="grid"></div>

<div class="bottom">
  <div class="total" id="total">₹ 0</div>
  <div class="submit" onclick="submitGame()">SUBMIT</div>
</div>

<script>

// 🔥 USER ID (HOME SE AAYEGI)
let params = new URLSearchParams(window.location.search);
let userId = params.get("userId");

if (!userId) {
    alert("User ID missing");
    throw new Error("No userId");
}

// 🔥 BOX CREATE
let grid = document.getElementById("grid");

for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
        <div class="number">${num}</div>
        <input type="number" id="box-${num}" oninput="calcTotal()">
    `;

    grid.appendChild(div);
}

// 🔥 TOTAL
function calcTotal() {
    let total = 0;

    for (let i = 0; i < 100; i++) {
        let num = i.toString().padStart(2, '0');
        let val = document.getElementById("box-" + num).value;

        if (val) total += parseInt(val);
    }

    document.getElementById("total").innerText = "₹ " + total;
}

// 🔥 SUBMIT
async function submitGame() {

    let total = 0;
    let dataArr = [];

    for (let i = 0; i < 100; i++) {
        let num = i.toString().padStart(2, '0');
        let val = document.getElementById("box-" + num).value;

        if (val && val > 0) {
            total += parseInt(val);
            dataArr.push({ number: num, amount: val });
        }
    }

    if (dataArr.length === 0) {
        alert("Amount daal");
        return;
    }

    try {
        // 🔥 USER BALANCE FETCH
        let res1 = await fetch(`https://api.baserow.io/api/database/rows/table/897341/${userId}/`, {
            headers: {
                "Authorization": "3S3iB1eHvIZwRS163mml32fuZhQ5heQf"
            }
        });

        let user = await res1.json();
        let balance = user.balance;

        if (balance < total) {
            alert("Low balance");
            return;
        }

        let newBalance = balance - total;

        // 🔥 UPDATE BALANCE
        await fetch(`https://api.baserow.io/api/database/rows/table/897341/${userId}/`, {
            method: "PATCH",
            headers: {
                "Authorization": "Token YOUR_API_TOKEN",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                balance: newBalance
            })
        });

        alert("Game Saved ✅");
        location.reload();

    } catch (err) {
        alert("Error");
    }
}

</script>

</body>
</html>
