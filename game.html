<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
}

.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 12px;
}

.box {
    background: white;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.number {
    color: red;
    font-weight: bold;
    margin-bottom: 5px;
}

.box input {
    width: 90%;
    height: 35px;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
    font-size: 16px;
}

.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.total {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: linear-gradient(to right, blue, red);
    color: white;
    font-size: 18px;
}

.submit {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: green;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container" id="grid"></div>

<div class="bottom">
    <div class="total" id="total">₹ 0</div>
    <div class="submit" onclick="submitGame()">SUBMIT</div>
</div>

<script>

// 🔥 USER ID URL SE (HOME → GAME)
let params = new URLSearchParams(window.location.search);
let userId = params.get("userId");

if (!userId) {
    alert("User ID missing");
    window.location.href = "index.html";
}

// 🔥 CREATE BOXES
let grid = document.getElementById("grid");

for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
        <div class="number">${num}</div>
        <input type="number" id="box-${num}" placeholder="₹" oninput="calcTotal()">
    `;

    grid.appendChild(div);
}

// 🔥 TOTAL
function calcTotal() {
    let total = 0;

    for (let i = 0; i < 100; i++) {
        let num = i.toString().padStart(2, '0');
        let val = document.getElementById("box-" + num).value;

        if (val) total += parseInt(val);
    }

    document.getElementById("total").innerText = "₹ " + total;
}

// 🔥 SUBMIT GAME
async function submitGame() {

    let total = 0;
    let data = [];

    for (let i = 0; i < 100; i++) {
        let num = i.toString().padStart(2, '0');
        let val = document.getElementById("box-" + num).value;

        if (val && val > 0) {
            total += parseInt(val);
            data.push({ number: num, amount: val });
        }
    }

    if (data.length === 0) {
        alert("Amount daal");
        return;
    }

    try {
        // 🔥 USER BALANCE BASEROW SE
        let res1 = await fetch(`https://api.baserow.io/api/database/rows/table/897341/${userId}/`, {
            headers: {
                "Authorization": "Token YOUR_API_TOKEN"
            }
        });

        let user = await res1.json();
        let balance = user.balance;

        if (balance < total) {
            alert("Low balance");
            return;
        }

        let newBalance = balance - total;

        // 🔥 UPDATE BALANCE BASEROW
        await fetch(`https://api.baserow.io/api/database/rows/table/897341/${userId}/`, {
            method: "PATCH",
            headers: {
                "Authorization": "Token YOUR_API_TOKEN",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                balance: newBalance
            })
        });

        alert("Game Saved ✅");
        location.reload();

    } catch (err) {
        alert("Error");
    }
}

</script>

</body>
</html>
