<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
}

.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 12px;
}

.box {
    background: white;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.number {
    color: red;
    font-weight: bold;
    margin-bottom: 5px;
}

.box input {
    width: 90%;
    height: 35px;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
    font-size: 16px;
}

.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.total {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: linear-gradient(to right, blue, red);
    color: white;
    font-size: 18px;
}

.submit {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: green;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container" id="grid"></div>

<div class="bottom">
    <div class="total" id="total">₹ 0</div>
    <div class="submit" onclick="submitGame()">SUBMIT</div>
</div>

<script>

// 🔥 USER
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
    alert("Login first");
    window.location.href = "index.html";
}

// 🔥 GAME NAME
let params = new URLSearchParams(window.location.search);
let gameName = params.get("game") || "DEFAULT";

// CREATE BOXES
let grid = document.getElementById("grid");

for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
        <div class="number">${num}</div>
        <input type="number" placeholder="₹" oninput="calcTotal()">
    `;

    grid.appendChild(div);
}

// 🔥 TOTAL CALCULATION (same tera system)
function calcTotal() {
    let inputs = document.querySelectorAll("input");
    let total = 0;

    inputs.forEach(input => {
        if(input.value){
            total += Number(input.value);
        }
    });

    document.getElementById("total").innerText = "₹ " + total;
}

// 🔥 SUBMIT GAME (tera system + history add)
function submitGame(){

    let inputs = document.querySelectorAll("input");
    let bets = [];

    inputs.forEach((input, index) => {
        if(input.value){
            let num = index.toString().padStart(2,'0');
            bets.push(num + "-" + input.value);
        }
    });

    if(bets.length === 0){
        alert("Kuch enter karo ❌");
        return;
    }

    // 🔥 HISTORY SAVE (NEW ADD)
    let history = JSON.parse(localStorage.getItem("admin_history")) || [];

    history.push({
        game: gameName,
        bets: bets.join(", "),
        date: new Date().toLocaleString()
    });

    localStorage.setItem("admin_history", JSON.stringify(history));

    alert("Submit Ho Gaya ✅");

    // 🔄 RESET (same tera)
    inputs.forEach(input => input.value = "");
    document.getElementById("total").innerText = "₹ 0";
}

</script>

</body>
</html>
