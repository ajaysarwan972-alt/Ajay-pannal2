<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
}

.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 12px;
}

.box {
    background: white;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.number {
    color: red;
    font-weight: bold;
    margin-bottom: 5px;
}

.box input {
    width: 90%;
    height: 35px;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
    font-size: 16px;
}

.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.total {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: linear-gradient(to right, blue, red);
    color: white;
    font-size: 18px;
}

.submit {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: green;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container" id="grid"></div>

<div class="bottom">
    <div class="total" id="total">₹ 0</div>
    <div class="submit" onclick="submitGame()">SUBMIT</div>
</div>

<script>

// 🔥 USER (login se aata hai)
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
    alert("Login first");
    window.location.href = "index.html";
}

// 🔥 BASEROW CONFIG
const TOKEN = "3S3iB1eHvIZwRS163mml32fuZhQ5heQf";
const TABLE_ID = "897341"; // tera table

// 🔥 CREATE BOXES
let grid = document.getElementById("grid");

for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
        <div class="number">${num}</div>
        <input type="number" placeholder="₹" oninput="calcTotal()">
    `;

    grid.appendChild(div);
}

// 🔥 TOTAL CALCULATION
function calcTotal() {
    let inputs = document.querySelectorAll("input");
    let total = 0;

    inputs.forEach(i => {
        total += Number(i.value) || 0;
    });

    document.getElementById("total").innerText = "₹ " + total;
}

// 🔥 SUBMIT GAME
async function submitGame(){

    let inputs = document.querySelectorAll("input");
    let total = 0;

    inputs.forEach(i => {
        total += Number(i.value) || 0;
    });

    if(total <= 0){
        alert("Enter amount");
        return;
    }

    try{

        // 👉 1. USER DATA FETCH
        let res = await fetch(`https://api.baserow.io/api/database/rows/table/${TABLE_ID}/${user.id}/`, {
            headers: {
                "Authorization": "Token " + TOKEN
            }
        });

        let data = await res.json();

        let currentBalance = Number(data.balance);

        // 👉 2. CHECK BALANCE
        if(currentBalance < total){
            alert("Low balance");
            return;
        }

        let newBalance = currentBalance - total;

        // 👉 3. UPDATE BALANCE
        await fetch(`https://api.baserow.io/api/database/rows/table/${TABLE_ID}/${user.id}/`, {
            method: "PATCH",
            headers: {
                "Authorization": "Token " + TOKEN,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                balance: newBalance
            })
        });

        alert("Game Submitted ✅ Balance Cut Ho Gaya");

        // 👉 OPTIONAL: reset inputs
        document.querySelectorAll("input").forEach(i => i.value = "");
        calcTotal();

    }catch(err){
        alert("Error: " + err.message);
    }
}

</script>

</body>
</html>
