<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }

.container {
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:12px;
    padding:12px;
}

.box {
    background:white;
    border-radius:12px;
    padding:10px;
    text-align:center;
}

.number { color:red; font-weight:bold; }

.box input {
    width:90%;
    height:35px;
    border-radius:8px;
    border:1px solid #ccc;
    text-align:center;
}

.bottom {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
}

.total {
    width:50%;
    padding:15px;
    background:blue;
    color:white;
    text-align:center;
}

.submit {
    width:50%;
    padding:15px;
    background:green;
    color:white;
    text-align:center;
}
</style>
</head>

<body>

<div class="container" id="grid"></div>

<div class="bottom">
    <div class="total" id="total">₹ 0</div>
    <div class="submit" onclick="submitGame()">SUBMIT</div>
</div>

<script>

// 🔥 USER (sirf mobile use)
let user = JSON.parse(localStorage.getItem("user"));
if(!user){
    alert("Login first");
    location.href = "index.html";
}

// CREATE BOX
let grid = document.getElementById("grid");

for(let i=0;i<100;i++){
    let num = i.toString().padStart(2,'0');

    let div = document.createElement("div");
    div.className="box";

    div.innerHTML = `
        <div class="number">${num}</div>
        <input type="number" oninput="calcTotal()">
    `;

    grid.appendChild(div);
}

// TOTAL
function calcTotal(){
    let inputs=document.querySelectorAll("input");
    let total=0;

    inputs.forEach(i=>{
        total += Number(i.value) || 0;
    });

    document.getElementById("total").innerText = "₹ " + total;
}

// SUBMIT GAME
async function submitGame(){

    let inputs=document.querySelectorAll("input");
    let total=0;

    inputs.forEach(i=>{
        total += Number(i.value) || 0;
    });

    if(total==0){
        alert("Enter amount");
        return;
    }

    // 🔥 GET USER FROM SERVER (BASEROW)
    let res = await fetch("/get-user",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ mobile:user.mobile })
    });

    let dbUser = await res.json();

    if(!dbUser){
        alert("User not found");
        return;
    }

    let balance = Number(dbUser.balance);

    if(balance < total){
        alert("Low balance");
        return;
    }

    let newBalance = balance - total;

    // 🔥 UPDATE BALANCE
    await fetch("/update-balance",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            id: dbUser.id,
            balance: newBalance
        })
    });

    alert("✅ REAL Balance Cut Ho Gaya");

    location.reload();
}

</script>

</body>
</html>
