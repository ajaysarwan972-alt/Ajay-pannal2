<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
}

.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 12px;
}

.box {
    background: white;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.number {
    color: red;
    font-weight: bold;
    margin-bottom: 5px;
}

.box input {
    width: 90%;
    height: 35px;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
    font-size: 16px;
}

.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.total {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: linear-gradient(to right, blue, red);
    color: white;
    font-size: 18px;
}

.submit {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: green;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container" id="grid"></div>

<div class="bottom">
    <div class="total" id="total">₹ 0</div>
    <div class="submit" onclick="submitGame()">SUBMIT</div>
</div>

<script>

// 🔥 USER CHECK
let user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    alert("Login first");
    window.location.href = "index.html";
}

// 🔥 CREATE 00–99 BOXES
let grid = document.getElementById("grid");

for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
        <div class="number">${num}</div>
        <input type="number" id="box-${num}" placeholder="₹" oninput="calcTotal()">
    `;

    grid.appendChild(div);
}

// 🔥 TOTAL CALCULATION
function calcTotal() {
    let total = 0;

    for (let i = 0; i < 100; i++) {
        let num = i.toString().padStart(2, '0');
        let val = document.getElementById(`box-${num}`).value;

        if (val) total += Number(val);
    }

    document.getElementById("total").innerText = "₹ " + total;
}

// 🔥 SUBMIT GAME
async function submitGame() {

    let data = [];
    let total = 0;

    for (let i = 0; i < 100; i++) {
        let num = i.toString().padStart(2, '0');
        let val = document.getElementById(`box-${num}`).value;

        if (val && val > 0) {
            data.push({
                number: num,
                amount: Number(val)
            });
            total += Number(val);
        }
    }

    if (data.length === 0) {
        alert("Kuch amount daal bhai 😑");
        return;
    }

    try {
        const res = await fetch("https://ajay-pannal2.onrender.com/submit-game", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userId: user.id || user.userId,
                game: "main",
                data: data,
                total: total
            })
        });

        const result = await res.json();

        // 🔥 HISTORY SAVE (SAFE)
        let history = [];

        try {
            history = JSON.parse(localStorage.getItem("history")) || [];
        } catch {
            localStorage.removeItem("history");
        }

        history.push({
            game: "main",
            data: data,
            total: total,
            time: new Date().toLocaleString()
        });

        if (history.length > 50) history.shift();

        localStorage.setItem("history", JSON.stringify(history));

        alert("Game Submitted ✅");

        // 🔥 RESET
        document.querySelectorAll("input").forEach(inp => inp.value = "");
        calcTotal();

    } catch (err) {
        alert("Error: " + err.message);
    }
}

</script>

</body>
</html>
