<script>

// 🔥 USER ID (HOME SE)
let params = new URLSearchParams(window.location.search);
let userId = params.get("userId");

if (!userId) {
    alert("User ID missing");
    window.location.href = "index.html";
}

// 🔥 GAME NAME
let gameName = params.get("game") || "DEFAULT";

// 🔥 CREATE BOXES
let grid = document.getElementById("grid");

for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
        <div class="number">${num}</div>
        <input type="number" id="box-${num}" placeholder="₹" oninput="calcTotal()">
    `;

    grid.appendChild(div);
}

// 🔥 TOTAL
function calcTotal() {
    let total = 0;

    for (let i = 0; i < 100; i++) {
        let num = i.toString().padStart(2, '0');
        let val = document.getElementById("box-" + num).value;

        if (val) total += parseInt(val);
    }

    document.getElementById("total").innerText = "₹ " + total;
}

// 🔥 SUBMIT GAME
async function submitGame() {

    let total = 0;
    let data = [];

    for (let i = 0; i < 100; i++) {
        let num = i.toString().padStart(2, '0');
        let val = document.getElementById("box-" + num).value;

        if (val && val > 0) {
            total += parseInt(val);
            data.push({ number: num, amount: val });
        }
    }

    if (data.length === 0) {
        alert("Amount daal");
        return;
    }

    try {
        // 🔥 USER FETCH (BASEROW)
        let res1 = await fetch(`https://api.baserow.io/api/database/rows/table/897341/${userId}/`, {
            headers: {
                "Authorization": "Token YOUR_API_TOKEN"
            }
        });

        let user = await res1.json();
        let balance = user.balance;

        if (balance < total) {
            alert("Low balance");
            return;
        }

        let newBalance = balance - total;

        // 🔥 UPDATE BALANCE
        await fetch(`https://api.baserow.io/api/database/rows/table/897341/${userId}/`, {
            method: "PATCH",
            headers: {
                "Authorization": "3S3iB1eHvIZwRS163mml32fuZhQ5heQf",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                balance: newBalance
            })
        });

        alert("Game Saved ✅");
        location.reload();

    } catch (err) {
        alert("Error");
    }
}

</script>
