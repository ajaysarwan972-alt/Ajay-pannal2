<!DOCTYPE html>
<html>
<head>
    <title>Game 00-99</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
        }

        h2 {
            margin: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 8px;
        }

        input {
            width: 80%;
            padding: 6px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: green;
            color: white;
            border: none;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h2>Balance: ₹ <span id="balance">0</span></h2>

<div class="grid" id="game"></div>

<button onclick="submitGame()">SUBMIT</button>

<script>

// 🔥 USER (login ke baad mobile save hona chahiye)
const mobile = localStorage.getItem("mobile");

// 🔥 00–99 numbers generate
const numbers = [];
for (let i = 0; i <= 99; i++) {
    numbers.push(i.toString().padStart(2, '0'));
}

// 🔥 LOAD GAME UI
const gameDiv = document.getElementById("game");

numbers.forEach(num => {
    gameDiv.innerHTML += `
        <div class="box">
            <h3>${num}</h3>
            <input type="number" id="box-${num}" placeholder="₹">
        </div>
    `;
});

// 🔥 LOAD USER FROM SERVER
async function loadUser() {

    try {
        const res = await fetch("https://ajay-pannal2.onrender.com/get-user", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ mobile: mobile })
        });

        const data = await res.json();

        if (data) {
            document.getElementById("balance").innerText = data.balance;
            localStorage.setItem("userId", data.id);
        } else {
            alert("User not found");
        }

    } catch (err) {
        alert("Load error: " + err.message);
    }
}

loadUser();


// 🔥 SUBMIT GAME
async function submitGame() {

    let total = 0;

    numbers.forEach(num => {
        const val = document.getElementById(`box-${num}`).value;
        if (val) total += parseInt(val);
    });

    if (total === 0) {
        alert("Amount daal");
        return;
    }

    let balance = parseInt(document.getElementById("balance").innerText);

    if (balance < total) {
        alert("Balance kam hai");
        return;
    }

    const newBalance = balance - total;

    try {
        const res = await fetch("https://ajay-pannal2.onrender.com/update-balance", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                id: localStorage.getItem("userId"),
                balance: newBalance
            })
        });

        const data = await res.json();

        if (data.id) {
            document.getElementById("balance").innerText = newBalance;
            alert("✅ Balance cut ho gaya (REAL)");
        } else {
            alert("❌ Server error");
        }

    } catch (err) {
        alert("❌ " + err.message);
    }
}

</script>

</body>
</html>
