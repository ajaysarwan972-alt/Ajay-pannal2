<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 12px;
}

/* BOX */
.box {
    background: white;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.number {
    color: red;
    font-weight: bold;
    margin-bottom: 5px;
}

.box input {
    width: 90%;
    height: 35px;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
    font-size: 16px;
}

/* BOTTOM BAR */
.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.total {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: linear-gradient(to right, blue, red);
    color: white;
    font-size: 18px;
}

.submit {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: green;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container" id="grid"></div>

<div class="bottom">
    <div class="total" id="total">₹ 0</div>
    <div class="submit" onclick="submitGame()">SUBMIT</div>
</div>

<script>

// 🔥 USER LOAD
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
    alert("Login first");
    window.location.href = "index.html";
}

// CREATE 00–99 BOXES
let grid = document.getElementById("grid");

for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
        <div class="number">${num}</div>
        <input type="number" placeholder="₹" oninput="calcTotal()">
    `;

    grid.appendChild(div);
}

// CALCULATE TOTAL
function calcTotal() {
    let inputs = document.querySelectorAll("input");
    let total = 0;

    inputs.forEach(input => {
        total += Number(input.value) || 0;
    });

    document.getElementById("total").innerText = "₹ " + total;
}

// 🔥 BASEROW UPDATE FUNCTION
async function updateBalance(newBalance){

let API_TOKEN = "3S3iB1eHvIZwRS163mml32fuZhQ5heQf";

await fetch(`https://api.baserow.io/api/database/rows/table/897341/${user.id}/?user_field_names=true`, {
  method: "PATCH",
  headers: {
    "Authorization": "Token " + API_TOKEN,
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    balance: newBalance
  })
});

// local update
user.balance = newBalance;
localStorage.setItem("user", JSON.stringify(user));

}

// 🔥 SUBMIT GAME
function submitGame(){

let inputs = document.querySelectorAll("input");
let total = 0;

inputs.forEach(input => {
    total += Number(input.value) || 0;
});

// ❌ EMPTY CHECK
if(total <= 0){
    alert("Enter amount ❌");
    return;
}

// ❌ LOW BALANCE
if(user.balance < total){
    alert("Low Balance ❌");
    return;
}

// 🔥 BALANCE MINUS
let newBalance = user.balance - total;

// 🔥 UPDATE
updateBalance(newBalance);

alert("Game Submitted ✅");

// HOME PAGE
window.location.href = "home.html";

}

</script>

</body>
</html>
