<!DOCTYPE html>
<html>
<head>
    <title>Game</title>
</head>
<body>

<h2>Balance: ₹ <span id="balance">0</span></h2>

<input type="number" placeholder="Enter Amount" id="amount">

<br><br>

<button onclick="submitGame()">SUBMIT</button>

<script>
const API = "https://ajay-pannal2.onrender.com";

document.getElementById("balance").innerText = localStorage.getItem("balance") || 0;

async function submitGame() {

    const id = localStorage.getItem("userId");
    const amount = parseInt(document.getElementById("amount").value);

    if (!amount) {
        alert("Amount daal bhai");
        return;
    }

    let balance = parseInt(localStorage.getItem("balance")) || 0;

    if (balance < amount) {
        alert("Balance kam hai");
        return;
    }

    const newBalance = balance - amount;

    try {
        const res = await fetch(API + "/update-balance", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                id: id,
                balance: newBalance
            })
        });

        const data = await res.json();

        if (data.id) {
            localStorage.setItem("balance", newBalance);
            document.getElementById("balance").innerText = newBalance;
            alert("✅ Balance cut ho gaya (REAL)");
        } else {
            alert("❌ Server error");
        }

    } catch (err) {
        alert("❌ " + err.message);
    }
}
</script>

</body>
</html>
