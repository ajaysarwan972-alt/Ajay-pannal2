<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
}

.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 12px;
}

.box {
    background: white;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.number {
    color: red;
    font-weight: bold;
    margin-bottom: 5px;
}

.box input {
    width: 90%;
    height: 35px;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
    font-size: 16px;
}

.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.total {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: linear-gradient(to right, blue, red);
    color: white;
    font-size: 18px;
}

.submit {
    width: 50%;
    padding: 15px;
    text-align: center;
    background: green;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container" id="grid"></div>

<div class="bottom">
    <div class="total" id="total">₹ 0</div>
    <div class="submit" onclick="submitGame()">SUBMIT</div>
</div>

<script>

// 🔐 CONFIG
const API_TOKEN = "PASTE_NEW_TOKEN_HERE"; 3S3iB1eHvIZwRS163mml32fuZhQ5heQf apna NEW token daal
const TABLE_ID = "897341";

// 🔥 USER ID (login ke time save hona chahiye)
const USER_ID = localStorage.getItem("user_id");

if(!USER_ID){
    alert("Login first");
    window.location.href = "index.html";
}

let currentBalance = 0;

// 🔥 GET USER DATA
async function getUser() {
    let res = await fetch(`https://api.baserow.io/api/database/rows/table/${TABLE_ID}/${USER_ID}/`, {
        headers: {
            "Authorization": "Token " + API_TOKEN
        }
    });

    let data = await res.json();
    currentBalance = parseInt(data.balance) || 0;
}

// 🔥 UPDATE BALANCE
async function updateBalance(newBalance) {
    await fetch(`https://api.baserow.io/api/database/rows/table/${TABLE_ID}/${USER_ID}/`, {
        method: "PATCH",
        headers: {
            "Authorization": "Token " + API_TOKEN,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            balance: newBalance
        })
    });
}

// 🔥 CREATE BOXES
let grid = document.getElementById("grid");

for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
        <div class="number">${num}</div>
        <input type="number" placeholder="₹" oninput="calcTotal()">
    `;

    grid.appendChild(div);
}

// 🔥 TOTAL CALC
function calcTotal() {
    let inputs = document.querySelectorAll("input");
    let total = 0;

    inputs.forEach(input => {
        total += parseInt(input.value) || 0;
    });

    document.getElementById("total").innerText = "₹ " + total;
}

// 🔥 SUBMIT GAME
async function submitGame() {

    let inputs = document.querySelectorAll("input");
    let total = 0;

    inputs.forEach(input => {
        total += parseInt(input.value) || 0;
    });

    if (total === 0) {
        alert("Amount dalo");
        return;
    }

    if (total > currentBalance) {
        alert("Balance kam hai ❌");
        return;
    }

    let newBalance = currentBalance - total;

    // 🔥 UPDATE BASEROW
    await updateBalance(newBalance);

    alert("Bet placed ✅");

    location.reload();
}

// 🔥 LOAD USER DATA
getUser();

</script>

</body>
</html>
