<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pair Game</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  padding:15px;
}

h2{
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}

.submit{
  background:#22c55e;
  color:#fff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}

.box{
  background:#fff;
  border-radius:10px;
  padding:10px;
  text-align:center;
  border:1px solid #ddd;
}

.num{
  color:red;
  font-weight:bold;
}

.total{
  text-align:center;
  margin-top:15px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>Pair Game</h2>

<input type="text" id="first" placeholder="1st Number (e.g. 012345)">
<input type="text" id="second" placeholder="2nd Number (e.g. 6789)">
<input type="number" id="points" placeholder="Points (min ₹1)">

<button class="submit" onclick="generate()">SUBMIT</button>

<div class="grid" id="grid"></div>

<div class="total" id="total"></div>

<script>

function generate(){
  let f=document.getElementById("first").value.replace(/\D/g,'');
  let s=document.getElementById("second").value.replace(/\D/g,'');
  let p=parseInt(document.getElementById("points").value);

  if(!f || !s || !p){
    alert("Fill all fields");
    return;
  }

  // 🔥 minimum ₹1 fix
  if(p < 1){
    alert("Minimum ₹1 point required");
    return;
  }

  let grid=document.getElementById("grid");
  grid.innerHTML="";

  let total=0;

  // 🔥 unlimited digits pair logic
  for(let i=0;i<f.length;i++){
    for(let j=0;j<s.length;j++){
      
      let num = f[i] + s[j];

      total += p;

      grid.innerHTML += `
        <div class="box">
          <div class="num">${num}</div>
          <div>₹ ${p}</div>
        </div>
      `;
    }
  }

  document.getElementById("total").innerText="Total Points: ₹ " + total;
}

</script>

</body>
  </html>
