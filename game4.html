<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game 4</title>

<style>
body{
  font-family:Arial;
  background:#e5e7eb;
  margin:0;
}

.header{
  background:#fff;
  padding:15px;
  border-radius:0 0 20px 20px;
  display:flex;
  justify-content:space-between;
}

.wallet{
  background:red;
  color:#fff;
  padding:10px;
  border-radius:10px;
}

.container{
  margin:15px;
  background:#fff;
  padding:20px;
  border-radius:20px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.box{
  display:flex;
  flex-direction:column;
}

label{
  color:red;
  font-weight:bold;
  margin-bottom:5px;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

.submit-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.btn{
  padding:12px;
  border:none;
  border-radius:12px;
  color:#fff;
  cursor:pointer;
}

.submit{background:green;}
.back{background:red; margin-top:10px;}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}

.card{
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
  text-align:center;
  border:1px solid #ddd;
}

.num{color:red; font-weight:bold;}

.total{
  text-align:center;
  margin-top:15px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
  <div>☰ Golde n</div>
  <div class="wallet">₹ 0.70</div>
</div>

<div class="container">

  <div class="row">
    <div class="box">
      <label>1ST NUMBER</label>
      <input type="text" id="first">
    </div>

    <div class="box">
      <label>2ND NUMBER</label>
      <input type="text" id="second">
    </div>
  </div>

  <div class="submit-row">
    <div class="box">
      <label>POINTS</label>
      <input type="number" id="points">
    </div>

    <div>
      <button class="btn submit" onclick="generate()">SUBMIT</button>
      <button class="btn back" onclick="goBack()">BACK</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="grid" id="grid"></div>
  <div class="total" id="total"></div>

</div>

<script>

function generate(){
  let f=document.getElementById("first").value.replace(/\D/g,'');
  let s=document.getElementById("second").value.replace(/\D/g,'');
  let p=parseInt(document.getElementById("points").value);

  if(!f || !s || !p){
    alert("Fill all fields");
    return;
  }

  if(p < 1){
    alert("Minimum ₹1 required");
    return;
  }

  let grid=document.getElementById("grid");
  grid.innerHTML="";

  let total=0;

  // 🔥 pair calculation
  for(let i=0;i<f.length;i++){
    for(let j=0;j<s.length;j++){

      let num = f[i] + s[j];

      total += p;

      grid.innerHTML += `
        <div class="card">
          <div class="num">${num}</div>
          <div>₹ ${p}</div>
        </div>
      `;
    }
  }

  document.getElementById("total").innerText="Total: ₹ " + total;
}

function goBack(){
  window.history.back();
}

</script>

</body>
</html>
