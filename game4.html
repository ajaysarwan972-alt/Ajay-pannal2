<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game 4</title>

<style>
body{
  font-family:Arial;
  background:#e5e7eb;
  margin:0;
}

/* header */
.header{
  background:#fff;
  padding:15px;
  border-radius:0 0 20px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.wallet{
  background:red;
  color:#fff;
  padding:10px 15px;
  border-radius:10px;
  font-weight:bold;
}

/* container */
.container{
  margin:15px;
  background:#fff;
  padding:20px;
  border-radius:20px;
}

/* 2 column layout */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:10px;
}

.box{
  display:flex;
  flex-direction:column;
}

label{
  color:red;
  font-weight:bold;
  margin-bottom:5px;
}

input{
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

/* submit section */
.submit-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.btn{
  padding:14px;
  border:none;
  border-radius:15px;
  font-size:16px;
  color:#fff;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.submit{
  background:linear-gradient(to right,#84cc16,#22c55e);
}

.back{
  background:linear-gradient(to right,#f43f5e,#ef4444);
  margin-top:10px;
}
</style>
</head>

<body>

<!-- header -->
<div class="header">
  <div>☰ &nbsp; Golde n</div>
  <div class="wallet">₹ 0.70</div>
</div>

<div class="container">

  <!-- row 1 -->
  <div class="row">
    <div class="box">
      <label>1ST NUMBER</label>
      <input type="text" id="first">
    </div>

    <div class="box">
      <label>2ND NUMBER</label>
      <input type="text" id="second">
    </div>
  </div>

  <!-- row 2 -->
  <div class="submit-row">
    <div class="box">
      <label>POINTS</label>
      <input type="number" id="points">
    </div>

    <div>
      <button class="btn submit" onclick="submitGame()">SUBMIT</button>
      <button class="btn back" onclick="goBack()">BACK</button>
    </div>
  </div>

</div>

<script>

// submit (abhi simple alert, baad me logic laga denge)
function submitGame(){
  let f=document.getElementById("first").value;
  let s=document.getElementById("second").value;
  let p=document.getElementById("points").value;

  if(!f || !s || !p){
    alert("Fill all fields");
    return;
  }

  alert("Game Submitted");
}

// back button
function goBack(){
  window.history.back();
}

</script>

</body>
</html>
