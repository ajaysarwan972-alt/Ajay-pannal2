<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    margin:0;
}

/* HEADER */
.header{
    background:#fff;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.balance{
    background:red;
    color:#fff;
    padding:8px 15px;
    border-radius:12px;
    font-weight:bold;
}

/* MAIN BOX */
.container{
    margin:15px;
    background:#fff;
    border-radius:15px;
    padding:15px;
}

/* TITLE */
.title{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#8B0000;
    margin-bottom:15px;
}

/* TABLE HEADER */
.head{
    display:flex;
    justify-content:space-between;
    background:red;
    color:#fff;
    padding:12px;
    border-radius:8px;
    font-weight:bold;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
    padding:12px 5px;
    border-bottom:1px solid #ddd;
}

/* RESULT COLOR */
.result{
    color:blue;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>☰ Golden</div>
    <div class="balance">₹ 0</div>
</div>

<!-- RESULT BOX -->
<div class="container">

    <div class="title" id="marketTitle">MARKET</div>

    <div class="head">
        <div>Opening Date</div>
        <div>Result</div>
    </div>

    <div id="list"></div>

</div>

<script>

// 🔥 SUPABASE CONNECT
const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 MARKET GET FROM URL
const params = new URLSearchParams(window.location.search);
const market = params.get("market") || "DISAWAR";

document.getElementById("marketTitle").innerText = market;

// 🔥 LOAD RESULT
async function loadResult(){

    const { data, error } = await client
        .from("Game_result") // 👈 IMPORTANT (G capital)
        .select("*")
        .eq("market", market)
        .order("created_at", { ascending:false });

    if(error){
        console.log(error);
        return;
    }

    let html = "";

    if(data && data.length > 0){

        data.forEach(function(r){

            let date = new Date(r.created_at).toISOString().split("T")[0];
            let number = String(r.number).padStart(2,'0');

            html += `
            <div class="row">
                <div>${date}</div>
                <div class="result">${number}</div>
            </div>
            `;
        });

    } else {
        html = "<div style='text-align:center;padding:20px;'>No Result Found</div>";
    }

    document.getElementById("list").innerHTML = html;
}

// 🔥 AUTO LOAD
loadResult();

</script>

</body>
</html>
