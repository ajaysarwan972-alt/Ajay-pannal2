<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial;
    padding:15px;
}

h2{text-align:center;}

select,input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.save{background:green;color:#fff;}
.run{background:red;color:#fff;}

.box{
    background:#222;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>ADMIN PANEL</h2>

<select id="market">
    <option>Deshawar</option>
    <option>Gali</option>
    <option>Gaziabad</option>
</select>

<input type="number" id="result" placeholder="Enter Result Number">

<button class="save" onclick="saveResult()">Save Result</button>
<button class="run" onclick="runWinners()">Run Winning</button>

<h3>History Bets</h3>
<div id="bets"></div>

<script>

// ✅ TERA SUPABASE
const supabase = window.supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔹 LOAD HISTORY
async function loadBets(){
    let market = document.getElementById("market").value;

    let {data} = await supabase
        .from("history")
        .select("*")
        .eq("market", market);

    let html = "";

    data.forEach(item=>{
        html += `
        <div class="box">
            User: ${item.user_id} <br>
            Total: ${item.total} <br>
            Data: ${item.data}
        </div>`;
    });

    document.getElementById("bets").innerHTML = html;
}

loadBets();


// 🔹 SAVE RESULT (Game result table me)
async function saveResult(){

    let market = document.getElementById("market").value;
    let result = document.getElementById("result").value;

    await supabase
        .from("Game result")
        .update({ number: result })
        .eq("name", market);

    alert("Result Saved ✅");
}


// 🔥 AUTO WINNING SYSTEM
async function runWinners(){

    let market = document.getElementById("market").value;

    // result uthao
    let {data: resData} = await supabase
        .from("Game result")
        .select("*")
        .eq("name", market)
        .single();

    let winNumber = resData.number;

    // history lao
    let {data: history} = await supabase
        .from("history")
        .select("*")
        .eq("market", market);

    for(let bet of history){

        let numbers = JSON.parse(bet.data);

        for(let item of numbers){

            if(item.number == winNumber){

                let winning = item.amount * 95;

                // user lao
                let {data:user} = await supabase
                    .from("users")
                    .select("*")
                    .eq("id", bet.user_id)
                    .single();

                let newBalance = user.balance + winning;

                // balance update
                await supabase
                    .from("users")
                    .update({ balance: newBalance })
                    .eq("id", bet.user_id);

            }
        }
    }

    alert("Winning Done ✅");
}

</script>

</body>
</html>
