<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial;
    padding:15px;
}

h2{text-align:center;}

select,input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.save{background:green;color:#fff;}
.run{background:red;color:#fff;}

.box{
    background:#222;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>ADMIN PANEL</h2>

<select id="market">
    <option>Deshawar</option>
    <option>Gali</option>
    <option>Gaziabad</option>
</select>

<input type="number" id="result" placeholder="Enter Result Number">

<button class="save" onclick="saveResult()">Save Result</button>
<button class="run" onclick="runWinning()">Run Winning</button>

<h3 id="totalAmount">Total Collection: ₹0</h3>

<h3>Today Bets</h3>
<div id="bets"></div>

<script>

// ✅ SUPABASE CONNECT
const supabase = window.supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔹 LOAD BETS + TOTAL
async function loadBets(){

    let market = document.getElementById("market").value;

    let {data, error} = await supabase
        .from("history")
        .select("*")
        .eq("market", market);

    if(error){
        console.log(error);
        return;
    }

    let html = "";
    let total = 0;

    data.forEach(item=>{
        total += item.total || 0;

        html += `
        <div class="box">
            User: ${item.user_id}<br>
            Total: ₹${item.total}<br>
            Data: ${item.data}
        </div>`;
    });

    document.getElementById("bets").innerHTML = html;
    document.getElementById("totalAmount").innerText = "Total Collection: ₹" + total;
}

// 🔥 Market change pe reload
document.getElementById("market").addEventListener("change", loadBets);

loadBets();


// 🔹 SAVE RESULT + REFRESH
async function saveResult(){

    let market = document.getElementById("market").value;
    let result = document.getElementById("result").value;

    if(!result){
        alert("Enter Result");
        return;
    }

    let {error} = await supabase
        .from("Game result")
        .update({ number: result })
        .eq("name", market);

    if(error){
        alert("Error saving result");
        return;
    }

    alert("Result Saved ✅");

    // 🔥 AUTO REFRESH
    location.reload();
}


// 🔥 RUN WINNING (95 RATE) + REFRESH
async function runWinning(){

    let market = document.getElementById("market").value;

    let {data: resData, error: resError} = await supabase
        .from("Game result")
        .select("*")
        .eq("name", market)
        .single();

    if(resError){
        alert("Result not found");
        return;
    }

    let winNumber = resData.number;

    let {data: history, error: hisError} = await supabase
        .from("history")
        .select("*")
        .eq("market", market);

    if(hisError){
        alert("Error loading bets");
        return;
    }

    for(let bet of history){

        let numbers = JSON.parse(bet.data);

        for(let item of numbers){

            if(item.number == winNumber){

                let winning = item.amount * 95;

                let {data:user} = await supabase
                    .from("users")
                    .select("*")
                    .eq("id", bet.user_id)
                    .single();

                let newBalance = (user.balance || 0) + winning;

                await supabase
                    .from("users")
                    .update({ balance: newBalance })
                    .eq("id", bet.user_id);
            }
        }
    }

    alert("Winning Done ✅");

    // 🔥 AUTO REFRESH
    location.reload();
}

</script>

</body>
</html>
