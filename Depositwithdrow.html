<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;padding:10px;}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    margin-bottom:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

button{
    padding:5px 10px;
    border:none;
    border-radius:5px;
    color:#fff;
}

.approve{background:green;}
.cancel{background:red;}
.done{color:green;font-weight:bold;}
</style>
</head>

<body>

<h3>Deposit</h3>
<table>
<thead>
<tr>
<th>ID</th><th>User</th><th>Name</th><th>Mobile</th><th>Amount</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="depositData"></tbody>
</table>

<h3>Withdraw</h3>
<table>
<thead>
<tr>
<th>ID</th><th>User</th><th>Name</th><th>Mobile</th><th>Amount</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="withdrawData"></tbody>
</table>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 COMMON FUNCTION (USER FIX)
async function getUserDetails(user_id){
    let { data } = await client
    .from("login")
    .select("name,mobile")
    .eq("id", user_id)
    .single();

    return data || {name:"-", mobile:"-"};
}

// 🔥 LOAD DEPOSIT
async function loadDeposits(){

    let { data } = await client
    .from("deposit_requests")
    .select("*")
    .order("id",{ascending:false});

    let html="";

    for (let r of data){

        let userInfo = await getUserDetails(r.user_id);

        let action = "";

        if(r.status === "approved"){
            action = `<span class="done">✔ Approved</span>`;
        }else if(r.status === "cancelled"){
            action = `<span style="color:red;">❌ Cancelled</span>`;
        }else{
            action = `
            <button class="approve" onclick="approveDeposit(${r.id},${r.user_id},${r.amount})">Approve</button>
            <button class="cancel" onclick="cancelDeposit(${r.id})">Cancel</button>
            `;
        }

        html+=`
        <tr>
        <td>${r.id}</td>
        <td>${r.user_id}</td>
        <td>${userInfo.name}</td>
        <td>${userInfo.mobile}</td>
        <td>${r.amount}</td>
        <td>${r.status}</td>
        <td>${action}</td>
        </tr>`;
    }

    document.getElementById("depositData").innerHTML=html;
}

// 🔥 LOAD WITHDRAW
async function loadWithdraw(){

    let { data } = await client
    .from("withdraw_requests")
    .select("*")
    .order("id",{ascending:false});

    let html="";

    for (let r of data){

        let userInfo = await getUserDetails(r.user_id);

        let action = "";

        if(r.status === "approved"){
            action = `<span class="done">✔ Approved</span>`;
        }else if(r.status === "cancelled"){
            action = `<span style="color:red;">❌ Cancelled</span>`;
        }else{
            action = `
            <button class="approve" onclick="approveWithdraw(${r.id},${r.user_id},${r.amount})">Approve</button>
            <button class="cancel" onclick="cancelWithdraw(${r.id})">Cancel</button>
            `;
        }

        html+=`
        <tr>
        <td>${r.id}</td>
        <td>${r.user_id}</td>
        <td>${userInfo.name}</td>
        <td>${userInfo.mobile}</td>
        <td>${r.amount}</td>
        <td>${r.status}</td>
        <td>${action}</td>
        </tr>`;
    }

    document.getElementById("withdrawData").innerHTML=html;
}

// ✅ APPROVE DEPOSIT
async function approveDeposit(id,user_id,amount){

    let { data: check } = await client
    .from("deposit_requests")
    .select("status")
    .eq("id",id)
    .single();

    if(check.status === "approved"){
        alert("Already Approved");
        return;
    }

    await client.from("deposit_requests")
    .update({status:"approved"})
    .eq("id",id);

    let { data } = await client
    .from("login")
    .select("balance")
    .eq("id",user_id)
    .single();

    let newBalance = (data.balance || 0) + amount;

    await client.from("login")
    .update({balance:newBalance})
    .eq("id",user_id);

    alert("Deposit Approved ✅");
    loadDeposits();
}

// ❌ CANCEL DEPOSIT
async function cancelDeposit(id){
    await client.from("deposit_requests")
    .update({status:"cancelled"})
    .eq("id",id);

    loadDeposits();
}

// ✅ APPROVE WITHDRAW (NO wallet change)
async function approveWithdraw(id,user_id,amount){

    let { data: check } = await client
    .from("withdraw_requests")
    .select("status")
    .eq("id",id)
    .single();

    if(check.status === "approved"){
        alert("Already Approved");
        return;
    }

    await client.from("withdraw_requests")
    .update({status:"approved"})
    .eq("id",id);

    alert("Withdraw Approved ✅");
    loadWithdraw();
}

// ❌ CANCEL WITHDRAW
async function cancelWithdraw(id){
    await client.from("withdraw_requests")
    .update({status:"cancelled"})
    .eq("id",id);

    loadWithdraw();
}

// AUTO LOAD
loadDeposits();
loadWithdraw();

</script>

</body>
</html>
