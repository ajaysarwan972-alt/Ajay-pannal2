<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;padding:10px;}
table{width:100%;border-collapse:collapse;background:#fff;margin-bottom:20px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
img{width:70px;height:70px;object-fit:cover;border-radius:5px;}
button{padding:5px 10px;border:none;border-radius:5px;color:#fff;}
.approve{background:green;}
.cancel{background:red;}
.done{color:green;font-weight:bold;}
</style>
</head>

<body>

<div id="deposit">
<h3>Deposit</h3>
<table>
<thead>
<tr>
<th>ID</th><th>User</th><th>Name</th><th>Mobile</th><th>Amount</th><th>Screenshot</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="depositData"></tbody>
</table>
</div>

<div id="withdraw">
<h3>Withdraw</h3>
<table>
<thead>
<tr>
<th>ID</th><th>User</th><th>Name</th><th>Mobile</th><th>Amount</th><th>Details</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="withdrawData"></tbody>
</table>
</div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

let audio = new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3");

// 🔥 AUDIO UNLOCK (mobile fix)
document.body.addEventListener("click", () => {
    audio.play().then(()=>{
        audio.pause();
        audio.currentTime = 0;
    });
}, {once:true});

// 🔥 TRACKING
let lastDepositId = 0;
let lastWithdrawId = 0;

// 🔥 TELEGRAM
function sendTelegram(msg){
  fetch("https://api.telegram.org/bot8631347165:AAFj1Mh4TNOZggro3KvHyDR6cwfY-aeoKNA/sendMessage", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: "603135850",
      text: msg
    })
  });
}

async function getUserDetails(user_id){
    let { data } = await client
    .from("login")
    .select("name,mobile")
    .eq("id", user_id);

    return data && data.length ? data[0] : {name:"-", mobile:"-"};
}

// 🔥 LOAD DEPOSIT
async function loadDeposits(){
    let { data } = await client
    .from("deposit_requests")
    .select("*")
    .order("id",{ascending:false});

    let html="";
    for (let r of data){
        let userInfo = await getUserDetails(r.user_id);

        let action="";
        if(r.status==="approved"){
            action=`<span class="done">✔ Approved</span>`;
        }else if(r.status==="cancelled"){
            action=`<span style="color:red;">❌ Cancelled</span>`;
        }else{
            action=`
            <button class="approve" onclick="approveDeposit(${r.id},${r.user_id},${r.amount})">Approve</button>
            <button class="cancel" onclick="cancelDeposit(${r.id})">Cancel</button>`;
        }

        let screenshot="-";
        if(r.screenshot && r.screenshot.includes("http")){
            screenshot=`<img src="${r.screenshot}">`;
        }

        html+=`
        <tr>
        <td>${r.id}</td>
        <td>${r.user_id}</td>
        <td>${userInfo.name}</td>
        <td>${userInfo.mobile}</td>
        <td>${r.amount}</td>
        <td>${screenshot}</td>
        <td>${r.status}</td>
        <td>${action}</td>
        </tr>`;
    }

    document.getElementById("depositData").innerHTML=html;
}

// 🔥 LOAD WITHDRAW
async function loadWithdraw(){
    let { data } = await client
    .from("withdraw_requests")
    .select("*")
    .order("id",{ascending:false});

    let html="";
    for (let r of data){
        let userInfo = await getUserDetails(r.user_id);

        let action="";
        if(r.status==="approved"){
            action=`<span class="done">✔ Approved</span>`;
        }else if(r.status==="cancelled"){
            action=`<span style="color:red;">❌ Cancelled</span>`;
        }else{
            action=`
            <button class="approve" onclick="approveWithdraw(${r.id})">Approve</button>
            <button class="cancel" onclick="cancelWithdraw(${r.id})">Cancel</button>`;
        }

        let details=r.upi || "-";
        if(r.screenshot && r.screenshot.includes("http")){
            details=`<img src="${r.screenshot}">`;
        }

        html+=`
        <tr>
        <td>${r.id}</td>
        <td>${r.user_id}</td>
        <td>${userInfo.name}</td>
        <td>${userInfo.mobile}</td>
        <td>${r.amount}</td>
        <td>${details}</td>
        <td>${r.status}</td>
        <td>${action}</td>
        </tr>`;
    }

    document.getElementById("withdrawData").innerHTML=html;
}

// 🔥 APPROVE / CANCEL

async function approveDeposit(id,user_id,amount){
    let { data: check } = await client
    .from("deposit_requests")
    .select("status")
    .eq("id",id)
    .single();

    if(check.status==="approved"){
        alert("Already Approved");
        return;
    }

    await client.from("deposit_requests")
    .update({status:"approved"})
    .eq("id",id);

    let { data } = await client
    .from("login")
    .select("balance")
    .eq("id",user_id)
    .single();

    let newBalance=(data.balance||0)+amount;

    await client.from("login")
    .update({balance:newBalance})
    .eq("id",user_id);

    alert("Deposit Approved ✅");
    loadDeposits();
}

async function cancelDeposit(id){
    await client.from("deposit_requests")
    .update({status:"cancelled"})
    .eq("id",id);

    loadDeposits();
}

async function approveWithdraw(id){
    await client.from("withdraw_requests")
    .update({status:"approved"})
    .eq("id",id);

    alert("Withdraw Approved ✅");
    loadWithdraw();
}

async function cancelWithdraw(id){
    await client.from("withdraw_requests")
    .update({status:"cancelled"})
    .eq("id",id);

    loadWithdraw();
}

// 🔥 DETECTOR (FINAL)
async function checkNewRequests(){

    let { data: dep } = await client
    .from("deposit_requests")
    .select("id")
    .order("id",{ascending:false})
    .limit(1);

    let { data: wid } = await client
    .from("withdraw_requests")
    .select("id")
    .order("id",{ascending:false})
    .limit(1);

    let depId = dep.length ? dep[0].id : 0;
    let widId = wid.length ? wid[0].id : 0;

    if(lastDepositId===0 && lastWithdrawId===0){
        lastDepositId=depId;
        lastWithdrawId=widId;
        return;
    }

    if(depId>lastDepositId){
        audio.play();
        alert("New Deposit 🔥");
        sendTelegram("💰 New Deposit Request");
        loadDeposits();
    }

    if(widId>lastWithdrawId){
        audio.play();
        alert("New Withdraw 🔥");
        sendTelegram("💸 New Withdraw Request");
        loadWithdraw();
    }

    lastDepositId=depId;
    lastWithdrawId=widId;
}

setInterval(checkNewRequests,5000);

loadDeposits();
loadWithdraw();

</script>

</body>
</html>
