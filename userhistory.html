<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My History</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    background:#f2f2f2;
    font-family:Arial;
    margin:0;
}

.header{
  background:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.card{
    background:#fff;
    margin:10px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.market{
    color:red;
    font-weight:bold;
}

.date{
    font-size:12px;
    color:#666;
}

.bet{
    margin-top:5px;
    font-size:14px;
}

.amount{
    background:red;
    color:#fff;
    padding:5px 10px;
    border-radius:6px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">My History</div>

<div id="history"></div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location.href = "index.html";
}

const supabase = window.supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

async function loadHistory(){

    let { data, error } = await supabase
        .from("history")
        .select("*")
        .eq("user_id", parseInt(user.id))   // ✅ FINAL FIX
        .order("id", { ascending: false });

    let html = "";

    if(!data || data.length === 0){
        document.getElementById("history").innerHTML = "No Data";
        return;
    }

    data.forEach(item=>{

        let numbers = {};

        try{
            numbers = JSON.parse(item.data || "{}");
        }catch(e){
            numbers = {};
        }

        let date = new Date(item.created_at).toLocaleString();

        for(let num in numbers){

            let amount = numbers[num];
            let formattedNum = num.toString().padStart(2,'0');

            html += `
            <div class="card">
                <div class="row">
                    <div class="market">${item.market}</div>
                    <div class="date">${date}</div>
                </div>

                <div class="row bet">
                    <div>Jodi Digit &nbsp; <b>Bet No.: ${formattedNum}</b></div>
                    <div class="amount">₹ ${amount}</div>
                </div>
            </div>
            `;
        }

    });

    document.getElementById("history").innerHTML = html;
}

loadHistory();

</script>

</body>
</html>
