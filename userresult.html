<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:Arial;background:#f2f2f2;">

<div style="margin:20px;background:#fff;padding:15px;border-radius:10px;">

<h2>Result History</h2>

<!-- 🔥 MARKET SELECT -->
<select id="marketSelect" onchange="loadData()" style="width:100%;padding:10px;margin-bottom:10px;">
</select>

<div style="display:flex;justify-content:space-between;background:red;color:#fff;padding:10px;">
  <div>Date</div>
  <div>Result</div>
</div>

<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("results")) || {}
let select = document.getElementById("marketSelect")

// 🔥 Load market names
function loadMarkets(){
  select.innerHTML = ""

  Object.keys(data).forEach(m=>{
    let opt = document.createElement("option")
    opt.value = m
    opt.innerText = m
    select.appendChild(opt)
  })
}

// 🔥 Load result
function loadData(){
  let market = select.value
  let list = document.getElementById("list")
  list.innerHTML=""

  let results = (data[market] || []).slice(0,30)

  results.forEach(item=>{
    let div = document.createElement("div")
    div.style.display="flex"
    div.style.justifyContent="space-between"
    div.style.padding="10px"
    div.style.borderBottom="1px solid #ddd"

    div.innerHTML = `
      <div>${item.date}</div>
      <div style="color:blue;font-weight:bold">${item.number}</div>
    `

    list.appendChild(div)
  })
}

loadMarkets()
loadData()
</script>

</body>
</html>
