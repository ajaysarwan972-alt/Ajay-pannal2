<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Winning</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.header{background:red;color:#fff;text-align:center;padding:15px;}
.box{background:#fff;margin:10px;padding:15px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
button{background:green;color:#fff;border:none;}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="header">Admin Winning</div>

<div class="box">

<select id="user">
<option value="">Select User</option>
</select>

<select id="market">
<option value="">Select Market</option>
</select>

<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="addWin()">Add Winning</button>
</div>

<div id="list"></div>

<script>

const client = window.supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// USERS
async function loadUsers(){
 let {data} = await client.from("login").select("id");
 let select = document.getElementById("user");
 select.innerHTML = '<option value="">Select User</option>';
 data.forEach(d=>{
  select.innerHTML += `<option value="${d.id}">${d.id}</option>`;
 });
}

// MARKET
async function loadMarket(){
 let {data} = await client.from("Game result").select("name");
 let select = document.getElementById("market");
 select.innerHTML = '<option value="">Select Market</option>';
 data.forEach(d=>{
  select.innerHTML += `<option value="${d.name}">${d.name}</option>`;
 });
}

// ADD WINNING
async function addWin(){

 let user = document.getElementById("user").value;
 let market = document.getElementById("market").value;
 let amount = parseInt(document.getElementById("amount").value);

 if(!user || !market || !amount){
  alert("Fill all fields");
  return;
 }

 let {error} = await client.from("admin wining").insert([{
  user_id: user,   // ✅ FINAL FIX
  market: market,
  amount: amount,
  created_at: new Date().toISOString()
 }]);

 if(error){
  console.log(error);
  alert("Error");
  return;
 }

 alert("Added ✅");
 loadList();
}

// LIST
async function loadList(){
 let {data} = await client.from("admin wining").select("*").order("id",{ascending:false});
 let html = "";
 data.forEach(d=>{
  html += `
  <div class="card">
   User: ${d.user_id}<br>
   Market: ${d.market}<br>
   Amount: ₹ ${d.amount}
  </div>`;
 });
 document.getElementById("list").innerHTML = html;
}

loadUsers();
loadMarket();
loadList();

</script>

</body>
</html>
