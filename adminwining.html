<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Winning</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.header{background:red;color:#fff;text-align:center;padding:15px;}
.box{background:#fff;margin:10px;padding:15px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
button{background:green;color:#fff;border:none;}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="header">Admin Winning</div>

<div class="box">
<select id="user"></select>
<select id="market"></select>
<input type="number" id="amount" placeholder="Enter Amount">
<button onclick="addWin()">Add Winning</button>
</div>

<div id="list"></div>

<script>

// ✅ FIXED SUPABASE
const supabase = window.supabase;

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"YOUR_PUBLIC_ANON_KEY" // 👉 apna correct key daal
);

// 🔥 USER LOAD
async function loadUsers(){
 let {data, error} = await client.from("login").select("id");

 if(error){
  console.log(error);
  return;
 }

 let html = `<option value="">Select User</option>`;
 data.forEach(u=>{
  html += `<option value="${u.id}">${u.id}</option>`;
 });

 document.getElementById("user").innerHTML = html;
}

// 🔥 MARKET LOAD
async function loadMarkets(){
 let {data, error} = await client.from("history").select("market");

 if(error){
  console.log(error);
  return;
 }

 let set = new Set();
 data.forEach(m=>{
  if(m.market) set.add(m.market);
 });

 let html = `<option value="">Select Market</option>`;
 set.forEach(m=>{
  html += `<option value="${m}">${m}</option>`;
 });

 document.getElementById("market").innerHTML = html;
}

// 🔥 ADD WINNING
async function addWin(){

 let user = document.getElementById("user").value;
 let market = document.getElementById("market").value;
 let amount = parseInt(document.getElementById("amount").value);

 if(!user || !market || !amount){
  alert("Fill all fields");
  return;
 }

 // 👉 wallet get
 let {data:u, error:e1} = await client
  .from("login")
  .select("wallet")
  .eq("id",user)
  .single();

 if(e1){
  alert("User fetch error");
  console.log(e1);
  return;
 }

 let newWallet = (u.wallet || 0) + amount;

 // 👉 wallet update
 let {error:e2} = await client
  .from("login")
  .update({wallet:newWallet})
  .eq("id",user);

 if(e2){
  alert("Wallet update error");
  console.log(e2);
  return;
 }

 // 👉 history insert
 let {error:e3} = await client.from("history").insert([{
  user_id:user,
  market:market,
  amount:amount,
  type:"win",
  created_at:new Date().toISOString()
 }]);

 if(e3){
  console.log(e3);
 }

 // 👉 admin record
 let {error:e4} = await client.from("admin_winning").insert([{
  user_id:user,
  market:market,
  amount:amount,
  created_at:new Date().toISOString()
 }]);

 if(e4){
  alert("Admin insert error");
  console.log(e4);
  return;
 }

 alert("Winning Added ✅");

 loadList();
}

// 🔥 LOAD LIST
async function loadList(){

 let {data, error} = await client
  .from("admin_winning")
  .select("*")
  .order("id",{ascending:false});

 if(error){
  console.log(error);
  document.getElementById("list").innerHTML = "Error loading data";
  return;
 }

 let html = "";

 if(data.length > 0){
  data.forEach(d=>{
   html += `
   <div class="card">
    User: ${d.user_id}<br>
    Market: ${d.market}<br>
    Amount: ₹ ${d.amount}
   </div>
   `;
  });
 }else{
  html = "No Data";
 }

 document.getElementById("list").innerHTML = html;
}

// 🔥 INIT
loadUsers();
loadMarkets();
loadList();

</script>

</body>
</html>
