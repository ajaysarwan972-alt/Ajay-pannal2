<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Winning</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.header{background:red;color:#fff;text-align:center;padding:15px;}
.box{background:#fff;margin:10px;padding:15px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
button{background:green;color:#fff;border:none;}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="header">Admin Winning</div>

<div class="box">
<input type="text" id="user" placeholder="Enter User ID">
<input type="text" id="market" placeholder="Enter Market Name">
<input type="number" id="amount" placeholder="Enter Amount">
<button onclick="addWin()">Add Winning</button>
</div>

<div id="list"></div>

<script>

// ✅ SUPABASE
const client = window.supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 ADD WINNING (SIMPLE)
async function addWin(){

 let user = document.getElementById("user").value;
 let market = document.getElementById("market").value;
 let amount = parseInt(document.getElementById("amount").value);

 if(!user || !market || !amount){
  alert("Fill all fields");
  return;
 }

 let {error} = await client.from("admin_winning").insert([{
  user_id:user,
  market:market,
  amount:amount,
  created_at:new Date().toISOString()
 }]);

 if(error){
  console.log(error);
  alert("Error adding winning");
  return;
 }

 alert("Winning Added ✅");

 loadList();
}

// 🔥 LOAD ADMIN LIST
async function loadList(){

 let {data, error} = await client
  .from("admin_winning")
  .select("*")
  .order("id",{ascending:false});

 if(error){
  console.log(error);
  document.getElementById("list").innerHTML = "Error loading";
  return;
 }

 let html = "";

 if(data.length > 0){
  data.forEach(d=>{
   html += `
   <div class="card">
    User: ${d.user_id}<br>
    Market: ${d.market}<br>
    Amount: ₹ ${d.amount}
   </div>
   `;
  });
 }else{
  html = "No Data";
 }

 document.getElementById("list").innerHTML = html;
}

loadList();

</script>

</body>
</html>
