<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Winning</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.header{background:green;color:#fff;text-align:center;padding:15px;}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px;}
.win{color:green;font-weight:bold;}
</style>
</head>

<body>

<div class="header">My Winning</div>

<div id="list">Loading...</div>

<script>

// ✅ SUPABASE
const client = window.supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 LOGIN USER (IMPORTANT FIX)
var userData = localStorage.getItem("user");

// 👉 OBJECT ko parse karo
if(!userData){
  alert("Login first!");
}

var userId;

// 🔥 HANDLE BOTH CASE (string ya object)
try {
  let parsed = JSON.parse(userData);
  userId = parsed.id;   // 👉 agar object hai
} catch {
  userId = userData;    // 👉 agar direct "4" hai
}

// 🔥 CLEAN VALUE
userId = userId ? userId.toString().trim() : "";

console.log("USER ID:", userId);

// 🔥 LOAD DATA
async function loadData(){

    let {data, error} = await client
        .from("admin wining")   // ✅ SAME TABLE
        .select("*")
        .eq("User id", userId)  // ✅ MATCH USER
        .order("id",{ascending:false});

    if(error){
        console.log(error);
        document.getElementById("list").innerHTML = "Error loading";
        return;
    }

    let html = "";

    if(data && data.length > 0){

        data.forEach(function(item){

            let date = item.created_at 
                ? new Date(item.created_at).toLocaleString()
                : "No Date";

            html += `
            <div class="card">
                <div>Market: ${item.market}</div>
                <div>Date: ${date}</div>
                <div class="win">₹ ${item.amount}</div>
            </div>
            `;
        });

    } else {
        html = "<h3 style='padding:10px;'>No Winning Found</h3>";
    }

    document.getElementById("list").innerHTML = html;
}

loadData();

</script>

</body>
</html>
