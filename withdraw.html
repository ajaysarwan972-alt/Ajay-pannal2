<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    padding:15px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.amount-text{
    font-size:18px;
    font-weight:bold;
    text-align:center;
    margin-bottom:15px;
}
.amount-text span{
    color:green;
}

.upload-box{
    background:#f2f2f2;
    padding:20px;
    border-radius:20px;
    text-align:center;
}

.upload-btn{
    background:linear-gradient(45deg,#4facfe,#ff004c);
    color:#fff;
    padding:15px;
    border:none;
    border-radius:15px;
    font-weight:bold;
    width:100%;
}

.preview{
    margin-top:15px;
}
.preview img{
    width:80%;
    border-radius:10px;
}

.row{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.btn{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    color:#fff;
    font-weight:bold;
}

.back{ background:#ff4d4d; }
.confirm{ background:#7cc84a; }
.change{ background:orange; }
.bank{ background:#4facfe; }

.main-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#ff4d4d;
    color:#fff;
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>

<body>

<!-- STEP 1 -->
<div class="card" id="step1">
<h3>Withdraw Request</h3>
<input type="number" id="amount" placeholder="Enter Amount">
<button class="main-btn" onclick="goStep2()">SUBMIT</button>
</div>

<!-- STEP 2 -->
<div class="card" id="step2" style="display:none;">

<div class="amount-text">
<span id="showAmount">0</span> Rs. आपका QR नीचे दिख रहा है
</div>

<div class="preview" id="savedQR"></div>

<div class="row">
<button class="btn back" onclick="goBack()">BACK</button>
<button class="btn confirm" onclick="submitWithdraw()">CONFIRM</button>
</div>

<div class="row">
<button class="btn change" onclick="openChangeQR()">CHANGE QR</button>
<button class="btn bank" onclick="openBank()">BANK WITHDRAW</button>
</div>

</div>

<!-- CHANGE QR -->
<div class="card" id="changeQR" style="display:none;">
<input type="file" id="newqr" onchange="previewNewQR()">
<div class="preview" id="newPreview"></div>
<button class="main-btn" onclick="saveQR()">SAVE QR</button>
</div>

<!-- BANK FORM -->
<div class="card" id="bankForm" style="display:none;">
<input type="text" id="name" placeholder="Account Holder Name">
<input type="text" id="acc1" placeholder="Account Number">
<input type="text" id="acc2" placeholder="Re-enter Account Number">
<input type="text" id="ifsc" placeholder="IFSC Code">
<button class="main-btn" onclick="submitBank()">SUBMIT</button>
</div>

<script>
const { createClient } = supabase

const client = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// TEST USER
if(!localStorage.getItem("user_id")){
    localStorage.setItem("user_id", "1")
    localStorage.setItem("mobile", "9999999999")
}

// LOAD SAVED QR
function loadQR(){
    let qr = localStorage.getItem("user_qr")
    if(qr){
        document.getElementById("savedQR").innerHTML = `<img src="${qr}">`
    }else{
        document.getElementById("savedQR").innerHTML = "No QR saved"
    }
}
loadQR()

function goStep2(){
    let amt = document.getElementById("amount").value
    if(!amt){
        alert("Amount daal")
        return
    }

    localStorage.setItem("withdraw_amount", amt)
    document.getElementById("showAmount").innerText = amt

    document.getElementById("step1").style.display="none"
    document.getElementById("step2").style.display="block"

    loadQR()
}

function goBack(){
    document.getElementById("step2").style.display="none"
    document.getElementById("step1").style.display="block"
}

// CHANGE QR
function openChangeQR(){
    document.getElementById("changeQR").style.display="block"
}

function previewNewQR(){
    let file = document.getElementById("newqr").files[0]
    let reader = new FileReader()
    reader.onload = e=>{
        document.getElementById("newPreview").innerHTML = `<img src="${e.target.result}">`
    }
    reader.readAsDataURL(file)
}

async function saveQR(){
    let file = document.getElementById("newqr").files[0]

    if(!file){
        alert("QR upload kar")
        return
    }

    let fileName = "qr_"+Date.now()+file.name

    await client.storage.from("screenshots").upload(fileName, file)

    let { data } = client.storage.from("screenshots").getPublicUrl(fileName)

    localStorage.setItem("user_qr", data.publicUrl)

    alert("QR Saved ✅")
    location.reload()
}

// SUBMIT WITHDRAW
async function submitWithdraw(){

    let amount = localStorage.getItem("withdraw_amount")
    let qr = localStorage.getItem("user_qr")

    if(!qr){
        alert("Pehle QR save karo")
        return
    }

    let userId = localStorage.getItem("user_id")
    let mobile = localStorage.getItem("mobile")

    await client.from("withdraw_requests").insert({
        user_id: userId,
        mobile: mobile,
        amount: amount,
        upi: qr,
        status: "pending"
    })

    alert("Withdraw Request Sent ✅")
    location.reload()
}

// BANK FORM
function openBank(){
    document.getElementById("bankForm").style.display="block"
}

async function submitBank(){

    let name = document.getElementById("name").value
    let acc1 = document.getElementById("acc1").value
    let acc2 = document.getElementById("acc2").value
    let ifsc = document.getElementById("ifsc").value
    let amount = localStorage.getItem("withdraw_amount")

    if(acc1 !== acc2){
        alert("Account match nahi")
        return
    }

    let userId = localStorage.getItem("user_id")
    let mobile = localStorage.getItem("mobile")

    await client.from("withdraw_requests").insert({
        user_id: userId,
        mobile: mobile,
        amount: amount,
        upi: name + " | " + acc1 + " | " + ifsc,
        status: "pending"
    })

    alert("Bank Withdraw Request Sent ✅")
    location.reload()
}
</script>

</body>
</html>
