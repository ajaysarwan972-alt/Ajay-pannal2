<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    padding:15px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.main-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#ff4d4d;
    color:#fff;
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h3>Withdraw Request</h3>

<input type="number" id="amount" placeholder="Enter Amount">

<input type="text" id="upi" placeholder="Enter Your UPI ID">

<button class="main-btn" onclick="submitWithdraw()">SUBMIT</button>

</div>

<script>
const { createClient } = supabase

const client = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
)

// TEST USER
if(!localStorage.getItem("user_id")){
    localStorage.setItem("user_id", "1")
    localStorage.setItem("mobile", "9999999999")
}

async function submitWithdraw(){

    let amount = document.getElementById("amount").value
    let upi = document.getElementById("upi").value

    if(!amount || !upi){
        alert("Amount + UPI daal")
        return
    }

    let userId = localStorage.getItem("user_id")
    let mobile = localStorage.getItem("mobile")

    let { error } = await client.from("withdraw_requests").insert({
        user_id: userId,
        mobile: mobile,
        amount: amount,
        upi: upi,
        status: "pending"
    })

    if(error){
        alert("Error: "+error.message)
        return
    }

    alert("Withdraw Request Sent ✅")

    document.getElementById("amount").value=""
    document.getElementById("upi").value=""
}
</script>

</body>
</html>
