<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game 4</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  background:#e5e7eb;
  margin:0;
  display:flex;
  justify-content:center;
}

/* TOP BAR */
#userId{
  position:fixed;
  left:10px;
  top:10px;
  background:green;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-weight:bold;
  z-index:999;
  font-size:12px;
}

#wallet{
  position:fixed;
  right:10px;
  top:10px;
  background:red;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-weight:bold;
  z-index:999;
  font-size:12px;
}

/* MAIN BOX */
.container{
  margin-top:60px;
  width:90%;
  max-width:400px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  display:flex;
  flex-direction:column;
}

label{
  color:red;
  font-weight:bold;
  margin-bottom:5px;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  width:100%;
  box-sizing:border-box;
}

.submit-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.btn{
  padding:12px;
  border:none;
  border-radius:12px;
  color:#fff;
  cursor:pointer;
  font-size:16px;
}

.open{background:green;}
.back{background:red;}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}

.card{
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
  text-align:center;
  border:1px solid #ddd;
}

.num{color:red; font-weight:bold;}

/* 🔥 BOTTOM RUNNING BAR */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}

.totalBar{
  width:50%;
  padding:15px;
  text-align:center;
  background:linear-gradient(to right, blue, red);
  color:white;
  font-size:18px;
}

.submitBar{
  width:50%;
  padding:15px;
  text-align:center;
  background:green;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<div id="userId">ID: 0000</div>
<div id="wallet">₹ 0</div>

<div class="container">

  <div class="row">
    <div class="box">
      <label>1ST NUMBER</label>
      <input type="number" id="num1">
    </div>

    <div class="box">
      <label>2ND NUMBER</label>
      <input type="number" id="num2">
    </div>
  </div>

  <div class="box" style="margin-top:15px;">
    <label>POINTS</label>
    <input type="number" id="points" oninput="calcTotal()">
  </div>

  <div class="submit-row">
    <button class="btn open" onclick="submitGame()">OPEN</button>
    <button class="btn back" onclick="goBack()">BACK</button>
  </div>

  <div class="grid" id="resultGrid"></div>

</div>

<!-- 🔥 BOTTOM BAR -->
<div class="bottom">
  <div class="totalBar" id="total">₹ 0</div>
  <div class="submitBar" onclick="finalSubmit()">SUBMIT</div>
</div>

<script>

// USER CHECK
const user = JSON.parse(localStorage.getItem("user"));
if(!user){
  window.location.href = "index.html";
}

// SUPABASE
const client = supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// LOAD WALLET
async function loadWallet(){
  const { data } = await client
    .from("login")
    .select("balance")
    .eq("id", user.id)
    .single();

  if(data){
    document.getElementById("wallet").innerText = "₹ " + data.balance;
    document.getElementById("userId").innerText = "ID: " + user.id;
  }
}
loadWallet();

// TOTAL
function calcTotal(){
  let amt = Number(document.getElementById("points").value) || 0;
  document.getElementById("total").innerText = "₹ " + amt;
}

// ORIGINAL SYSTEM (same)
function submitGame(){
  let n1 = document.getElementById("num1").value;
  let n2 = document.getElementById("num2").value;
  let amt = Number(document.getElementById("points").value);

  if(!n1 || !n2 || !amt){
    alert("Fill all fields");
    return;
  }

  let grid = document.getElementById("resultGrid");
  grid.innerHTML = "";

  let pair = n1 + "" + n2;

  let div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `<div class="num">${pair}</div><div>₹ ${amt}</div>`;

  grid.appendChild(div);
}

// 🔥 FINAL SUBMIT (balance cut + refresh)
async function finalSubmit(){

  let amt = Number(document.getElementById("points").value);

  if(amt <= 0){
    alert("Amount dalo");
    return;
  }

  const { data } = await client
    .from("login")
    .select("balance")
    .eq("id", user.id)
    .single();

  if(data.balance < amt){
    alert("Insufficient balance");
    return;
  }

  await client
    .from("login")
    .update({ balance: data.balance - amt })
    .eq("id", user.id);

  alert("Game Submitted");

  location.reload(); // 🔥 refresh
}

// BACK
function goBack(){
  window.history.back();
}

</script>

</body>
</html>
