<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Game</title>  

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  

<style>  
body{  
  font-family:Arial;  
  background:#e5e7eb;  
  margin:0;  
}  

#userId{  
  position:fixed;  
  left:10px;  
  top:10px;  
  background:green;  
  color:white;  
  padding:6px 12px;  
  border-radius:20px;  
  font-size:12px;  
  z-index:999;  
}  
#wallet{  
  position:fixed;  
  right:10px;  
  top:10px;  
  background:red;  
  color:white;  
  padding:6px 12px;  
  border-radius:20px;  
  font-size:12px;  
  z-index:999;  
}  

.topBtns{  
  margin-top:50px;  
  display:flex;  
  justify-content:space-around;  
  padding:10px;  
}  
.topBtn{  
  width:22%;  
  padding:10px;  
  border-radius:20px;  
  text-align:center;  
  color:white;  
  font-size:12px;  
  cursor:pointer;  
}  
.btn1{background:#6c5ce7;}  
.btn2{background:#00b894;}  
.btn3{background:#0984e3;}  
.btn4{background:#e17055;}  

.container{  
  margin:10px;  
  background:#fff;  
  padding:15px;  
  border-radius:15px;  
  padding-bottom:100px;  
}  

/* ✅ ONLY CHANGE HERE */
.row{  
  display:grid;  
  grid-template-columns:1fr 1fr;  
  gap:8px;  
}  

.row input{
  padding:8px;
  font-size:14px;
}

.box{  
  display:flex;  
  flex-direction:column;  
}  
label{  
  color:red;  
  font-weight:bold;  
}  
input{  
  border-radius:10px;  
  border:1px solid #ccc;  
}  

.btn{  
  padding:12px;  
  border:none;  
  border-radius:12px;  
  color:#fff;  
  cursor:pointer;  
}  
.set{background:green;}  
.back{background:red;}  

.submit-row{  
  display:grid;  
  grid-template-columns:1fr 1fr;  
  gap:10px;  
  margin-top:15px;  
}  

.grid{  
  display:grid;  
  grid-template-columns:repeat(3,1fr);  
  gap:10px;  
  margin-top:20px;  
}  
.card{  
  background:#f9fafb;  
  padding:10px;  
  border-radius:10px;  
  text-align:center;  
  border:1px solid #ddd;  
}  
.num{color:red;font-weight:bold;}  

.bottom{  
  position:fixed;  
  bottom:0;  
  left:0;  
  width:100%;  
  display:flex;  
  z-index:999;  
}  

.totalBar{  
  width:50%;  
  padding:15px;  
  background:linear-gradient(to right, blue, red);  
  color:white;  
  text-align:center;  
  font-size:18px;  
}  

.submitBar{  
  width:50%;  
  padding:15px;  
  background:green;  
  color:white;  
  text-align:center;  
  font-size:18px;  
  cursor:pointer;  
}  

.whatsapp{  
  position:fixed;  
  bottom:80px;  
  right:15px;  
  width:45px;  
  height:45px;  
  background:#25D366;  
  border-radius:50%;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  color:white;  
  font-size:22px;  
}  
</style>  
</head>  

<body>  

<div id="userId">ID: 0000</div>  
<div id="wallet">₹ 0</div>  

<div class="topBtns">  
  <div class="topBtn btn1">JODI</div>  
  <div class="topBtn btn2">HARUF</div>  
  <div class="topBtn btn3">CROSSING</div>  
  <div class="topBtn btn4">COPY PASTE</div>  
</div>  

<div class="container">  

  <div class="row">  
    <div class="box">  
      <label>1ST NUMBER</label>  
      <input type="number" id="num1">  
    </div>  
    <div class="box">  
      <label>2ND NUMBER</label>  
      <input type="number" id="num2">  
    </div>  
  </div>  

  <div class="box" style="margin-top:10px;">  
    <label>POINTS</label>  
    <input type="number" id="points" oninput="calcTotal()">  
  </div>  

  <div class="submit-row">  
    <button class="btn set" onclick="generate()">SET</button>  
    <button class="btn back" onclick="resetAll()">BACK</button>  
  </div>  

  <div class="grid" id="grid"></div>  

</div>  

<div class="bottom">  
  <div class="totalBar" id="total">₹ 0</div>  
  <div class="submitBar" onclick="finalSubmit()">SUBMIT</div>  
</div>  

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX" target="_blank">💬</a>  

<script>  

const user = JSON.parse(localStorage.getItem("user"));  
if(!user){ window.location.href="index.html"; }  

const client = supabase.createClient(  
  "https://katbdbzoufiblnnsoxkk.supabase.co",  
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"  
);  

async function loadWallet(){  
  const { data } = await client.from("login").select("balance").eq("id", user.id).single();  
  if(data){  
    wallet.innerText="₹ "+data.balance;  
    userId.innerText="ID: "+user.id;  
  }  
}  
loadWallet();  

function calcTotal(){  
  let amt = Number(points.value)||0;  
  total.innerText="₹ "+amt;  
}  

function generate(){  
  let n1 = num1.value;  
  let n2 = num2.value;  
  let amt = Number(points.value);  

  if(!n1 || !n2 || !amt){  
    alert("Fill all");  
    return;  
  }  

  let g = document.getElementById("grid");  
  g.innerHTML="";  

  let totalAmt = 0;  

  for(let i=0;i<n1.length;i++){  
    for(let j=0;j<n2.length;j++){  
      let pair = n1[i]+n2[j];  

      let div = document.createElement("div");  
      div.className="card";  
      div.innerHTML=`<div class="num">${pair}</div><div>₹ ${amt}</div>`;  
      g.appendChild(div);  

      totalAmt += amt;  
    }  
  }  

  total.innerText="₹ "+totalAmt;  
}  

async function finalSubmit(){  

  let amt = Number(total.innerText.replace("₹",""));  

  if(amt<=0){  
    alert("No data");  
    return;  
  }  

  const { data } = await client.from("login").select("balance").eq("id", user.id).single();  

  if(data.balance < amt){  
    alert("Insufficient balance");  
    return;  
  }  

  await client.from("login").update({ balance: data.balance - amt }).eq("id", user.id);  

  alert("Game Submitted");  
  location.reload();  
}  

function resetAll(){  
  num1.value="";  
  num2.value="";  
  points.value="";  
  grid.innerHTML="";  
  total.innerText="₹ 0";  
}  

</script>  

</body>  
</html>
