<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Amount Setter</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
}

/* MAIN CARD */
.container{
  max-width:420px;
  margin:20px auto;
  background:#111827;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* TITLE */
h2{
  text-align:center;
  color:#22c55e;
  margin-bottom:15px;
}

/* INPUTS */
label{
  font-size:14px;
  color:#cbd5f5;
}

textarea,input{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:15px;
  border-radius:12px;
  border:1px solid #334155;
  background:#1e293b;
  color:#fff;
  font-size:15px;
}

textarea{
  height:110px;
  resize:none;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  margin-top:5px;
}

.set{
  background:#22c55e;
  color:#000;
}

.copy{
  background:#3b82f6;
  color:#fff;
}

/* TABLE */
.table-box{
  margin-top:15px;
  background:#0f172a;
  border-radius:15px;
  overflow:hidden;
  border:1px solid #334155;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#1e293b;
  padding:10px;
  font-size:14px;
}

td{
  padding:10px;
  text-align:center;
  border-top:1px solid #334155;
}

.num{
  color:#22c55e;
  font-weight:bold;
}

.amt{
  color:#facc15;
}

/* TOTAL */
.total{
  margin-top:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  color:#facc15;
}
</style>

</head>

<body>

<div class="container">

<h2>Number Amount Auto Setter</h2>

<label>Enter Numbers:</label>
<textarea id="numbers" oninput="formatNumbers()" placeholder="12 45 78 90"></textarea>

<label>Enter Amount:</label>
<input type="number" id="amount" placeholder="100">

<button class="btn set" onclick="setAmount()">SET</button>
<button class="btn copy" onclick="copyData()">COPY RESULT</button>

<div class="table-box">
<table id="result">
<thead>
<tr>
<th>Number</th>
<th>Amount</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="total" id="total"></div>

</div>

<script>

// 🔥 SAME LOGIC (UNCHANGED)

function formatNumbers(){
  let val = document.getElementById("numbers").value;
  val = val.replace(/[^0-9 ]/g,'');
  document.getElementById("numbers").value = val;
}

function setAmount(){
  let nums = document.getElementById("numbers").value.trim().split(" ");
  let amt = Number(document.getElementById("amount").value);

  let tbody = document.querySelector("#result tbody");
  tbody.innerHTML = "";

  let total = 0;

  nums.forEach(n=>{
    if(n){
      let tr = document.createElement("tr");
      tr.innerHTML = `<td class="num">${n}</td><td class="amt">₹ ${amt}</td>`;
      tbody.appendChild(tr);
      total += amt;
    }
  });

  document.getElementById("total").innerText = "Total: ₹ " + total;
}

function copyData(){
  let text = "";
  let rows = document.querySelectorAll("#result tbody tr");

  rows.forEach(r=>{
    let cols = r.querySelectorAll("td");
    text += cols[0].innerText + " - " + cols[1].innerText + "\n";
  });

  navigator.clipboard.writeText(text);
  alert("Copied");
}

</script>

</body>
</html>
