<script>

const user = JSON.parse(localStorage.getItem("user"));
if(!user){ window.location.href="index.html"; }

const client = supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// ✅ MARKET FIX
let market = localStorage.getItem("market");

async function loadWallet(){
  const { data } = await client.from("login").select("balance").eq("id", user.id).single();
  if(data){
    wallet.innerText="₹ "+data.balance;
    userId.innerText="ID: "+user.id;
  }
}
loadWallet();

function calcTotal(){
  let amt = Number(points.value)||0;
  total.innerText="₹ "+amt;
}

function generate(){
  let n1 = num1.value;
  let n2 = num2.value;
  let amt = Number(points.value);

  if(!n1 || !n2 || !amt){
    alert("Fill all");
    return;
  }

  let g = document.getElementById("grid");
  g.innerHTML="";

  let totalAmt = 0;

  for(let i=0;i<n1.length;i++){
    for(let j=0;j<n2.length;j++){
      let pair = n1[i]+n2[j];

      let div = document.createElement("div");
      div.className="card";
      div.innerHTML=`<div class="num">${pair}</div><div>₹ ${amt}</div>`;
      g.appendChild(div);

      totalAmt += amt;
    }
  }

  total.innerText="₹ "+totalAmt;
}

// ✅ FINAL SUBMIT (HISTORY ADD)
async function finalSubmit(){

  let amt = Number(total.innerText.replace("₹",""));

  if(amt<=0){
    alert("No data");
    return;
  }

  const { data } = await client.from("login").select("balance").eq("id", user.id).single();

  if(data.balance < amt){
    alert("Insufficient balance");
    return;
  }

  // balance cut
  await client.from("login").update({ balance: data.balance - amt }).eq("id", user.id);

  // ✅ DATA PREPARE (pairs)
  let cards = document.querySelectorAll(".card");
  let dataArr = [];

  cards.forEach(card=>{
    let number = card.querySelector(".num").innerText;
    let amount = Number(points.value);

    dataArr.push({
      number: number,
      amount: amount
    });
  });

  // ✅ HISTORY SAVE
  await client.from("history").insert([{
    user_id: user.id,
    market: market,
    data: JSON.stringify(dataArr),
    total: amt
  }]);

  alert("Game Submitted");
  location.reload();
}

function resetAll(){
  num1.value="";
  num2.value="";
  points.value="";
  grid.innerHTML="";
  total.innerText="₹ 0";
}

</script>
