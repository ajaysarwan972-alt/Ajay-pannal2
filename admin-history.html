<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin History</title>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
}

.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.game{
  color:red;
  font-weight:bold;
}

.bets{
  margin-top:5px;
}

.date{
  font-size:12px;
  color:gray;
}

.empty{
  text-align:center;
  margin-top:50px;
  color:gray;
}
</style>

</head>

<body>

<h2 style="text-align:center;">Admin History</h2>

<div id="data"></div>

<script>

// 🔥 DATA LOAD
let raw = localStorage.getItem("admin_history");

// 🔥 DEBUG (mobile ke liye)
if(!raw){
  document.getElementById("data").innerHTML = `
    <div class="empty">❌ No Data Found</div>
    <div class="empty">Game submit nahi hua ya save nahi ho raha</div>
  `;
}else{

  let data = JSON.parse(raw);

  // latest first
  data.reverse();

  let container = document.getElementById("data");

  data.forEach(item => {

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="game">🎮 ${item.game}</div>
      <div class="bets">💰 ${item.bets}</div>
      <div class="date">🕒 ${item.date}</div>
    `;

    container.appendChild(div);

  });

}

</script>

</body>
</html>
